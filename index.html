<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;border:0.5px solid #e0ddd5}
.login-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.login-biz{font-size:12px;color:#888;margin-bottom:20px}
.login-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.role-btn{padding:10px 6px;border:0.5px solid #ddd;border-radius:10px;background:#fff;font-size:12px;cursor:pointer;text-align:center;color:#555}
.role-btn.selected{border-color:#4a4a9a;background:#f0f0fb;color:#4a4a9a;font-weight:700}
.role-btn .icon{font-size:20px;display:block;margin-bottom:4px}
.inp{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:12px;background:#fafaf8;color:#1a1a1a}
.inp:focus{outline:none;border-color:#4a4a9a}
.login-btn{width:100%;padding:12px;background:#4a4a9a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.err{color:#c0392b;font-size:12px;margin-bottom:10px;display:none}
.app-wrap{max-width:480px;margin:0 auto;padding:0 0 82px}
.topbar{background:#fff;border-bottom:0.5px solid #e0ddd5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;color:#888;margin-top:1px}
.logout-btn{font-size:12px;color:#888;background:none;border:0.5px solid #ddd;border-radius:8px;padding:5px 10px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0ddd5;display:flex;max-width:480px;margin:0 auto;z-index:10;overflow-x:auto}
.nav-btn{flex:1;min-width:46px;padding:7px 2px 5px;background:none;border:none;cursor:pointer;font-size:9px;color:#888;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .ni{font-size:17px}
.nav-btn.active{color:#4a4a9a}
.content{padding:12px}
.page{display:none}.page.active{display:block}
.shop-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.shop-tab{flex:1;min-width:70px;padding:6px 4px;font-size:11px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;text-align:center}
.shop-tab.active{background:#f0f0fb;color:#4a4a9a;font-weight:700;border-color:#4a4a9a}
.card{background:#fff;border:0.5px solid #e0ddd5;border-radius:14px;padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:#555;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#f5f4f0;border-radius:10px;padding:10px 12px}
.metric-label{font-size:11px;color:#888;margin-bottom:3px}
.metric-value{font-size:16px;font-weight:700;color:#1a1a1a}
.g{color:#1a7a4a}.r{color:#c0392b}.b{color:#2563eb}.p{color:#4a4a9a}.o{color:#b45309}.v{color:#7c3aed}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;font-size:14px;padding:9px 11px;border:0.5px solid #ddd;border-radius:9px;background:#fafaf8;color:#1a1a1a}
.field input:focus,.field select:focus{outline:none;border-color:#4a4a9a}
.field input[readonly]{background:#f0f0f0;color:#999}
.save-btn{width:100%;padding:11px;font-size:14px;font-weight:700;border:none;border-radius:10px;background:#4a4a9a;color:#fff;cursor:pointer;margin-top:4px}
.save-btn:active{transform:scale(.98)}
.entry-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-top:0.5px solid #f0ede6;gap:8px}
.entry-main{font-size:13px;color:#1a1a1a;font-weight:600}
.entry-sub{font-size:11px;color:#999;margin-top:2px}
.entry-date{font-size:11px;color:#bbb;white-space:nowrap}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}
.del-btn:hover{color:#c0392b}
.empty{text-align:center;padding:20px;color:#bbb;font-size:13px}
.staff-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:0.5px solid #f0ede6;gap:8px}
.staff-name{font-size:14px;font-weight:700}
.staff-meta{font-size:11px;color:#999;margin-top:2px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;margin-right:4px;font-weight:600}
.badge.warn{background:#fff8e1;color:#b45309}
.badge.danger{background:#fef2f2;color:#c0392b}
.badge.success{background:#f0fdf4;color:#1a7a4a}
.badge.info{background:#eff6ff;color:#2563eb}
.badge.purple{background:#fdf4ff;color:#7c3aed}
.shop-summary-block{background:#fff;border:0.5px solid #e0ddd5;border-radius:14px;padding:14px;margin-bottom:10px}
.ssname{font-size:14px;font-weight:700;margin-bottom:10px;color:#4a4a9a}
.srow{display:flex;justify-content:space-between;font-size:13px;color:#666;padding:3px 0}
.srow span:last-child{font-weight:700;color:#1a1a1a}
.divider{border:none;border-top:0.5px solid #eee;margin:8px 0}
.section-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin:8px 0 4px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.month-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.month-bar select{flex:1;font-size:13px;padding:7px 10px;border:0.5px solid #ddd;border-radius:9px;background:#fff}
.from-tag{background:#fef9ec;color:#b45309;border-radius:6px;padding:1px 7px;font-size:11px}
.to-tag{background:#f0fdf4;color:#1a7a4a;border-radius:6px;padding:1px 7px;font-size:11px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sub-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.sub-tab{flex:1;min-width:60px;padding:6px 4px;font-size:11px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;text-align:center}
.sub-tab.active{border-color:#4a4a9a;background:#f0f0fb;color:#4a4a9a;font-weight:700}
.person-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;padding:12px;margin-bottom:10px}
.person-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.net-box{background:#f5f4f0;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.net-box .lbl{font-size:12px;color:#666}
.net-box .val{font-size:16px;font-weight:700}
.tag-row{display:flex;flex-wrap:wrap;margin-bottom:8px;gap:4px}
.tag-pill{display:inline-flex;align-items:center;gap:4px;background:#f5f4f0;border:0.5px solid #ddd;border-radius:20px;padding:4px 10px;font-size:12px}
.tag-pill .tx{color:#aaa;cursor:pointer;font-size:15px;line-height:1}
.owe-we{background:#fef2f2;color:#c0392b;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:600}
.owe-they{background:#f0fdf4;color:#1a7a4a;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:600}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
<div class="login-wrap"><div class="login-box">
  <div class="login-logo">🏪 Shop Manager</div>
  <div class="login-biz">Shivam Group of Smartphones</div>
  <div class="login-roles">
    <button class="role-btn" onclick="selectRole('owner')" id="role_owner"><span class="icon">👑</span>Owner</button>
    <button class="role-btn" onclick="selectRole('manager')" id="role_manager"><span class="icon">🧑‍💼</span>Manager</button>
    <button class="role-btn" onclick="selectRole('staff')" id="role_staff"><span class="icon">🧑‍🏭</span>Staff</button>
  </div>
  <div id="loginFields"></div>
  <div class="err" id="loginErr">Incorrect password. Try again.</div>
  <button class="login-btn" onclick="doLogin()">Login →</button>
</div></div>
</div>

<div id="appScreen" class="screen">
<div class="app-wrap">
  <div class="topbar">
    <div><div class="topbar-title" id="topbarTitle">Shop Manager</div><div class="topbar-sub" id="topbarSub"></div></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="content">
    <div class="page active" id="page_entries"><div class="shop-tabs" id="entryShopTabs"></div><div id="entryContent"></div></div>
    <div class="page" id="page_expense"><div class="shop-tabs" id="expShopTabs"></div><div id="expContent"></div></div>
    <div class="page" id="page_gpay"><div class="shop-tabs" id="gpayShopTabs"></div><div id="gpayContent"></div></div>
    <div class="page" id="page_accessories"><div class="shop-tabs" id="accShopTabs"></div><div id="accContent"></div></div>
    <div class="page" id="page_staff"><div class="shop-tabs" id="staffShopTabs"></div><div id="staffContent"></div></div>
    <div class="page" id="page_borrowings"><div id="borrowContent"></div></div>
    <div class="page" id="page_transfer"><div id="transferContent"></div></div>
    <div class="page" id="page_dashboard"><div id="dashContent"></div></div>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SHOPS=[
  {name:'POOJARA',  manager:'NIKUNJ', pass:'poojara123'},
  {name:'RAMDEV',   manager:'PUNIT',  pass:'ramdev123'},
  {name:'SHIVAM (KOSAD)',   manager:'KISHAN', pass:'shivam1123'},
  {name:'SHIVAM (KHODIYAR)',manager:'RAJVEER',pass:'shivam2123'}
];
const OWNER_PASS='owner@123', STAFF_PASS='staff123';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let session=null, activePage='entries';
let activeShops={entries:0,expense:0,gpay:0,accessories:0,staff:0};
let activeStaffSub='list';
let activeEntrySub='sales'; // sales|brands|recharge|udhari|bakijama
let data={
  shops:[{},{},{},{}],
  staff:[[],[],[],[]],
  transfers:[],
  expTags:[[],[],[],[]],
  brandTags:[[],[],[],[]],
  borrowings:[]
};

const SK='shopapp_v6';
function save(){localStorage.setItem(SK,JSON.stringify(data));}
function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d){
      data=JSON.parse(d);
      if(!data.borrowings)data.borrowings=[];
      if(!data.brandTags)data.brandTags=[[],[],[],[]];
      for(let i=0;i<4;i++){
        if(!data.shops[i].recharge)data.shops[i].recharge=[];
        if(!data.shops[i].udhari)data.shops[i].udhari=[];
        if(!data.shops[i].bakijama)data.shops[i].bakijama=[];
        if(!data.shops[i].brandSales)data.shops[i].brandSales=[];
      }
    }
  }catch(e){}
}
function fmt(n){return n?Number(n).toLocaleString('en-IN'):'0';}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(iso){if(!iso)return'';try{const[y,m,dd]=iso.split('-');return `${dd} ${MONTHS[parseInt(m)-1]} ${y.slice(2)}`;}catch(e){return iso;}}
function curYM(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function ymLabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return `${MONTHS[parseInt(m)-1]} ${y}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function monthOptions(sel){let s='';const now=new Date();for(let i=0;i<13;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;s+=`<option value="${ym}"${ym===sel?' selected':''}>${ymLabel(ym)}</option>`;}return s;}
function accessibleShops(){return session.role==='owner'?SHOPS.map((_,i)=>i):[session.shopIdx];}
function isOwner(){return session&&session.role==='owner';}
function dateField(id,val){
  const v=val||todayISO();
  if(isOwner())return `<div class="field"><label>Date *</label><input type="date" id="${id}" value="${v}" max="${todayISO()}"></div>`;
  return `<div class="field"><label>Date</label><input type="date" id="${id}" value="${v}" readonly></div>`;
}
function getDate(id){return document.getElementById(id)?.value||todayISO();}
function tagPillsHTML(tags,deleteFn){return tags.map((t,i)=>`<span class="tag-pill">🏷️ ${t} <span class="tx" onclick="${deleteFn}(${i})">×</span></span>`).join('')||'<span style="font-size:12px;color:#bbb">No tags yet</span>';}

// ── LOGIN ──
let selectedRole=null;
function selectRole(r){
  selectedRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('role_'+r).classList.add('selected');
  const f=document.getElementById('loginFields');
  if(r==='owner')f.innerHTML=`<input class="inp" type="password" id="li_pass" placeholder="Owner password">`;
  else f.innerHTML=`<select class="inp" id="li_shop"><option value="">Select branch</option>${SHOPS.map((s,i)=>`<option value="${i}">${s.name}${r==='manager'?' — '+s.manager:''}</option>`).join('')}</select><input class="inp" type="password" id="li_pass" placeholder="Password">`;
  document.getElementById('loginErr').style.display='none';
  setTimeout(()=>document.getElementById('li_pass')?.focus(),100);
}
function doLogin(){
  if(!selectedRole){toast('Select a role');return;}
  const pass=document.getElementById('li_pass')?.value||'';
  const shopEl=document.getElementById('li_shop');
  const shopIdx=shopEl?parseInt(shopEl.value):null;
  let ok=false;
  if(selectedRole==='owner'){ok=(pass===OWNER_PASS);}
  else{if(!shopEl||shopEl.value===''){toast('Select branch');return;}ok=(selectedRole==='manager'?pass===SHOPS[shopIdx].pass:pass===STAFF_PASS);}
  if(!ok){document.getElementById('loginErr').style.display='block';return;}
  session={role:selectedRole,shopIdx:selectedRole==='owner'?null:shopIdx};
  if(session.shopIdx!==null)Object.keys(activeShops).forEach(k=>activeShops[k]=session.shopIdx);
  startApp();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){session=null;selectedRole=null;document.getElementById('loginFields').innerHTML='';document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('loginErr').style.display='none';showScreen('loginScreen');}
function startApp(){
  showScreen('appScreen');
  document.getElementById('topbarTitle').textContent='🏪 Shop Manager';
  document.getElementById('topbarSub').textContent=isOwner()?'All Branches — Owner':session.role==='manager'?`${SHOPS[session.shopIdx].name} — ${SHOPS[session.shopIdx].manager}`:`${SHOPS[session.shopIdx].name} — Staff`;
  buildNav();switchPage(isOwner()?'dashboard':'entries');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function buildNav(){
  const pages=[
    {id:'entries',icon:'📱',label:'Phones'},
    {id:'expense',icon:'💸',label:'Expense'},
    {id:'gpay',icon:'📲',label:'GPay'},
    {id:'accessories',icon:'🎧',label:'Acc/Rep'},
    {id:'staff',icon:'👥',label:'Staff'},
    {id:'transfer',icon:'🔄',label:'Transfer'},
  ];
  if(isOwner()||session.role==='manager')pages.push({id:'dashboard',icon:'📊',label:'Dashboard'});
  if(isOwner())pages.push({id:'borrowings',icon:'💰',label:'Borrows'});
  document.getElementById('bottomNav').innerHTML=pages.map(p=>`<button class="nav-btn" id="nav_${p.id}" onclick="switchPage('${p.id}')"><span class="ni">${p.icon}</span>${p.label}</button>`).join('');
}
function switchPage(p){
  activePage=p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page_'+p)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav_'+p)?.classList.add('active');
  renderPage(p);
}
function renderShopTabs(cid,key){
  const shops=accessibleShops();
  document.getElementById(cid).innerHTML=shops.length>1?shops.map(i=>`<button class="shop-tab${activeShops[key]===i?' active':''}" onclick="switchShop('${key}',${i})">${SHOPS[i].name}</button>`).join(''):'';
}
window.switchShop=function(key,i){activeShops[key]=i;renderPage(key==='staff'?'staff':key);};
function renderPage(p){
  const map={entries:renderEntries,expense:renderExpense,gpay:renderGpay,accessories:renderAccessories,staff:renderStaffPage,transfer:renderTransfer,dashboard:renderDashboard,borrowings:renderBorrowings};
  if(map[p])map[p]();
}

// ── ENTRIES PAGE (sub-tabs: Sales, Brands, Recharge, Udhari, Baki Jama) ──
function renderEntries(){
  renderShopTabs('entryShopTabs','entries');
  const si=activeShops.entries;
  const subLabels={sales:'📋 Sales',brands:'🏷️ Brands',recharge:'🔄 Recharge',udhari:'📒 Udhari',bakijama:'💰 Baki Jama'};
  const subTabs=`<div class="sub-tabs">${Object.entries(subLabels).map(([k,v])=>`<button class="sub-tab${activeEntrySub===k?' active':''}" onclick="swEntrySub('${k}')">${v}</button>`).join('')}</div>`;
  let inner='';
  if(activeEntrySub==='sales')inner=renderSales(si);
  else if(activeEntrySub==='brands')inner=renderBrands(si);
  else if(activeEntrySub==='recharge')inner=renderRecharge(si);
  else if(activeEntrySub==='udhari')inner=renderUdhari(si);
  else inner=renderBakiJama(si);
  document.getElementById('entryContent').innerHTML=subTabs+inner;
}
window.swEntrySub=function(s){activeEntrySub=s;renderEntries();};

// SALES
function renderSales(si){
  const entries=data.shops[si].entries||[];
  const hist=entries.length===0?`<div class="empty">No entries yet</div>`:entries.slice(0,30).map((e,i)=>`<div class="entry-row">
    <div>
      <div class="entry-main">${e.pieces?fmt(e.pieces)+' pcs · ':''}<span class="g">₹${fmt(e.amount)}</span></div>
      <div class="entry-sub">${[e.advance?'Adv ₹'+fmt(e.advance):'',e.bank?'Bank ₹'+fmt(e.bank):'',e.cash?'Cash ₹'+fmt(e.cash):'',e.gpay?'GPay ₹'+fmt(e.gpay):'',e.card?'Card ₹'+fmt(e.card):''].filter(Boolean).join(' · ')}</div>
      ${e.adjustment?`<div class="entry-sub v">Adjustment: ₹${fmt(e.adjustment)}</div>`:''}
      ${e.note?`<div class="entry-sub" style="color:#bbb">${e.note}</div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <span class="entry-date">${fmtDate(e.date)}</span>
      ${isOwner()?`<button class="del-btn" onclick="delEntry(${si},${i})">×</button>`:''}
    </div>
  </div>`).join('');
  return `<div class="card"><div class="card-title">📱 Phone Sales — ${SHOPS[si].name}</div>
    ${dateField('f_date')}
    <div class="two-col">
      <div class="field"><label>Advance (₹)</label><input type="number" id="f_advance" placeholder="0"></div>
      <div class="field"><label>Bank Deposit (₹)</label><input type="number" id="f_bank" placeholder="0"></div>
      <div class="field"><label>Cash (₹)</label><input type="number" id="f_cash" placeholder="0"></div>
      <div class="field"><label>GPay (₹)</label><input type="number" id="f_gpay" placeholder="0"></div>
      <div class="field"><label>Card (₹)</label><input type="number" id="f_card" placeholder="0"></div>
      <div class="field"><label>Pieces Sold</label><input type="number" id="f_pieces" placeholder="0"></div>
      <div class="field"><label>Sale Amount (₹)</label><input type="number" id="f_amount" placeholder="0"></div>
      <div class="field"><label>Extra Stock</label><input type="number" id="f_stock" placeholder="0"></div>
    </div>
    <div class="field"><label>⚖️ Adjustment (₹) <span style="font-weight:400;color:#7c3aed">missing/short</span></label><input type="number" id="f_adjustment" placeholder="0"></div>
    <div class="field"><label>Note</label><input type="text" id="f_note" placeholder="Optional"></div>
    <button class="save-btn" onclick="addEntry(${si})">💾 Save Sales Entry</button></div>
    <div class="card"><div class="card-title">🕐 History</div><div style="max-height:260px;overflow-y:auto">${hist}</div></div>`;
}
window.addEntry=function(si){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const date=getDate('f_date');if(!date){toast('Date required');return;}
  const e={date,advance:g('f_advance'),bank:g('f_bank'),cash:g('f_cash'),gpay:g('f_gpay'),card:g('f_card'),pieces:g('f_pieces'),amount:g('f_amount'),stock:g('f_stock'),adjustment:g('f_adjustment'),note:g('f_note')};
  if(!data.shops[si].entries)data.shops[si].entries=[];
  data.shops[si].entries.unshift(e);save();toast('Saved! ✓');renderEntries();
};

window.updateGpayBal=function(si){const val=document.getElementById('gpay_bal')?.value;if(!val||isNaN(val))return;if(!data.shops[si].gpay)data.shops[si].gpay={entries:[],balance:0};data.shops[si].gpay.balance=Number(val);save();toast('Updated! ✓');renderGpay();};
window.addGpay=function(si){const date=getDate('gpay_date');const amount=Number(document.getElementById('gpay_rec')?.value);if(!amount||amount<=0){toast('Enter amount');return;}if(!data.shops[si].gpay)data.shops[si].gpay={entries:[],balance:0};data.shops[si].gpay.entries.unshift({date,amount,note:document.getElementById('gpay_note')?.value?.trim()||''});save();toast('Saved! ✓');renderGpay();};
window.delGpay=function(si,i){if(!isOwner())return;if(confirm('Delete?')){data.shops[si].gpay.entries.splice(i,1);save();renderGpay();}};

function renderStaffPage(){
  renderShopTabs('staffShopTabs','staff');

  const tabs=['list','leave','advance','salary'];
  const labels={list:'👤 List',leave:'📅 Leaves',advance:'💵 Advance',salary:'💰 Salary'};
  const subBtns=`<div class="sub-tabs">${tabs.map(s=>`<button class="sub-tab${activeStaffSub===s?' active':''}" onclick="swStaffSub('${s}')">${labels[s]}</button>`).join('')}</div>`;
  let inner='';
  if(activeStaffSub==='list')inner=renderStaffList(si);

}

  const staff=data.staff[si]||[];const cm=curYM();

    const lv=(st.leaves||[]).filter(l=>l.month===cm).reduce((a,l)=>a+Number(l.days||0),0);

        ${lv>0?`<span class="badge warn">${lv}d leave</span>`:''}

window.addAdvance=function(si){const idx=parseInt(document.getElementById('adv_staff')?.value);const month=document.getElementById('adv_month')?.value;const amount=parseFloat(document.getElementById('adv_amount')?.value);if(!amount||amount<=0){toast('Enter amount');return;}if(!data.staff[si][idx].advances)data.staff[si][idx].advances=[];data.staff[si][idx].advances.push({month,amount});save();toast('Saved!');renderStaffPage();};

function renderSalary(si){
  const staff=data.staff[si]||[];if(!staff.length)return`<div class="card"><div class="empty">Add staff first</div></div>`;
  const cm=curYM();const opts=staff.map((s,i)=>`<option value="${i}">${s.name}${s.fixedSalary?' (₹'+fmt(s.fixedSalary)+')':''}</option>`).join('');
  const summary=staff.map((st,stIdx)=>{
    const paid=(st.salaries||[]).filter(s=>s.month===cm).reduce((s,l)=>s+Number(l.paid||0),0);
    const adv=(st.advances||[]).filter(a=>a.month===cm).reduce((s,l)=>s+Number(l.amount||0),0);
    const due=Math.max(0,(st.fixedSalary||0)-paid);
    const net=Math.max(0,due-adv);
    return {name:st.name,fixed:st.fixedSalary||0,paid,adv,due,net,stIdx};
  });
  const summRows=summary.map(s=>`<div class="staff-row"><div>
    <div class="staff-name">${s.name}</div>
    <div class="staff-meta">Fixed ₹${fmt(s.fixed)} · Paid ₹${fmt(s.paid)} · Advance ₹${fmt(s.adv)}</div>
    <div style="margin-top:4px">${s.due>0?`<span class="badge danger">Due ₹${fmt(s.due)}</span>`:' <span class="badge success">Fully Paid ✓</span>'}${s.adv>0?`<span class="badge warn">After Adv ₹${fmt(s.net)}</span>`:''}</div>
  </div></div>`).join('');
  const allSal=[];staff.forEach((st,stIdx)=>{(st.salaries||[]).filter(s=>s.month===cm).forEach((s)=>allSal.push({...s,stName:st.name,stIdx,si_orig:(st.salaries||[]).indexOf(s)}));});
  const hist=allSal.length===0?`<div class="empty">No payments this month</div>`:allSal.map(s=>`<div class="entry-row"><div><div class="entry-main">${s.stName}</div><div class="entry-sub g">Paid ₹${fmt(s.paid)}${s.note?' · '+s.note:''}</div></div><div style="display:flex;align-items:center;gap:4px"><span class="entry-date">${ymLabel(s.month)}</span>${isOwner()?`<button class="del-btn" onclick="delSalary(${si},${s.stIdx},${s.si_orig})">×</button>`:''}</div></div>`).join('');
  return `<div class="card"><div class="card-title">💰 Pay Salary</div>
    <div class="field"><label>Staff</label><select id="sal_staff" onchange="prefillSalary(${si})">${opts}</select></div>
    <div class="two-col"><div class="field"><label>Month</label><input type="month" id="sal_month" value="${cm}" ${isOwner()?'':'readonly'}></div>
    <div class="field"><label>Amount Paid (₹)</label><input type="number" id="sal_paid" placeholder="0"></div></div>
    <div class="field"><label>Note</label><input type="text" id="sal_note" placeholder="Full / Partial"></div>
    <button class="save-btn" onclick="addSalary(${si})">💾 Save</button></div>
    <div class="card"><div class="card-title">📊 ${ymLabel(cm)} Status</div>${summRows}</div>
    <div class="card"><div class="card-title">🕐 This Month</div><div style="max-height:180px;overflow-y:auto">${hist}</div></div>`;
}
window.prefillSalary=function(si){const idx=parseInt(document.getElementById('sal_staff')?.value);const st=data.staff[si]?.[idx];if(!st||!st.fixedSalary)return;const cm=curYM();const paid=(st.salaries||[]).filter(s=>s.month===cm).reduce((s,l)=>s+Number(l.paid||0),0);const adv=(st.advances||[]).filter(a=>a.month===cm).reduce((s,l)=>s+Number(l.amount||0),0);const due=Math.max(0,st.fixedSalary-paid-adv);const el=document.getElementById('sal_paid');if(el)el.value=due||'';};
window.addSalary=function(si){const idx=parseInt(document.getElementById('sal_staff')?.value);const month=document.getElementById('sal_month')?.value;const paid=parseFloat(document.getElementById('sal_paid')?.value);if(!paid||paid<=0){toast('Enter amount');return;}if(!data.staff[si][idx].salaries)data.staff[si][idx].salaries=[];data.staff[si][idx].salaries.push({month,paid,note:document.getElementById('sal_note')?.value?.trim()||''});save();toast('Saved!');renderStaffPage();};
window.delSalary=function(si,stIdx,sIdx){if(!isOwner())return;data.staff[si][stIdx].salaries.splice(sIdx,1);save();renderStaffPage();};

// ── BORROWINGS ──
function renderBorrowings(){
  if(!isOwner()){document.getElementById('borrowContent').innerHTML=`<div class="empty">Owner only</div>`;return;}
  const borrowings=data.borrowings||[];
  const personMap={};
  borrowings.forEach((b,i)=>{if(!personMap[b.person])personMap[b.person]={name:b.person,shop:b.shop||'',records:[]};personMap[b.person].records.push({...b,i});});
  const personCards=Object.values(personMap).map(p=>{
    const totalBorrowed=p.records.reduce((s,r)=>s+Number(r.amount||0),0);
    const totalRepaid=p.records.reduce((s,r)=>s+Number(r.repaid||0),0);
    const outstanding=totalBorrowed-totalRepaid;
    const rows=p.records.map(r=>`<div class="entry-row"><div><div class="entry-main">₹${fmt(r.amount)}${r.repaid>0?` <span class="g">· Repaid ₹${fmt(r.repaid)}</span>`:''}</div><div class="entry-sub">${r.note||''}${r.shop?' · '+r.shop:''}</div></div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0"><span class="entry-date">${fmtDate(r.date)}</span><button class="del-btn" onclick="delBorrow(${r.i})">×</button></div></div>`).join('');
    return `<div class="person-card"><div class="person-card-head"><div><div class="staff-name">${p.name}</div>${p.shop?`<div class="staff-meta">${p.shop}</div>`:''}</div><div style="text-align:right"><div style="font-size:11px;color:#aaa">Outstanding</div><div style="font-size:17px;font-weight:700;color:${outstanding>0?'#c0392b':outstanding<0?'#1a7a4a':'#888'}">₹${fmt(Math.abs(outstanding))}</div></div></div><div style="max-height:140px;overflow-y:auto">${rows}</div></div>`;
  }).join('');
  const allPeople=['Owner (Self)'];
  SHOPS.forEach((_,si)=>{(data.staff[si]||[]).forEach(st=>{if(!allPeople.includes(st.name))allPeople.push(st.name);});});
  const peopleOpts=allPeople.map(p=>`<option value="${p}">${p}</option>`).join('');
  const shopOpts=`<option value="">General</option>`+SHOPS.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  const totalOut=borrowings.reduce((s,b)=>s+Number(b.amount||0)-Number(b.repaid||0),0);
  document.getElementById('borrowContent').innerHTML=`
    <div class="net-box"><div class="lbl">Total Outstanding</div><div class="val ${totalOut>0?'r':totalOut<0?'g':''}">₹${fmt(Math.abs(totalOut))}</div></div>
    <div class="card"><div class="card-title">💰 Add Borrowing Record</div>
      ${dateField('bor_date')}
      <div class="two-col">
        <div class="field"><label>Person</label><select id="bor_person">${peopleOpts}</select></div>
        <div class="field"><label>Branch</label><select id="bor_shop">${shopOpts}</select></div>
      </div>
      <div class="two-col">
        <div class="field"><label>Amount Borrowed (₹)</label><input type="number" id="bor_amount" placeholder="0"></div>
        <div class="field"><label>Amount Repaid (₹)</label><input type="number" id="bor_repaid" placeholder="0"></div>
      </div>
      <div class="field"><label>Note</label><input type="text" id="bor_note" placeholder="Reason / details"></div>
      <button class="save-btn" onclick="addBorrow()">💾 Save</button></div>
    ${Object.keys(personMap).length>0?personCards:'<div class="card"><div class="empty">No records yet</div></div>'}`;
}
window.addBorrow=function(){const date=getDate('bor_date');const person=document.getElementById('bor_person')?.value;if(!person){toast('Select person');return;}const amount=Number(document.getElementById('bor_amount')?.value||0);const repaid=Number(document.getElementById('bor_repaid')?.value||0);if(!amount&&!repaid){toast('Enter amount');return;}if(!data.borrowings)data.borrowings=[];data.borrowings.unshift({date,person,shop:document.getElementById('bor_shop')?.value||'',amount,repaid,note:document.getElementById('bor_note')?.value?.trim()||''});save();toast('Saved!');renderBorrowings();};
window.delBorrow=function(i){if(confirm('Delete?')){data.borrowings.splice(i,1);save();renderBorrowings();}};

// ── TRANSFER ──
function renderTransfer(){
  const shopOpts=SHOPS.map((s,i)=>`<option value="${i}">${s.name}</option>`).join('');
  const transfers=data.transfers||[];
  const hist=transfers.length===0?`<div class="empty">No transfers</div>`:transfers.slice(0,30).map((t,i)=>`<div class="entry-row"><div><div class="entry-main"><span class="from-tag">FROM: ${SHOPS[t.from].name}</span> → <span class="to-tag">TO: ${SHOPS[t.to].name}</span></div><div class="entry-sub">₹${fmt(t.amount)}${t.goods?' · '+t.goods:''}${t.qty?' · Qty:'+t.qty:''}</div>${t.note?`<div class="entry-sub" style="color:#bbb">${t.note}</div>`:''}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0"><span class="entry-date">${fmtDate(t.date)}</span>${isOwner()?`<button class="del-btn" onclick="delTransfer(${i})">×</button>`:''}</div></div>`).join('');
  document.getElementById('transferContent').innerHTML=`
    <div class="card"><div class="card-title">🔄 Inter-Branch Transfer</div>
      ${dateField('tr_date')}
      <div class="two-col"><div class="field"><label>From</label><select id="tr_from">${shopOpts}</select></div>
      <div class="field"><label>To</label><select id="tr_to">${SHOPS.map((s,i)=>`<option value="${i}"${i===1?' selected':''}>${s.name}</option>`).join('')}</select></div></div>
      <div class="two-col"><div class="field"><label>Amount (₹)</label><input type="number" id="tr_amount" placeholder="0"></div>
      <div class="field"><label>Qty</label><input type="number" id="tr_qty" placeholder="pcs"></div></div>
      <div class="field"><label>Goods</label><input type="text" id="tr_goods" placeholder="e.g. Mobiles, Chargers"></div>
      <div class="field"><label>Note</label><input type="text" id="tr_note" placeholder="Optional"></div>
      <button class="save-btn" onclick="addTransfer()">💾 Save</button></div>
    <div class="card"><div class="card-title">🕐 History</div><div style="max-height:280px;overflow-y:auto">${hist}</div></div>`;
}
window.addTransfer=function(){const date=getDate('tr_date');const from=parseInt(document.getElementById('tr_from')?.value);const to=parseInt(document.getElementById('tr_to')?.value);if(from===to){toast('Same shop!');return;}const amount=document.getElementById('tr_amount')?.value?.trim();if(!amount){toast('Enter amount');return;}if(!data.transfers)data.transfers=[];data.transfers.unshift({date,from,to,amount,qty:document.getElementById('tr_qty')?.value?.trim(),goods:document.getElementById('tr_goods')?.value?.trim(),note:document.getElementById('tr_note')?.value?.trim()});save();toast('Saved!');renderTransfer();};
window.delTransfer=function(i){if(!isOwner())return;if(confirm('Delete?')){data.transfers.splice(i,1);save();renderTransfer();}};

// ── DASHBOARD ──
function renderDashboard(){
  const shops=accessibleShops();
  const selYM=document.getElementById('dash_month')?.value||curYM();
  let grand={amount:0,expense:0,acc:0,rep:0,pieces:0,adj:0,salDue:0,recharge:0,udhariOwed:0,bakiJama:0,brandTotal:0};
  const shopCards=shops.map(si=>{
    const entries=data.shops[si].entries||[];
    let amount=0,pieces=0,adj=0;for(const e of entries){amount+=Number(e.amount||0);pieces+=Number(e.pieces||0);adj+=Number(e.adjustment||0);}
    const expTotal=(data.shops[si].expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
    const accTotal=(data.shops[si].accessories||[]).reduce((s,e)=>s+Number(e.total||0),0);
    const repTotal=(data.shops[si].repairing||[]).reduce((s,e)=>s+Number(e.total||0),0);
    const rechargeTotal=(data.shops[si].recharge||[]).reduce((s,r)=>s+Number(r.amount||0),0);
    const udhariOwed=(data.shops[si].udhari||[]).filter(u=>u.direction==='they_owe').reduce((s,u)=>s+Number(u.amount||0)-Number(u.repaid||0),0);
    const bakiJamaTotal=(data.shops[si].bakijama||[]).reduce((s,b)=>s+Number(b.amount||0),0);
    const brandTotals={};(data.shops[si].brandSales||[]).forEach(b=>{brandTotals[b.brand]=(brandTotals[b.brand]||0)+Number(b.amount||0);});
    const brandTotal=Object.values(brandTotals).reduce((a,b)=>a+b,0);
    const brandRows=Object.entries(brandTotals).map(([br,amt])=>`<div class="srow" style="padding-left:12px;font-size:12px"><span style="color:#aaa">↳ ${br}</span><span class="g">₹${fmt(amt)}</span></div>`).join('');
    const staffSum=(data.staff[si]||[]).map(st=>{
      const lv=(st.leaves||[]).filter(l=>l.month===selYM).reduce((s,l)=>s+Number(l.days||0),0);
      const adv=(st.advances||[]).filter(a=>a.month===selYM).reduce((s,l)=>s+Number(l.amount||0),0);
      const salPaid=(st.salaries||[]).filter(s=>s.month===selYM).reduce((s,l)=>s+Number(l.paid||0),0);
      const salDue=Math.max(0,(st.fixedSalary||0)-salPaid);
      return {...st,lv,adv,salPaid,salDue};
    });
    const totalSalDue=staffSum.reduce((s,st)=>s+st.salDue,0);
    const staffRows=staffSum.length===0?`<div style="font-size:12px;color:#bbb;padding:4px 0">No staff</div>`:staffSum.map(st=>`<div class="srow"><span>${st.name}</span><span>${st.lv>0?st.lv+'d · ':''}${st.adv>0?'Adv ₹'+fmt(st.adv)+' · ':''}${st.salDue>0?`<span class="r">Due ₹${fmt(st.salDue)}</span>`:`<span class="g">Paid ✓</span>`}</span></div>`).join('');
    const tOut=(data.transfers||[]).filter(t=>t.from===si).reduce((s,t)=>s+Number(t.amount||0),0);
    const tIn=(data.transfers||[]).filter(t=>t.to===si).reduce((s,t)=>s+Number(t.amount||0),0);
    grand.amount+=amount;grand.expense+=expTotal;grand.acc+=accTotal;grand.rep+=repTotal;grand.pieces+=pieces;grand.adj+=adj;grand.salDue+=totalSalDue;grand.recharge+=rechargeTotal;grand.udhariOwed+=udhariOwed;grand.bakiJama+=bakiJamaTotal;grand.brandTotal+=brandTotal;
    return `<div class="shop-summary-block">
      <div class="ssname">🏪 ${SHOPS[si].name}</div>
      <div class="srow"><span>📱 Phone Sales</span><span class="g">₹${fmt(amount)}</span></div>
      <div class="srow"><span>Pieces Sold</span><span>${fmt(pieces)}</span></div>
      ${brandTotal>0?`<div class="srow"><span>🏷️ Brand Sales</span><span class="g">₹${fmt(brandTotal)}</span></div>${brandRows}`:''}
      <div class="srow"><span>💸 Expense</span><span class="r">₹${fmt(expTotal)}</span></div>
      <div class="srow"><span>🎧 Accessories</span><span class="g">₹${fmt(accTotal)}</span></div>
      <div class="srow"><span>🔧 Repairing</span><span class="b">₹${fmt(repTotal)}</span></div>
      <div class="srow"><span>🔄 Recharge</span><span class="p">₹${fmt(rechargeTotal)}</span></div>
      ${udhariOwed>0?`<div class="srow"><span>📒 Udhari (They Owe)</span><span class="o">₹${fmt(udhariOwed)}</span></div>`:''}
      ${bakiJamaTotal>0?`<div class="srow"><span>💰 Baki Jama Received</span><span class="g">₹${fmt(bakiJamaTotal)}</span></div>`:''}
      ${adj>0?`<div class="srow"><span>⚖️ Adjustment</span><span class="v">₹${fmt(adj)}</span></div>`:''}
      <div class="srow" style="border-top:0.5px solid #eee;margin-top:5px;padding-top:5px"><span style="font-weight:700">Net (Sales−Expense)</span><span style="font-weight:700;color:${amount-expTotal>=0?'#1a7a4a':'#c0392b'}">₹${fmt(amount-expTotal)}</span></div>
      <hr class="divider">
      <div class="section-label">👥 Staff — ${ymLabel(selYM)}</div>${staffRows}
      ${totalSalDue>0?`<div class="srow" style="margin-top:4px"><span style="font-weight:700">Salary Still Due</span><span class="r" style="font-weight:700">₹${fmt(totalSalDue)}</span></div>`:''}
      ${tOut>0||tIn>0?`<hr class="divider"><div class="section-label">🔄 Transfers</div>${tOut>0?`<div class="srow"><span>Sent Out</span><span class="o">₹${fmt(tOut)}</span></div>`:''}${tIn>0?`<div class="srow"><span>Received</span><span class="g">₹${fmt(tIn)}</span></div>`:''}`:''}
    </div>`;
  }).join('');
  const grandBlock=shops.length>1?`<div class="metric-grid">
    <div class="metric"><div class="metric-label">All Sales</div><div class="metric-value g">₹${fmt(grand.amount)}</div></div>
    <div class="metric"><div class="metric-label">Total Pieces</div><div class="metric-value">${fmt(grand.pieces)}</div></div>
    <div class="metric"><div class="metric-label">Total Expense</div><div class="metric-value r">₹${fmt(grand.expense)}</div></div>
    <div class="metric"><div class="metric-label">Acc + Repair</div><div class="metric-value p">₹${fmt(grand.acc+grand.rep)}</div></div>
    <div class="metric"><div class="metric-label">Recharge</div><div class="metric-value p">₹${fmt(grand.recharge)}</div></div>
    <div class="metric"><div class="metric-label">Udhari Pending</div><div class="metric-value o">₹${fmt(grand.udhariOwed)}</div></div>
    ${grand.salDue>0?`<div class="metric"><div class="metric-label">Salary Due</div><div class="metric-value r">₹${fmt(grand.salDue)}</div></div>`:''}
    ${grand.adj>0?`<div class="metric" style="background:#fdf4ff"><div class="metric-label">Adjustments</div><div class="metric-value v">₹${fmt(grand.adj)}</div></div>`:''}
  </div>`:'';
  document.getElementById('dashContent').innerHTML=`
    <div class="month-bar"><label>Month:</label><select id="dash_month" onchange="renderDashboard()">${monthOptions(selYM)}</select></div>
    ${grandBlock}${shopCards}`;
}

load();
</script>
</body>
</html>
