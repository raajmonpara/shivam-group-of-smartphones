<script>
// ── CLOUDFLARE WORKER CONFIG ──────────────────────────────────────────────────
const CF_WORKER = 'https://shivam-worker.raajmonpara.workers.dev';
const APP_KEY = 'shivam2026secure';
let _pollInterval = null;

// ── SHOPS CONFIG ──────────────────────────────────────────────────────────────
const SHOPS = [
  {id:'poojara',   name:'POOJARA',          pass:'poojara123',   manager:'NIKUNJ',  hasSales:true,  hasAccRep:false, hasRecharge:true},
  {id:'ramdev',    name:'RAMDEV',            pass:'ramdev123',    manager:'PUNIT',   hasSales:true,  hasAccRep:false, hasRecharge:true},
  {id:'kosad',     name:'SHIVAM (KOSAD)',    pass:'shivam1123',   manager:'KISHAN',  hasSales:true,  hasAccRep:true, hasRecharge:true},
  {id:'khodiyar',  name:'SHIVAM (KHODIYAR)',pass:'shivam2123',   manager:'RAJVEER', hasSales:true,  hasAccRep:true, hasRecharge:true},
  {id:'pacc',      name:'P ACC',             pass:'pacc123',      manager:'P-MGR',   hasSales:false, hasAccRep:true, hasRecharge:false},
  {id:'rdacc',     name:'RD ACC',            pass:'rdacc123',     manager:'RD-MGR',  hasSales:false, hasAccRep:true, hasRecharge:false},
];
const OWNER_PASS = 'owner@123';
const STAFF_PASS = 'staff123';
const ACCT_TYPES = ['Dealer','Franchise','Staff','Owner','Customer','Custom'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let session = null, activePage = 'dashboard';
let activeShops = {expense:'poojara',balance:'poojara',staff:'poojara',accounts:'poojara',dashboard:'poojara',recharge:'poojara',sales:'poojara',accrep:'pacc'};
let fbDb = null, _lastSaved = null;
let _filterDate = {sales:null,accrep:null,recharge:null,expense:null};

// ── DATA TEMPLATE ─────────────────────────────────────────────────────────────
const defShop = () => ({
  sales:[], accessories:[], repairing:[], recharge:[], expenses:[], expTags:[],
  balanceAccounts:{cash:{balance:0,entries:[]},upi:[],bank:[]},
  adjustment:0
});
let data = {
  shops: Object.fromEntries(SHOPS.map(s=>[s.id, defShop()])),
  staff: Object.fromEntries(SHOPS.map(s=>[s.id, []])),
  transfers:[], accounts:[], ledger:[], changes:[]
};

// ── SUPABASE SYNC ─────────────────────────────────────────────────────────────
async function cfFetch(method, body){
  const res = await fetch(CF_WORKER+'/data', {
    method, headers: {'Content-Type':'application/json','X-App-Key':APP_KEY},
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  return method==='GET' ? res.json() : null;
}
async function initFirebase(){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  try{
    const result = await cfFetch('GET');
    if(result){
      if(result.shops) Object.entries(result.shops).forEach(([k,v])=>{data.shops[k]=v;});
      if(result.global){const g=result.global;if(g.staff)data.staff=g.staff;if(g.transfers)data.transfers=g.transfers;if(g.accounts)data.accounts=g.accounts;if(g.ledger)data.ledger=g.ledger;if(g.changes)data.changes=g.changes;}
      ensure();
    } else { loadLocal(); }
    dot.className='sync-dot connected';
    txt.textContent='Connected — Cloudflare D1';
    document.getElementById('appSyncDot').textContent='🟢';
    _pollInterval = setInterval(async ()=>{
      try{
        const result = await cfFetch('GET');
        if(result){
          const remoteStr=JSON.stringify(result);
          if(remoteStr!==_lastSaved){
            if(result.shops) Object.entries(result.shops).forEach(([k,v])=>{data.shops[k]=v;});
            if(result.global){const g=result.global;if(g.staff)data.staff=g.staff;if(g.transfers)data.transfers=g.transfers;if(g.accounts)data.accounts=g.accounts;if(g.ledger)data.ledger=g.ledger;if(g.changes)data.changes=g.changes;}
            ensure();
            if(session){
              if(activePage==='dashboard')renderDashboard();
              else if(activePage==='changes')renderChanges();
              else if(activePage==='sales'){const si=activeShops.sales||session.shopIdx;if(si)renderSalesHistory(si);}
              else if(activePage==='expense'){const si=activeShops.expense||session.shopIdx;if(si)renderExpHistory(si);}
            }
          }
        }
      }catch(e){}
    }, 10000);
  }catch(e){
    dot.className='sync-dot error';
    txt.textContent='Offline mode';
    loadLocal();
  }
}
async function save(){
  showSaving();
  const d = JSON.parse(JSON.stringify(data));
  const month = new Date().toISOString().slice(0,7);
  try{
    // Save each shop's current month data
    const shopSaves = Object.entries(d.shops).map(([shopId, shopData])=>
      cfFetch('POST', {shop_id: shopId, month, payload: shopData})
    );
    // Save global data
    const globalSave = cfFetch('POST', {global: {
      staff: d.staff, transfers: d.transfers,
      accounts: d.accounts, ledger: d.ledger, changes: d.changes
    }});
    await Promise.all([...shopSaves, globalSave]);
    _lastSaved = JSON.stringify({shops: d.shops, global: {staff:d.staff,transfers:d.transfers,accounts:d.accounts,ledger:d.ledger,changes:d.changes}});
    saveLocal(d);
  }catch(e){
    saveLocal(d);
  }
  hideSaving();
}
function saveLocal(d){ try{localStorage.setItem('shopapp_v9',JSON.stringify(d||data));}catch(e){} }
function loadLocal(){
  try{
    const raw=localStorage.getItem('shopapp_v9');
    if(raw){mergeData(JSON.parse(raw));}
  }catch(e){}
  ensure();
}
function showSaving(){const el=document.getElementById('savingInd');if(el){el.style.opacity='1';}}
function hideSaving(){setTimeout(()=>{const el=document.getElementById('savingInd');if(el)el.style.opacity='0';},600);}

// ── HELPERS ───────────────────────────────────────────────────────────────────

// ── DELETE BY ID HELPERS ──────────────────────────────────────────────────────
function delById(arr, id){
  const idx=arr.findIndex(e=>e.id===id);
  if(idx===-1)return null;
  const e=arr[idx];arr.splice(idx,1);return e;
}
window.setExpNote=function(t){const el=document.getElementById('exp_note');if(el)el.value=t;};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function byTag(){return session?session.name+' ('+session.role+')':'system';}
// Prevent mouse wheel from changing number inputs
document.addEventListener('wheel',function(e){if(document.activeElement&&document.activeElement.type==='number')document.activeElement.blur();},{passive:false});
window.clearFormCache=function(){
  ['salesContent','accrepContent','expContent','rechargeContent'].forEach(id=>{
    const el=document.getElementById(id);if(el){el.dataset.shopId='';el.dataset.stateKey='';}
  });
};
window.refreshApp=async function(){
  document.getElementById('appSyncDot').textContent='🔄';
  try{
    const result=await cfFetch('GET');
    if(result){
      if(result.shops) Object.entries(result.shops).forEach(([k,v])=>{data.shops[k]=v;});
      if(result.global){const g=result.global;if(g.staff)data.staff=g.staff;if(g.transfers)data.transfers=g.transfers;if(g.accounts)data.accounts=g.accounts;if(g.ledger)data.ledger=g.ledger;if(g.changes)data.changes=g.changes;}
      ensure();
    }
  }catch(e){}
  clearFormCache();
  renderPage(activePage);
  // Force rebuild forms by clearing dataset
  ['salesContent','accrepContent','expContent','rechargeContent'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.dataset.shopId='';
  });
  renderPage(activePage);
  document.getElementById('appSyncDot').textContent='🟢';
  toast('Refreshed!');
};
function todayISO(){return new Date().toISOString().slice(0,10);}
function nowISO(){return new Date().toISOString();}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length<3?d:`${p[2]}/${p[1]}/${p[0].slice(2)}`;}
function fmtDT(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200);}
function isOwner(){return session?.role==='owner';}
function isManager(){return session?.role==='owner'||session?.role==='manager';}
function curShop(key){return key?activeShops[key]:session?.shopIdx??SHOPS[0].id;}
function shopObj(id){return SHOPS.find(s=>s.id===id)||SHOPS[0];}

function mergeData(src){
  if(!src)return;
  // shops
  if(src.shops){
    SHOPS.forEach(s=>{
      if(src.shops[s.id]){
        if(!data.shops[s.id])data.shops[s.id]=defShop();
        Object.assign(data.shops[s.id],src.shops[s.id]);
        if(!data.shops[s.id].balanceAccounts)data.shops[s.id].balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
      }
    });
  }
  if(src.staff){Object.keys(src.staff).forEach(k=>data.staff[k]=src.staff[k]);}
  if(src.transfers)data.transfers=src.transfers;
  if(src.accounts)data.accounts=src.accounts;
  if(src.ledger)data.ledger=src.ledger;
  if(src.changes)data.changes=src.changes;
}
function ensure(){
  SHOPS.forEach(s=>{
    if(!data.shops[s.id])data.shops[s.id]=defShop();
    const sh=data.shops[s.id];
    ['sales','accessories','repairing','recharge','expenses','expTags'].forEach(k=>{if(!sh[k])sh[k]=[];});
    if(!sh.balanceAccounts)sh.balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[],swipe:[]};
    if(!sh.balanceAccounts.cash)sh.balanceAccounts.cash={balance:0,entries:[]};
    if(!sh.balanceAccounts.swipe)sh.balanceAccounts.swipe=[];
    if(!sh.balanceAccounts.upi)sh.balanceAccounts.upi=[];
    if(!sh.balanceAccounts.bank)sh.balanceAccounts.bank=[];
    if(!data.staff[s.id])data.staff[s.id]=[];
  });
  if(!data.accounts)data.accounts=[];
  if(!data.ledger)data.ledger=[];
  if(!data.transfers)data.transfers=[];
  if(!data.changes)data.changes=[];
}

// ── CHANGE LOG ────────────────────────────────────────────────────────────────
// ── REASON MODAL ──────────────────────────────────────────────────────────────
let _reasonCallback=null;
window.showReason=function(action,cb){
  // Pause polling so server re-fetch doesn't overwrite data during popup
  if(_pollInterval){clearInterval(_pollInterval);_pollInterval=null;}
  _reasonCallback=cb;
  let modal=document.getElementById('reasonModal');
  if(!modal){
    modal=document.createElement('div');modal.id='reasonModal';modal.className='reason-modal';
    modal.innerHTML=`<div class="reason-box">
      <div class="reason-title" id="reasonTitle">Reason Required</div>
      <div class="reason-sub">This will be logged under Changes (Owner view)</div>
      <textarea id="reasonInput" class="reason-input" rows="3" placeholder="Enter reason for this action..."></textarea>
      <div class="reason-btns">
        <button onclick="confirmReason()" style="flex:1;padding:11px;background:#1a7a4a;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:14px">Confirm</button>
        <button onclick="cancelReason()" style="flex:1;padding:11px;background:#f0ede8;color:#555;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:14px">Cancel</button>
      </div></div>`;
    document.body.appendChild(modal);
  }
  document.getElementById('reasonTitle').textContent=action;
  document.getElementById('reasonInput').value='';
  modal.style.display='flex';
  setTimeout(()=>document.getElementById('reasonInput')?.focus(),100);
};
window.confirmReason=function(){
  const r=document.getElementById('reasonInput')?.value?.trim();
  if(!r){document.getElementById('reasonInput').style.border='1.5px solid #c0392b';return;}
  document.getElementById('reasonModal').style.display='none';
  const cb=_reasonCallback; _reasonCallback=null;
  if(cb)cb(r);
  // Resume polling after action
  _resumePoll();
};
window.cancelReason=function(){
  document.getElementById('reasonModal').style.display='none';
  _reasonCallback=null;
  _resumePoll();
};
function _resumePoll(){
  if(_pollInterval)return;
  _pollInterval=setInterval(async()=>{
    try{
      const result=await cfFetch('GET');
      if(result){
        const remoteStr=JSON.stringify(result);
        if(remoteStr!==_lastSaved){
          if(result.shops)Object.entries(result.shops).forEach(([k,v])=>{data.shops[k]=v;});
          if(result.global){const g=result.global;if(g.staff)data.staff=g.staff;if(g.transfers)data.transfers=g.transfers;if(g.accounts)data.accounts=g.accounts;if(g.ledger)data.ledger=g.ledger;if(g.changes)data.changes=g.changes;}
          ensure();
          if(session){
            if(activePage==='dashboard')renderDashboard();
            else if(activePage==='changes')renderChanges();
            else if(activePage==='sales'){const si=activeShops.sales||session.shopIdx;if(si)renderSalesHistory(si);}
            else if(activePage==='expense'){const si=activeShops.expense||session.shopIdx;if(si)renderExpHistory(si);}
          }
        }
      }
    }catch(e){}
  },10000);
}
function logChange(action, section, detail, shopId, reason){
  data.changes.unshift({
    id:uid(), ts:nowISO(), user:session?.name||session?.role||'?',
    shopId:shopId||session?.shopIdx||'', action, section, detail, reason:reason||'', _read:false
  });
  if(data.changes.length>200)data.changes=data.changes.slice(0,200);
}

// ── BALANCE HELPERS ───────────────────────────────────────────────────────────
function balOpts(shopId){
  const sh=data.shops[shopId];
  return `<option value="cash">💵 Cash</option>`+
    (sh.balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">📲 ${u.name}</option>`).join('')+
    (sh.balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">🏦 ${b.name}</option>`).join('')+
    (sh.balanceAccounts.swipe||[]).map((s,i)=>`<option value="swipe_${i}">💳 ${s.name}</option>`).join('');
}
function upiOpts(shopId){return (data.shops[shopId].balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">${u.name}</option>`).join('');}
function bankOpts(shopId){return (data.shops[shopId].balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">${b.name}</option>`).join('');}
function swipeOpts(shopId){return (data.shops[shopId].balanceAccounts.swipe||[]).map((s,i)=>`<option value="swipe_${i}">${s.name}</option>`).join('');}
function debit(shopId,key,amt){adjBal(shopId,key,-Math.abs(+amt));}
function credit(shopId,key,amt){adjBal(shopId,key,+Math.abs(+amt));}
function adjBal(shopId,key,amt){
  const s=data.shops[shopId].balanceAccounts;
  if(key==='cash')s.cash.balance=+(s.cash.balance||0)+ +amt;
  else if(key?.startsWith('upi_')){const i=+key.slice(4);if(s.upi[i])s.upi[i].balance=+(s.upi[i].balance||0)+ +amt;}
  else if(key?.startsWith('bank_')){const i=+key.slice(5);if(s.bank[i])s.bank[i].balance=+(s.bank[i].balance||0)+ +amt;}
  else if(key?.startsWith('swipe_')){const i=+key.slice(6);if(!s.swipe)s.swipe=[];if(s.swipe[i])s.swipe[i].balance=+(s.swipe[i].balance||0)+ +amt;}
}
function balLabel(shopId,key){
  const s=data.shops[shopId].balanceAccounts;
  if(!key||key==='cash')return 'Cash';
  if(key.startsWith('upi_'))return s.upi[+key.slice(4)]?.name||'UPI';
  if(key.startsWith('bank_'))return s.bank[+key.slice(5)]?.name||'Bank';
  if(key.startsWith('swipe_'))return (s.swipe||[])[+key.slice(6)]?.name||'Swipe';
  return key;
}
function acctOpts(shopId,ph='— Select Account —',excludeBranch=false){
  return `<option value="">${ph}</option>`+
    data.accounts.filter(a=>a.shopIdx===shopId&&(!excludeBranch||!a.name.startsWith('Branch:'))).map(a=>`<option value="${a.id}">[${a.type}] ${a.name}</option>`).join('');
}
function acctName(id){return data.accounts.find(a=>a.id===id)?.name||'';}
// ── BALANCE EFFECTS TRACKING ──────────────────────────────────────────────────
function collectBalEffect(shopId, key, amount){
  // returns an effect object for later reversal
  adjBal(shopId, key, +amount);
  return {key, amount: +amount};
}
function reverseEffects(shopId, effects){
  (effects||[]).forEach(e=>adjBal(shopId, e.key, -e.amount));
}
function applyPayments(shopId, cash, upi, upiAcct, bank, bankAcct, swipe, swipeAcct){
  const effects=[];
  if(cash>0)effects.push(collectBalEffect(shopId,'cash',cash));
  if(upi>0&&upiAcct)effects.push(collectBalEffect(shopId,upiAcct,upi));
  else if(upi>0)effects.push(collectBalEffect(shopId,'cash',upi));
  if(bank>0&&bankAcct)effects.push(collectBalEffect(shopId,bankAcct,bank));
  else if(bank>0)effects.push(collectBalEffect(shopId,'cash',bank));
  if(swipe>0&&swipeAcct)effects.push(collectBalEffect(shopId,swipeAcct,swipe));
  else if(swipe>0)effects.push(collectBalEffect(shopId,'cash',swipe));
  return effects;
}
function addLedger(accountId,date,type,amount,note,source,shopId){
  if(!accountId||!amount)return;
  data.ledger.push({id:uid(),accountId,date:date||todayISO(),type,amount:+amount,note:note||'',source:source||'manual',shopId,_by:byTag()});
}

let _role='owner';
function buildLoginRoles(){
  const tabs=['owner','manager','staff'];
  document.getElementById('roleTabs').innerHTML=tabs.map(r=>`<button class="role-tab${_role===r?' active':''}" onclick="setRole('${r}')">${{owner:'👑 Owner',manager:'🧑‍💼 Manager',staff:'🧑‍🏭 Staff'}[r]}</button>`).join('');
  document.getElementById('loginShop').innerHTML=SHOPS.map((s,i)=>`<option value="${s.id}">${s.name}</option>`).join('');
}
function setRole(r){
  _role=r;
  buildLoginRoles();
  document.getElementById('shopFieldWrap').style.display=r==='owner'?'none':'block';
}
function doLogin(){
  const pass=document.getElementById('loginPass').value.trim();
  const shopId=document.getElementById('loginShop').value;
  let ok=false, sess={};
  if(_role==='owner'&&pass===OWNER_PASS){ok=true;sess={role:'owner',shopIdx:null,name:'Owner'};}
  else if(_role==='manager'){
    const s=SHOPS.find(x=>x.id===shopId);
    if(s&&pass===s.pass){ok=true;sess={role:'manager',shopIdx:shopId,name:s.manager};}
  }
  else if(_role==='staff'&&pass===STAFF_PASS){
    const s=SHOPS.find(x=>x.id===shopId);
    ok=true;sess={role:'staff',shopIdx:shopId,name:'Staff'};
  }
  if(ok){
    session=sess;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginPass').value='';
    const si=sess.shopIdx;
    if(si)Object.keys(activeShops).forEach(k=>activeShops[k]=si);
    else Object.keys(activeShops).forEach(k=>activeShops[k]=SHOPS[0].id);
    document.getElementById('barTitle').textContent='🏪 '+(si?shopObj(si).name:'All Branches');
    document.getElementById('barSub').textContent=sess.role==='owner'?'Owner':sess.role==='manager'?'Manager — '+sess.name:'Staff';
    buildNav();switchPage('dashboard');
  }else{document.getElementById('loginErr').textContent='Incorrect password.';}
}
function doLogout(){
  session=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginPass').value='';
}

window.calcST=function(){const v=(+document.getElementById('s_cash')?.value||0)+(+document.getElementById('s_upi')?.value||0)+(+document.getElementById('s_bank')?.value||0)+(+document.getElementById('s_swipe')?.value||0)+(+document.getElementById('s_udhari')?.value||0)+(+document.getElementById('s_exch')?.value||0)+(+document.getElementById('s_loan')?.value||0);const el=document.getElementById('saleTot');if(el)el.textContent=fmt(Math.max(0,v));};
window.addSale=function(shopId){
  const cash=+document.getElementById('s_cash')?.value||0;const upi=+document.getElementById('s_upi')?.value||0;const bank=+document.getElementById('s_bank')?.value||0;const swipe=+document.getElementById('s_swipe')?.value||0;const exch=+document.getElementById('s_exch')?.value||0;const udhari=+document.getElementById('s_udhari')?.value||0;
  const upiAcct=document.getElementById('s_upi_acct')?.value||'';const bankAcct=document.getElementById('s_bank_acct')?.value||'';const swipeAcct=document.getElementById('s_swipe_acct')?.value||'';const udhAcct=document.getElementById('s_udh_acct')?.value||'';
  // total: cash+upi+bank+swipe+udhari+exchange. Exchange = old phone received, adds to sale value. Does NOT affect cash balance.
  const loan=+document.getElementById('s_loan')?.value||0;
  const loanNote=document.getElementById('s_loan_note')?.value?.trim()||'';
  const total=cash+upi+bank+swipe+udhari+exch+loan;
  if(!cash&&!upi&&!bank&&!swipe&&!udhari&&!loan){toast('Enter at least one amount');return;}
  if(upi>0&&!upiAcct){toast('Please select a UPI account for the UPI amount');return;}
  if(bank>0&&!bankAcct){toast('Please select a Bank account for the Bank amount');return;}
  if(swipe>0&&!swipeAcct){toast('Please select a Swipe machine for the Swipe amount');return;}
  if(udhari>0&&!udhAcct){toast('Please select a Customer account for Udhari');return;}
  const udhNote=document.getElementById('s_udh_note')?.value?.trim()||'';
  if(udhari>0&&!udhNote){toast('Please enter a note for the Udhari entry (e.g. iPhone 15, Model name...)');return;}
  const date=document.getElementById('s_date')?.value||todayISO();
  const effects=applyPayments(shopId,cash,upi,upiAcct,bank,bankAcct,swipe,swipeAcct);
  if(udhari>0&&udhAcct)addLedger(udhAcct,date,'dr',udhari,udhNote,'sale',shopId);
  const e={id:uid(),date,qty:+document.getElementById('s_qty')?.value||0,cash,upi,upiAcct,bank,bankAcct,swipe,swipeAcct,exchange:exch,udhari,udhAcct,loan,loanNote,total,note:document.getElementById('s_note')?.value?.trim()||'',_balEffects:effects,_by:byTag()};
  data.shops[shopId].sales.push(e);
  save();toast('Sale saved!');
  ['s_cash','s_upi','s_bank','s_swipe','s_qty','s_exch','s_udhari','s_note','s_udh_note','s_loan','s_loan_note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});  
  const sd=document.getElementById('s_date');if(sd)sd.value=todayISO();
  ['s_upi_acct','s_bank_acct','s_swipe_acct','s_udh_acct'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  window.calcST();renderSalesHistory(shopId);
};
window.saveSaleEdit=function(shopId,entryId){
  const fv={
    date:document.getElementById('ed_date')?.value||'',
    qty:+document.getElementById('ed_qty')?.value||0,
    cash:+document.getElementById('ed_cash')?.value||0,
    upi:+document.getElementById('ed_upi')?.value||0,
    upiAcct:document.getElementById('ed_upi_acct')?.value||'',
    bank:+document.getElementById('ed_bank')?.value||0,
    bankAcct:document.getElementById('ed_bank_acct')?.value||'',
    swipe:+document.getElementById('ed_swipe')?.value||0,
    exch:+document.getElementById('ed_exch')?.value||0,
    udhari:+document.getElementById('ed_udhari')?.value||0,
    udhAcct:document.getElementById('ed_udh_acct')?.value||'',
    note:document.getElementById('ed_note')?.value?.trim()||''
  };
  showReason('Edit Phone Sale Entry',function(reason){
    const arr=data.shops[shopId].sales;
    const idx=arr.findIndex(e=>e.id===entryId);if(idx===-1)return;
    const old={...arr[idx]};
    reverseEffects(shopId,old._balEffects);
    const effects=applyPayments(shopId,fv.cash,fv.upi,fv.upiAcct,fv.bank,fv.bankAcct,0,'');
    arr[idx]={...arr[idx],date:fv.date||arr[idx].date,qty:fv.qty,cash:fv.cash,upi:fv.upi,upiAcct:fv.upiAcct,bank:fv.bank,bankAcct:fv.bankAcct,swipe:fv.swipe,swipeAcct:'',exchange:fv.exch,udhari:fv.udhari,udhAcct:fv.udhAcct,total:fv.cash+fv.upi+fv.bank+fv.swipe+fv.udhari+fv.exch,note:fv.note,_balEffects:effects,_by:arr[idx]._by};
    logChange('EDIT','Phone Sale',fmtDate(old.date)+' Rs.'+fmt(old.total)+' -> Rs.'+fmt(arr[idx].total),shopId,reason);
    save();window._editing=null;toast('Updated!');renderSalesHistory(shopId);
  });
};
window.delSale=function(shopId,entryId){
  if(!isManager())return;
  showReason('Delete Phone Sale Entry',function(reason){
  (function(){
  const e=delById(data.shops[shopId].sales,entryId);
  if(!e)return;
  reverseEffects(shopId,e._balEffects);
  // Remove linked ledger entries (udhari DR, bakijama CR)
  if(e.udhAcct){
    data.ledger=data.ledger.filter(l=>!(l.accountId===e.udhAcct&&l.source==='sale'&&l.shopId===shopId&&l.date===e.date));
  }
  logChange('DELETE','Phone Sale',fmtDate(e.date)+' Rs.'+fmt(e.total),shopId);
  logChange('DELETE','Phone Sale',fmtDate(e.date)+' Rs.'+fmt(e.total),shopId,reason);
  save();window._editing=null;toast('Deleted!');renderSalesHistory(shopId);
  })()});
};

window.switchARShop=function(id){activeShops.accrep=id;document.getElementById('accrepContent').dataset.stateKey='';renderAccRep();};
function renderARHistory(shopId,arrKey,pfx){
  const filterDate=_filterDate.accrep;
  const allAR=(data.shops[shopId][arrKey]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const entries=filterDate?allAR.filter(e=>e.date===filterDate):allAR.filter(e=>e.date===todayISO());
  const arFilterBar=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
    <span style="font-size:12px;color:#888;font-weight:600">📅 Date:</span>
    <input type="date" value="${filterDate||todayISO()}" onchange="_filterDate.accrep=this.value;renderARHistory('${shopId}','${arrKey}','${pfx}')" style="border:1.5px solid #e8e8e8;border-radius:8px;padding:5px 8px;font-size:12px;flex:1">
    ${filterDate?`<button onclick="_filterDate.accrep=null;renderARHistory('${shopId}','${arrKey}','${pfx}')" style="background:#f0ede8;border:none;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-weight:700">Today</button>`:''}
  </div>`;
  const label=arrKey==='accessories'?'Accessories':'Repairing';
  const rows=entries.map((e,i)=>{
    const editKey=arrKey+'_'+i+'_'+shopId;
    if(window._editingAR===editKey&&isManager()){
      return '<div class="edit-row">'
        +'<div style="font-size:11px;font-weight:700;color:#856404;margin-bottom:8px">Editing '+fmtDate(e.date)+'</div>'
        +'<div class="two-col"><div class="field"><label>Date</label><input type="date" id="ar_date" value="'+e.date+'"></div><div class="field"><label>Note</label><input type="text" id="ar_note" value="'+(e.note||'')+'"></div></div>'
        +'<div class="two-col"><div class="field"><label>Cash</label><input type="number" id="ar_cash" value="'+(e.cash||0)+'"></div><div class="field"><label>UPI</label><input type="number" id="ar_upi" value="'+(e.upi||0)+'"></div></div>'
        +'<div class="two-col"><div class="field"><label>Bank</label><input type="number" id="ar_bank" value="'+(e.bank||0)+'"></div><div class="field"><label>Swipe</label><input type="number" id="ar_swipe" value="'+(e.swipe||0)+'"></div></div>'
        +'<div style="display:flex;gap:8px;margin-top:8px">'
        +'<button onclick="doSaveAR(this)" data-shop="'+shopId+'" data-arr="'+arrKey+'" data-id="'+e.id+'" style="flex:1;padding:10px;background:#1a7a4a;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">Save</button>'
        +'<button onclick="doARCancel(this)" data-shop="'+shopId+'" data-arr="'+arrKey+'" data-pfx="'+pfx+'" style="flex:1;padding:10px;background:#f0ede8;color:#555;border:none;border-radius:10px;font-weight:700;cursor:pointer">Cancel</button>'
        +'<button onclick="doARDel(this)" data-shop="'+shopId+'" data-arr="'+arrKey+'" data-id="'+e.id+'" style="padding:10px 14px;background:#c0392b;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">Del</button>'
        +'</div></div>';
    }
    const parts=[e.cash?'Cash:'+fmt(e.cash):'',e.upi?'UPI:'+fmt(e.upi):'',e.bank?'Bank:'+fmt(e.bank):'',e.swipe?'Swipe:'+fmt(e.swipe):''].filter(Boolean).join(' | ');
    const click=isManager()?'onclick="doAREdit(this)" data-key="'+editKey+'" data-shop="'+shopId+'" data-arr="'+arrKey+'" data-pfx="'+pfx+'" style="cursor:pointer"':'';
    return '<div class="entry-row" '+click+'><div><div class="entry-main g">Rs.'+fmt(e.total||0)+(e.note?' <span style="font-size:11px;color:#aaa">'+e.note+'</span>':'')+'</div><div class="entry-sub">'+parts+'</div></div><span class="entry-date">'+fmtDate(e.date)+'</span></div>';
  }).join('');
  const hist=document.getElementById('arHistory');
  if(hist)hist.innerHTML=arFilterBar+'<div class="card"><div class="card-title">'+label+' History'+(isManager()?' -- tap to edit':'')+'</div>'+(rows||'<div class="empty">No entries for this date</div>')+'</div>';
}
window.calcARTot=function(pfx){const v=(+document.getElementById(pfx+'_cash')?.value||0)+(+document.getElementById(pfx+'_upi')?.value||0)+(+document.getElementById(pfx+'_bank')?.value||0)+(+document.getElementById(pfx+'_swipe')?.value||0);const el=document.getElementById(pfx+'Tot');if(el)el.textContent='Rs.'+fmt(v);};
window.addAREntry=function(shopId,arrKey,pfx){
  const cash=+document.getElementById(pfx+'_cash')?.value||0;const upi=+document.getElementById(pfx+'_upi')?.value||0;const bank=+document.getElementById(pfx+'_bank')?.value||0;const swipe=+document.getElementById(pfx+'_swipe')?.value||0;const udhari=+document.getElementById(pfx+'_udhari')?.value||0;const total=cash+upi+bank+swipe+udhari;
  if(!total){toast('Enter at least one amount');return;}
  const upiAcct=document.getElementById(pfx+'_upi_acct')?.value||'';const bankAcct=document.getElementById(pfx+'_bank_acct')?.value||'';const swipeAcct=document.getElementById(pfx+'_swipe_acct')?.value||'';const udhAcct=document.getElementById(pfx+'_udh_acct')?.value||'';
  if(upi>0&&!upiAcct){toast('Please select a UPI account');return;}
  if(bank>0&&!bankAcct){toast('Please select a Bank account');return;}
  if(swipe>0&&!swipeAcct){toast('Please select a Swipe machine');return;}
  if(udhari>0&&!udhAcct){toast('Please select a Customer account for Udhari');return;}
  const date=document.getElementById(pfx+'_date')?.value||todayISO();
  const effects=applyPayments(shopId,cash,upi,upiAcct,bank,bankAcct,swipe,swipeAcct);
  if(udhari>0&&udhAcct)addLedger(udhAcct,date,'dr',udhari,'Udhari - '+arrKey,'sale',shopId);
  const e={id:uid(),date,cash,upi,upiAcct,bank,bankAcct,swipe,swipeAcct,udhari,udhAcct,total,note:document.getElementById(pfx+'_note')?.value?.trim()||'',_balEffects:effects,_by:byTag()};
  data.shops[shopId][arrKey].push(e);
  save();toast('Saved!');
  const pd=document.getElementById(pfx+'_date');if(pd)pd.value=todayISO();
  [pfx+'_upi_acct',pfx+'_bank_acct',pfx+'_swipe_acct',pfx+'_udh_acct'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  [pfx+'_cash',pfx+'_upi',pfx+'_bank',pfx+'_swipe',pfx+'_udhari',pfx+'_note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  // After Repairing, switch back to Accessories tab
  if(arrKey==='repairing'){window._accTab='acc';}
  renderARHistory(shopId,arrKey,pfx);
};
window.doAREdit=function(btn){window._editingAR=btn.dataset.key;renderARHistory(btn.dataset.shop,btn.dataset.arr,btn.dataset.pfx);};
window.doARCancel=function(btn){window._editingAR=null;renderARHistory(btn.dataset.shop,btn.dataset.arr,btn.dataset.pfx);};
window.doARDel=function(btn){delAREntry(btn.dataset.shop,btn.dataset.arr,btn.dataset.id);};
window.doSaveAR=function(btn){saveAREdit(btn.dataset.shop,btn.dataset.arr,btn.dataset.id);};
window.saveAREdit=function(shopId,arrKey,entryId){
  const arr=data.shops[shopId][arrKey];
  const idx=arr.findIndex(e=>e.id===entryId);if(idx===-1)return;
  const old={...arr[idx]};
  reverseEffects(shopId,old._balEffects);
  const cash=+document.getElementById('ar_cash')?.value||0;const upi=+document.getElementById('ar_upi')?.value||0;const bank=+document.getElementById('ar_bank')?.value||0;const swipe=+document.getElementById('ar_swipe')?.value||0;
  const effects=applyPayments(shopId,cash,upi,old.upiAcct||'',bank,old.bankAcct||'',swipe,old.swipeAcct||'');
  arr[idx]={...arr[idx],date:document.getElementById('ar_date')?.value||arr[idx].date,cash,upi,bank,swipe,total:cash+upi+bank+swipe,note:document.getElementById('ar_note')?.value?.trim()||'',_balEffects:effects};
  logChange('EDIT',arrKey,fmtDate(old.date)+' Rs.'+fmt(old.total)+' to Rs.'+fmt(arr[idx].total),shopId);
  showReason('Edit '+arrKey+' Entry',function(reason){
    logChange('EDIT',arrKey,fmtDate(old.date)+' Rs.'+fmt(old.total)+' → Rs.'+fmt(arr[idx].total),shopId,reason);
    save();window._editingAR=null;toast('Updated!');renderAccRep();if(activePage==='dashboard')renderDashboard();
  });
};
window.delAREntry=function(shopId,arrKey,entryId){showReason('Delete '+arrKey+' Entry',function(reason){const e=delById(data.shops[shopId][arrKey],entryId);if(!e)return;reverseEffects(shopId,e._balEffects);logChange('DELETE',arrKey,fmtDate(e.date)+' Rs.'+fmt(e.total),shopId,reason);save();window._editingAR=null;toast('Deleted!');renderAccRep();});}

window.calcRCT=function(){
  const v=(+document.getElementById('rc_cash')?.value||0)+(+document.getElementById('rc_upi')?.value||0)+(+document.getElementById('rc_bank')?.value||0);
  const el=document.getElementById('rcTot');if(el)el.textContent='Rs.'+fmt(v);
};
window.addRechargeEntry=function(shopId){
  const cash=+document.getElementById('rc_cash')?.value||0;
  const upi=+document.getElementById('rc_upi')?.value||0;
  const bank=+document.getElementById('rc_bank')?.value||0;
  const total=cash+upi+bank;
  if(!total){toast('Enter at least one amount');return;}
  const upiAcct=document.getElementById('rc_upi_acct')?.value||'';
  const bankAcct=document.getElementById('rc_bank_acct')?.value||'';
  if(upi>0&&!upiAcct){toast('Please select a UPI account');return;}
  if(bank>0&&!bankAcct){toast('Please select a Bank account');return;}
  const effects=applyPayments(shopId,cash,upi,upiAcct,bank,bankAcct,0,'');
  const e={id:uid(),date:document.getElementById('rc_date')?.value||todayISO(),cash,upi,upiAcct,bank,bankAcct,total,note:document.getElementById('rc_note')?.value?.trim()||'',_balEffects:effects,_by:byTag()};
  if(!data.shops[shopId].recharge)data.shops[shopId].recharge=[];
  data.shops[shopId].recharge.push(e);
  save();toast('Saved!');
  const rcd=document.getElementById('rc_date');if(rcd)rcd.value=todayISO();
  ['rc_upi_acct','rc_bank_acct'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['rc_cash','rc_upi','rc_bank','rc_note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const rcTotEl=document.getElementById('rcTot');if(rcTotEl)rcTotEl.textContent='Rs.0';
  renderRCHistory(shopId);
};
function renderRCHistory(shopId){
  const filterDate=_filterDate.recharge;
  const allRC=(data.shops[shopId].recharge||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const entries=filterDate?allRC.filter(e=>e.date===filterDate):allRC.filter(e=>e.date===todayISO());

    const click=isManager()?'onclick="delRCEntry(\''+shopId+'\',\''+e.id+'\')" style="color:#c0392b;background:none;border:none;cursor:pointer;font-size:17px"':'';
    return '<div class="entry-row"><div><div class="entry-main g">Rs.'+fmt(e.total||0)+(e.note?' <span style="font-size:11px;color:#aaa">'+e.note+'</span>':'')+'</div><div class="entry-sub">'+parts+'</div></div><div style="display:flex;align-items:center;gap:6px"><span class="entry-date">'+fmtDate(e.date)+'</span>'+(isManager()?'<button '+click+'>x</button>':'')+'</div></div>';
  }).join('');
  const hist=document.getElementById('rcHistory');
  if(hist)hist.innerHTML=rcFilterBar+'<div class="card"><div class="card-title">📶 Recharge History</div>'+(rows||'<div class="empty">No entries for this date</div>')+'</div>';

window.delRCEntry=function(shopId,entryId){

};

window.addExpense=function(shopId){
  const amt=+document.getElementById('exp_amt')?.value||0;if(!amt){toast('Enter amount');return;}
  const note=document.getElementById('exp_note')?.value?.trim()||'';
  const paidFrom=document.getElementById('exp_from')?.value||'cash';
  const accountId=document.getElementById('exp_acct')?.value||'';
  const date=document.getElementById('exp_date')?.value||todayISO();
  const effects=[collectBalEffect(shopId,paidFrom,-amt)];
  data.shops[shopId].expenses.push({id:uid(),date,amount:amt,note,paidFrom,accountId,_balEffects:effects,_by:byTag()});
  if(accountId){
    const acct=data.accounts.find(a=>a.id===accountId);
    const ledgerNote=(acct&&acct.name.startsWith('Branch:')?'Payment Given to '+acct.name.replace('Branch:',''):note)||'Payment';
    addLedger(accountId,date,'cr',amt,ledgerNote,'expense',shopId);
    // If paying a branch account, also credit THEIR cash balance
    if(acct&&acct.name.startsWith('Branch:')){
      const branchName=acct.name.replace('Branch:','');
      const receivingShop=SHOPS.find(s=>s.name===branchName);
      if(receivingShop){
        credit(receivingShop.id,'cash',amt);
        // Also add CR ledger entry in receiving branch for their "Branch:sender" account
        const senderName=shopObj(shopId).name;
        let senderAcct=data.accounts.find(a=>a.name==='Branch:'+senderName&&a.shopIdx===receivingShop.id);
        if(!senderAcct){senderAcct={id:uid(),name:'Branch:'+senderName,type:'Custom',phone:'',shopIdx:receivingShop.id,notes:'Inter-branch'};data.accounts.push(senderAcct);}
        addLedger(senderAcct.id,date,'dr',amt,'Payment Received from '+senderName+(note?' - '+note:''),'expense',receivingShop.id);
      }
    }
  }
  save();toast('Saved!');
  document.getElementById('exp_amt').value='';
  document.getElementById('exp_note').value='';
  const expAcct=document.getElementById('exp_acct');if(expAcct)expAcct.value='';
  const expDate=document.getElementById('exp_date');if(expDate)expDate.value=todayISO();
  renderExpHistory(shopId);
};
window.delExpense=function(shopId,entryId){
  if(!isManager())return;if(!confirm('Delete expense?'))return;
  const e=delById(data.shops[shopId].expenses,entryId);
  if(!e)return;
  // Reverse balance effects (cash/upi/bank deduction)
  if(e._balEffects&&e._balEffects.length)reverseEffects(shopId,e._balEffects);
  // Remove linked ledger entry in this shop
  if(e.accountId){
    const lIdx=data.ledger.findIndex(l=>l.accountId===e.accountId&&l.source==='expense'&&l.shopId===shopId&&Math.abs(l.amount-e.amount)<0.01&&l.date===e.date);
    if(lIdx>-1)data.ledger.splice(lIdx,1);
    // If it was a branch payment, also reverse receiver effects
    const acct=data.accounts.find(a=>a.id===e.accountId);
    if(acct&&acct.name.startsWith('Branch:')){
      const branchName=acct.name.replace('Branch:','');
      const receivingShop=SHOPS.find(s=>s.name===branchName);
      if(receivingShop){
        // Reverse cash credit in receiving branch
        debit(receivingShop.id,'cash',e.amount);
        // Remove DR ledger entry added in receiving branch
        const senderName=shopObj(shopId).name;
        const senderAcct=data.accounts.find(a=>a.name==='Branch:'+senderName&&a.shopIdx===receivingShop.id);
        if(senderAcct){
          const rIdx=data.ledger.findIndex(l=>l.accountId===senderAcct.id&&l.source==='expense'&&l.shopId===receivingShop.id&&Math.abs(l.amount-e.amount)<0.01&&l.date===e.date);
          if(rIdx>-1)data.ledger.splice(rIdx,1);
        }
      }
    }
  }
  showReason('Delete Expense Entry',function(reason){
    logChange('DELETE','Expense','Rs.'+fmt(e.amount)+' '+(e.note||''),shopId,reason);
    save();toast('Deleted!');renderExpHistory(shopId);
  });
};

window.delStaff=function(si,i){
  if(!isOwner())return;
  if(!confirm('Remove staff? Their account will also be removed.'))return;
  const s=data.staff[si][i];
  if(s){
    // Remove their account from accounts section
    data.accounts=data.accounts.filter(a=>!(a.name===s.name&&a.type==='Staff'&&a.shopIdx===si));
    // Remove their ledger entries
    data.ledger=data.ledger.filter(l=>{
      const acct=data.accounts.find(a=>a.id===l.accountId);
      return acct!==undefined; // keep only entries with valid accounts
    });
  }
  data.staff[si].splice(i,1);
  save();toast('Staff and account removed.');renderStaff();
};

  <div class="sec-hdr">🔄 Inter-Branch Transfer</div>

}
window.updateToOpts=function(){
  const fromId=document.getElementById('tr_from')?.value||SHOPS[0].id;
  const toSel=document.getElementById('tr_to');
  if(!toSel)return;
  toSel.innerHTML=SHOPS.filter(s=>s.id!==fromId).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
};

window.delTransfer=function(trId){
  if(!isManager())return;
  showReason('Delete Inter-Branch Transfer',function(reason){
  const trIdx=data.transfers.findIndex(t=>t.id===trId);
  if(trIdx===-1){toast('Transfer not found');return;}
  const tr=data.transfers[trIdx];
  // Remove all ledger entries linked to this transfer
  const linked=data.ledger.filter(l=>l._transferId===trId);
  linked.forEach(l=>{
    // No balance to reverse since transfers don't change balance
    // Just remove the ledger entry
  });
  data.ledger=data.ledger.filter(l=>l._transferId!==trId);
  // Also remove any ibpayment ledger entries linked to this transfer's accounts
  // (we don't remove those - they were separate payments made after the transfer)
  data.transfers.splice(trIdx,1);
  logChange('DELETE','Transfer','Rs.'+fmt(tr.amount)+' '+shopObj(tr.from).name+'→'+shopObj(tr.to).name,tr.from,reason);
  save();toast('Transfer deleted. Both branch accounts updated.');renderTransfer();
  });
};
window.addTransfer=function(){
  const from=document.getElementById('tr_from')?.value||SHOPS[0].id;
  const to=document.getElementById('tr_to')?.value||SHOPS[1].id;
  const amt=+document.getElementById('tr_amt')?.value||0;
  const date=document.getElementById('tr_date')?.value||todayISO();
  const note=document.getElementById('tr_note')?.value?.trim()||'';
  if(from===to){toast('From and To must differ');return;}
  if(!amt){toast('Enter amount');return;}
  const fn=shopObj(from).name,tn=shopObj(to).name;
  const byStr=byTag();
  // Get or create inter-branch accounts for both sides
  let toAcct=data.accounts.find(a=>a.name==='Branch:'+tn&&a.shopIdx===from);
  if(!toAcct){toAcct={id:uid(),name:'Branch:'+tn,type:'Custom',phone:'',shopIdx:from,notes:'Inter-branch'};data.accounts.push(toAcct);}
  let fromAcct=data.accounts.find(a=>a.name==='Branch:'+fn&&a.shopIdx===to);
  if(!fromAcct){fromAcct={id:uid(),name:'Branch:'+fn,type:'Custom',phone:'',shopIdx:to,notes:'Inter-branch'};data.accounts.push(fromAcct);}
  const trId=uid();
  data.transfers.push({id:trId,date,from,to,amount:amt,note,_by:byStr});
  // SENDER: CR on Branch:Receiver = sender is owed (receivable)
  // RECEIVER: DR on Branch:Sender = receiver owes (outstanding)
  // Store trId on both ledger entries for cascade delete
  const senderLedgerId=uid(),receiverLedgerId=uid();
  data.ledger.push({id:senderLedgerId,accountId:toAcct.id,date,type:'cr',amount:+amt,note:'Sent to '+tn+(note?' - '+note:''),source:'transfer',shopId:from,_transferId:trId,_by:byStr});

window.addManualLedger=function(accountId,shopId){
  const txnType=document.getElementById('lt_type')?.value||'purchase';
  const amt=+document.getElementById('lt_amt')?.value||0;if(!amt){toast('Enter amount');return;}
  const note=document.getElementById('lt_note')?.value?.trim()||'';
  const balKey=document.getElementById('lt_bal')?.value||'';
  const date=document.getElementById('lt_date')?.value||todayISO();
  if(txnType==='payment_received'&&!balKey){toast('Select which balance account the payment came into');return;}
  if(txnType==='purchase'&&balKey){toast('Purchase on credit should have no balance account');return;}
  // purchase = DR (we owe them, outstanding increases), payment_received = CR (they paid us, outstanding decreases)
  const ledgerType=(txnType==='payment_received')?'cr':'dr';
  // Payment received = money comes IN to our balance
  // Store balance key on ledger entry for reversal on delete
  const ledgerEntry={id:uid(),accountId,date,type:ledgerType,amount:+amt,note:note||'',source:'manual',shopId,_by:byTag(),_balKey:txnType==='payment_received'?balKey:null,_balAmt:txnType==='payment_received'?+amt:0};
  data.ledger.push(ledgerEntry);
  if(txnType==='payment_received'&&balKey){
    credit(shopId,balKey,amt);
  }
  save();toast('Saved!');renderAccounts();
};

window.addInterBranchPayment=function(accountId,shopId){
  const amt=+document.getElementById('ibp_amt')?.value||0;
  if(!amt){toast('Enter amount');return;}
  const balKey=document.getElementById('ibp_bal')?.value||'cash';
  const date=document.getElementById('ibp_date')?.value||todayISO();
  const note=document.getElementById('ibp_note')?.value?.trim()||'';
  const acct=data.accounts.find(a=>a.id===accountId);
  if(!acct)return;
  const otherBranchName=acct.name.replace('Branch:','');
  const otherShop=SHOPS.find(s=>s.name===otherBranchName);
  const myName=shopObj(shopId).name;
  // This branch: CR on Branch:Other (payment received = reduces outstanding or creates receivable)
  addLedger(accountId,date,'cr',amt,'Payment Received from '+otherBranchName+(note?' - '+note:''),'ibpayment',shopId);
  // This branch: credit our balance (money came in)
  credit(shopId,balKey,amt);
  // Other branch effects (if they exist in system)
  if(otherShop){
    // Other branch cash goes DOWN (they paid)
    debit(otherShop.id,'cash',amt);
    // Other branch: DR on their Branch:MyShop account (receivable reduces)
    let myAcct=data.accounts.find(a=>a.name==='Branch:'+myName&&a.shopIdx===otherShop.id);
    if(!myAcct){myAcct={id:uid(),name:'Branch:'+myName,type:'Custom',phone:'',shopIdx:otherShop.id,notes:'Inter-branch'};data.accounts.push(myAcct);}
    addLedger(myAcct.id,date,'dr',amt,'Payment Given to '+myName+(note?' - '+note:''),'ibpayment',otherShop.id);
  }
  save();toast('Payment recorded! Both branches updated.');
  document.getElementById('ibp_amt').value='';
  document.getElementById('ibp_note').value='';
  window._selAcct=accountId;renderAccounts();
};
window.delLedger=function(txnId,shopId){
  if(!isManager())return;
  showReason('Delete Account Transaction',function(reason){
  const idx=data.ledger.findIndex(t=>t.id===txnId);if(idx===-1)return;
  const t=data.ledger[idx];
  // Reverse balance if this entry had a balance effect stored
  if(t._balKey&&t._balAmt){debit(t.shopId||shopId,t._balKey,t._balAmt);}
  // If this is a transfer ledger entry, also delete the Transfer record + other branch entry
  if(t._transferId){
    // Remove the transfer from transfers list
    const trIdx=data.transfers.findIndex(tr=>tr.id===t._transferId);
    if(trIdx>-1)data.transfers.splice(trIdx,1);
    // Remove the OTHER branch's ledger entry for this same transfer
    const otherIdx=data.ledger.findIndex(l=>l._transferId===t._transferId&&l.id!==txnId);
    if(otherIdx>-1)data.ledger.splice(otherIdx,1);
  }
  // If this is a branch payment ledger entry, reverse other branch effects
  if(t.source==='expense'||t.source==='branch_payment'){
    const acct=data.accounts.find(a=>a.id===t.accountId);
    if(acct&&acct.name.startsWith('Branch:')){
      const branchName=acct.name.replace('Branch:','');
      const otherShop=SHOPS.find(s=>s.name===branchName);
      if(otherShop){
        // Reverse the balance credit/debit in other branch
        if(t.type==='cr'){debit(otherShop.id,'cash',t.amount);}
        else{credit(otherShop.id,'cash',t.amount);}
        // Remove the linked ledger entry in other branch
        const senderName=shopObj(t.shopId||shopId).name;
        const otherAcct=data.accounts.find(a=>a.name==='Branch:'+senderName&&a.shopIdx===otherShop.id);
        if(otherAcct){
          const oIdx=data.ledger.findIndex(l=>l.accountId===otherAcct.id&&Math.abs(l.amount-t.amount)<0.01&&l.date===t.date);
          if(oIdx>-1)data.ledger.splice(oIdx,1);
        }
      }
    }
  }
  logChange('DELETE','Ledger',(t.type==='dr'?'Purchase':'Payment Received')+' Rs.'+fmt(t.amount)+' '+(t.note||''),shopId,reason);
  data.ledger.splice(data.ledger.findIndex(l=>l.id===txnId),1);
  save();toast('Deleted!');renderAccounts();
  });
};

}

window.saveAdj=function(si){
  // Try both possible input IDs (balance section and dashboard section)
  const inputEl=document.getElementById('adj_v');
  const amt=+(inputEl?.value)||0;
  if(!amt||isNaN(amt)){toast('Enter an amount (e.g. -100 or +200)');return;}
  if(!data.shops[si].adjustments)data.shops[si].adjustments=[];
  data.shops[si].adjustments.push({id:uid(),date:todayISO(),amount:amt,note:document.getElementById('adj_note')?.value?.trim()||'',_by:byTag()});
  data.shops[si].adjustment=(data.shops[si].adjustments||[]).reduce((s,a)=>s+a.amount,0);
  save();toast('Adjustment saved!');
  const el=document.getElementById('adj_v');if(el)el.value='';
  const en=document.getElementById('adj_note');if(en)en.value='';
  // Refresh whichever page called this
  if(activePage==='dashboard')renderDashboard();else renderBalance();
};
window.saveAdjEdit=function(si,i){
  const adjs=data.shops[si].adjustments||[];if(!adjs[i])return;
  adjs[i].amount=+document.getElementById('adj_edit_amt')?.value||0;
  adjs[i].note=document.getElementById('adj_edit_note')?.value?.trim()||'';
  data.shops[si].adjustment=adjs.reduce((s,a)=>s+a.amount,0);
  save();window._editingAdj=null;toast('Updated!');renderBalance();
};
window.delAdjEntry=function(si,i){
  showReason('Delete Adjustment Entry',function(reason){
    const adjs=data.shops[si].adjustments||[];
    const a=adjs[i];
    adjs.splice(i,1);
    data.shops[si].adjustment=adjs.reduce((s,x)=>s+x.amount,0);
    logChange('DELETE','Adjustment',(a?.amount>=0?'+':'')+fmt(a?.amount)+' '+(a?.note||''),si,reason);
    save();window._editingAdj=null;toast('Deleted!');renderBalance();
  });
};
window.clearAll=function(){if(!isOwner())return;if(!confirm('Delete ALL data from all shops?'))return;if(!confirm('FINAL WARNING — cannot be undone. Continue?'))return;data={shops:Object.fromEntries(SHOPS.map(s=>[s.id,defShop()])),staff:Object.fromEntries(SHOPS.map(s=>[s.id,[]])),transfers:[],accounts:[],ledger:[],changes:[]};['shopapp_v9','shopapp_v8','shopapp_v7'].forEach(k=>localStorage.removeItem(k));save();toast('Cleared!');renderDashboard();};

// ── CHANGES LOG ───────────────────────────────────────────────────────────────
function renderChanges(){
  const changes=(data.changes||[]).slice(0,100);
  const rows=changes.map((c,ci)=>`<div class="change-row" style="cursor:pointer;border-left:3px solid ${c._read?'#ccc':'#e74c3c'};opacity:${c._read?'0.7':'1'}" onclick="markRead(${ci},this)">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:6px">
        ${!c._read?'<span style="width:8px;height:8px;background:#e74c3c;border-radius:50%;display:inline-block;flex-shrink:0"></span>':''}
        <span style="font-size:12px;font-weight:700;color:#c0392b">${c.action}</span>
      </div>
      <span style="font-size:11px;color:#888">${fmtDT(c.ts)}</span>
    </div>
    <div style="font-size:13px;font-weight:600">${c.section} — ${shopObj(c.shopId||'')?.name||''}</div>
    <div style="font-size:11px;color:#888;margin-top:2px">${c.detail||''} | By: ${c.user||'?'}</div>
    <div class="change-reason-${ci}" style="display:none;margin-top:6px;background:#fff3cd;border-radius:8px;padding:6px 10px;font-size:11px;color:#856404">${c.reason?`<b>Reason:</b> ${c.reason}`:'<i>No reason provided</i>'}</div>
  </div>`).join('');
  document.getElementById('changesContent').innerHTML=`
  <div class="sec-hdr">🔔 Changes Log — Owner View</div>
  <div style="font-size:12px;color:#888;margin-bottom:12px">All edits and deletes made by managers. Last 100 shown.</div>
  ${rows||'<div class="card"><div class="empty">No changes logged yet</div></div>'}`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildLoginRoles();
initFirebase();
</script>
