<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ede8;min-height:100vh;color:#1a1a1a}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#1a7a4a 0%,#0d4a2e 100%)}

.login-sub{color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:32px}
.login-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.role-tabs{display:flex;gap:8px;margin-bottom:20px}
.role-tab{flex:1;padding:10px 4px;font-size:12px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:#f5f5f0;color:#555;transition:all 0.2s}
.role-tab.active{background:#1a7a4a;color:#fff}

.field select,.field input{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:12px;font-size:14px;background:#fafaf8;outline:none;transition:border-color 0.2s}
.field select:focus,.field input:focus{border-color:#1a7a4a}
.login-btn{width:100%;padding:14px;background:#1a7a4a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.err{color:#c0392b;font-size:12px;text-align:center;margin-top:10px;min-height:18px}
#app{display:none;max-width:480px;margin:0 auto;padding-bottom:80px}
.top-bar{background:#1a7a4a;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.top-bar-title{font-size:15px;font-weight:800}
.top-bar-sub{font-size:11px;opacity:0.8}
.logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e8e8e4;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08);overflow-x:auto}
.nav-item{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;border:none;background:none;color:#999;font-size:9px;font-weight:600;gap:3px}
.nav-item .icon{font-size:19px;line-height:1}
.nav-item.active{color:#1a7a4a}
.page{display:none;padding:12px}
.page.active{display:block}
.shop-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.shop-tab{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:20px;cursor:pointer;background:#e8e8e4;color:#666;white-space:nowrap}
.shop-tab.active{background:#1a7a4a;color:#fff}
.sec-hdr{font-size:12px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 6px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:800;color:#333;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.save-btn{width:100%;padding:13px;background:#1a7a4a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.save-btn.red{background:#c0392b}
.entry-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0ede8}
.entry-row:last-child{border-bottom:none}
.entry-main{font-size:14px;font-weight:700}
.entry-sub{font-size:11px;color:#888;margin-top:2px}
.entry-date{font-size:11px;color:#aaa;white-space:nowrap;margin-left:8px;flex-shrink:0}
.empty{text-align:center;color:#bbb;font-size:13px;padding:24px 0}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.metric-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.metric-value{font-size:18px;font-weight:800}
.g{color:#1a7a4a}.r{color:#c0392b}
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:#f0ede8;color:#666}
.sub-tab.active{background:#1a7a4a;color:#fff}
.dealer-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.txn-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f0}
.txn-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.badge-dr{background:#fde8e8;color:#c0392b}
.badge-cr{background:#e8f5ee;color:#1a7a4a}
.sale-bar{background:linear-gradient(135deg,#1a7a4a,#0d4a2e);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.acct-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.type-Dealer{background:#fff3cd;color:#856404}
.type-Franchise{background:#e2d9f3;color:#4a235a}
.type-Staff{background:#d1ecf1;color:#0c5460}
.type-Owner{background:#d4edda;color:#155724}
.type-Customer{background:#fde8e8;color:#c0392b}
.type-Custom{background:#f0ede8;color:#555}
.edit-row{background:#fffbf0;border:1.5px solid #f0c040;border-radius:12px;padding:12px;margin-bottom:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
input[type=number]::-webkit-inner-spin-button{opacity:1}
</style>

<body>
<div id="loginScreen">
  <div class="login-logo">🏪</div>
  <div class="login-title">Shivam Group</div>
  <div class="login-sub">of Smartphones</div>
  <div class="login-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole(&#39;owner&#39;)">👑 Owner</button>
      <button class="role-tab" onclick="setRole(&#39;manager&#39;)">🧑‍💼 Manager</button>
      <button class="role-tab" onclick="setRole(&#39;staff&#39;)">🧑‍🏭 Staff</button>
    </div>
    <div id="shopFieldWrap" class="field" style="display:none">
      <label>Branch</label>
      <select id="loginShop">
        <option value="0">POOJARA</option><option value="1">RAMDEV</option>
        <option value="2">SHIVAM (KOSAD)</option><option value="3">SHIVAM (KHODIYAR)</option>
      </select>
    </div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div><div class="top-bar-title" id="barTitle">Shop Manager</div><div class="top-bar-sub" id="barSub"></div></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div id="pages">
    <div class="page active" id="page_sales"><div id="salesContent"></div></div>
    <div class="page" id="page_expense"><div class="shop-tabs" id="expTabs"></div><div id="expContent"></div></div>
    <div class="page" id="page_balance"><div class="shop-tabs" id="balTabs"></div><div id="balContent"></div></div>
    <div class="page" id="page_staff"><div class="shop-tabs" id="staffTabs"></div><div id="staffContent"></div></div>
    <div class="page" id="page_transfer"><div id="transferContent"></div></div>
    <div class="page" id="page_accounts"><div class="shop-tabs" id="acctTabs"></div><div id="acctContent"></div></div>
    <div class="page" id="page_dashboard"><div class="shop-tabs" id="dashTabs"></div><div id="dashContent"></div></div>
  </div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const SHOPS=[
  {name:'POOJARA',  manager:'NIKUNJ',  pass:'poojara123'},
  {name:'RAMDEV',   manager:'PUNIT',   pass:'ramdev123'},
  {name:'SHIVAM (KOSAD)',   manager:'KISHAN',  pass:'shivam1123'},
  {name:'SHIVAM (KHODIYAR)',manager:'RAJVEER', pass:'shivam2123'}
];
const OWNER_PASS='owner@123', STAFF_PASS='staff123';
const ACCT_TYPES=['Dealer','Franchise','Staff','Owner','Customer','Custom'];
const PAY_TYPES=['cash','upi','bank','swipe'];
const PAY_LABELS={cash:'💵 Cash',upi:'📲 UPI',bank:'🏦 Bank',swipe:'💳 Swipe'};
const SK='shopapp_v9';

let session=null, activePage='dashboard';
let activeShops={sales:0,expense:0,balance:0,staff:0,accounts:0,dashboard:0};

// ── DATA ──────────────────────────────────────────────────────────────────────
const defShop=()=>({
  sales:[],      // [{id,date,qty,cash,upi,bank,swipe,total,note}]
  accessories:[], // [{id,date,cash,upi,bank,swipe,total,note}]
  repairing:[],   // [{id,date,cash,upi,bank,swipe,total,note}]
  recharge:[],    // [{id,date,cash,upi,bank,swipe,total,note}]
  expenses:[],
  expTags:[],
  balanceAccounts:{cash:{balance:0,entries:[]},upi:[],bank:[]},
  adjustment:0
});
let data={
  shops:[defShop(),defShop(),defShop(),defShop()],
  staff:[[],[],[],[]],
  transfers:[],
  accounts:[],
  ledger:[]
};

// ── PERSIST ───────────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){toast('Save error!');}}
function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){merge(data,JSON.parse(raw));return;}
    // migrate from v8
    const old=localStorage.getItem('shopapp_v8')||localStorage.getItem('shopapp_v7');
    if(old){
      const od=JSON.parse(old);
      if(od.shops)od.shops.forEach((s,i)=>{if(data.shops[i])merge(data.shops[i],s);});
      if(od.staff)data.staff=od.staff;
      if(od.transfers)data.transfers=od.transfers;
      if(od.accounts)data.accounts=od.accounts;
      if(od.ledger)data.ledger=od.ledger;
    }
  }catch(e){console.warn(e);}
  ensure();
}
function merge(t,s){Object.keys(s).forEach(k=>{if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])&&t[k]&&typeof t[k]==='object'&&!Array.isArray(t[k]))merge(t[k],s[k]);else t[k]=s[k];});}
function ensure(){
  while(data.shops.length<4)data.shops.push(defShop());
  while(data.staff.length<4)data.staff.push([]);
  data.shops.forEach(s=>{
    if(!s.sales)s.sales=[];
    if(!s.accessories)s.accessories=[];
    if(!s.repairing)s.repairing=[];
    if(!s.recharge)s.recharge=[];
    if(!s.expenses)s.expenses=[];
    if(!s.expTags)s.expTags=[];
    if(!s.balanceAccounts)s.balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
    if(!s.balanceAccounts.cash)s.balanceAccounts.cash={balance:0,entries:[]};
    if(!s.balanceAccounts.upi)s.balanceAccounts.upi=[];
    if(!s.balanceAccounts.bank)s.balanceAccounts.bank=[];
  });
  if(!data.accounts)data.accounts=[];
  if(!data.ledger)data.ledger=[];
  if(!data.transfers)data.transfers=[];
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length<3?d:`${p[2]}/${p[1]}/${p[0].slice(2)}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200);}
function isOwner(){return session?.role==='owner';}
function isManager(){return session?.role==='owner'||session?.role==='manager';}
function si(key){return key?activeShops[key]:session?.shopIdx??0;}
function shopSI(){return isOwner()?null:session?.shopIdx;}

// ── BALANCE HELPERS ───────────────────────────────────────────────────────────
function balOpts(shopIdx){
  const s=data.shops[shopIdx];
  return `<option value="cash">💵 Cash</option>`+
    (s.balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">📲 ${u.name}</option>`).join('')+
    (s.balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">🏦 ${b.name}</option>`).join('');
}
function debit(shopIdx,key,amt){adjBal(shopIdx,key,-Math.abs(amt));}
function credit(shopIdx,key,amt){adjBal(shopIdx,key,Math.abs(amt));}
function adjBal(shopIdx,key,amt){
  const s=data.shops[shopIdx].balanceAccounts;
  if(key==='cash')s.cash.balance=+(s.cash.balance||0)+ +amt;
  else if(key?.startsWith('upi_')){const i=+key.slice(4);if(s.upi[i])s.upi[i].balance=+(s.upi[i].balance||0)+ +amt;}
  else if(key?.startsWith('bank_')){const i=+key.slice(5);if(s.bank[i])s.bank[i].balance=+(s.bank[i].balance||0)+ +amt;}
}
function balLabel(shopIdx,key){
  const s=data.shops[shopIdx].balanceAccounts;
  if(key==='cash')return 'Cash';
  if(key?.startsWith('upi_'))return s.upi[+key.slice(4)]?.name||'UPI';
  if(key?.startsWith('bank_'))return s.bank[+key.slice(5)]?.name||'Bank';
  return key||'';
}

// ── ACCOUNT HELPERS ───────────────────────────────────────────────────────────
function acctOpts(shopIdx,placeholder='— No Account —'){
  return `<option value="">${placeholder}</option>`+
    data.accounts.filter(a=>a.shopIdx===shopIdx).map(a=>`<option value="${a.id}">[${a.type}] ${a.name}</option>`).join('');
}
function acctName(id){return data.accounts.find(a=>a.id===id)?.name||'';}
function addLedger(accountId,date,type,amount,note,source,shopIdx){
  if(!accountId||!amount)return;
  data.ledger.push({id:uid(),accountId,date:date||todayISO(),type,amount:+amount,note:note||'',source:source||'manual',shopIdx});
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
let _role='owner';
function setRole(r){
  _role=r;
  document.querySelectorAll('.role-tab').forEach((b,i)=>b.classList.toggle('active',['owner','manager','staff'][i]===r));
  document.getElementById('shopFieldWrap').style.display=r==='owner'?'none':'block';
}
function doLogin(){
  const pass=document.getElementById('loginPass').value.trim();
  const shopIdx=+document.getElementById('loginShop').value;
  let ok=false,sess={};
  if(_role==='owner'&&pass===OWNER_PASS){ok=true;sess={role:'owner',shopIdx:null};}
  else if(_role==='manager'){if(pass===SHOPS[shopIdx].pass){ok=true;sess={role:'manager',shopIdx};}}
  else if(_role==='staff'&&pass===STAFF_PASS){ok=true;sess={role:'staff',shopIdx};}
  if(ok){
    session=sess;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginPass').value='';
    if(sess.shopIdx!==null)Object.keys(activeShops).forEach(k=>activeShops[k]=sess.shopIdx);
    buildNav();switchPage('dashboard');
    document.getElementById('barTitle').textContent='🏪 '+(sess.shopIdx!==null?SHOPS[sess.shopIdx].name:'All Branches — Owner');
    document.getElementById('barSub').textContent=sess.role==='owner'?'Owner View':sess.role==='manager'?'Manager — '+SHOPS[sess.shopIdx].manager:'Staff';
  }else{document.getElementById('loginErr').textContent='Incorrect password.';}
}
function doLogout(){session=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}

// ── NAV ───────────────────────────────────────────────────────────────────────
const NAV=[
  {id:'sales',icon:'📱',label:'Sales'},
  {id:'expense',icon:'💸',label:'Expense'},
  {id:'balance',icon:'💰',label:'Balance'},
  {id:'staff',icon:'👤',label:'Staff'},
  {id:'transfer',icon:'🔄',label:'Transfer'},
  {id:'accounts',icon:'📒',label:'Accounts'},
  {id:'dashboard',icon:'📊',label:'Dashboard'},
];
function buildNav(){
  document.getElementById('bottomNav').innerHTML=NAV.map(n=>`<button class="nav-item${activePage===n.id?' active':''}" onclick="switchPage('${n.id}')"><span class="icon">${n.icon}</span>${n.label}</button>`).join('');
}
function switchPage(p){
  activePage=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById('page_'+p)?.classList.add('active');
  buildNav();renderPage(p);
}
function renderPage(p){
  ({sales:renderSales,expense:renderExpense,balance:renderBalance,staff:renderStaff,transfer:renderTransfer,accounts:renderAccounts,dashboard:renderDashboard}[p]||function(){})();
}
function shopTabs(containerId,key){
  const c=document.getElementById(containerId);if(!c)return;
  if(!isOwner()){c.innerHTML='';return;}
  c.innerHTML=SHOPS.map((s,i)=>`<button class="shop-tab${activeShops[key]===i?' active':''}" onclick="activeShops['${key}']=${i};renderPage('${key}')">${s.name}</button>`).join('');
}

// ── SALES ─────────────────────────────────────────────────────────────────────
// Sales page: no shop tabs (each user sees their own shop only)
// Owner sees a shop selector at top
function renderSales(){
  const shopIdx=isOwner()?(activeShops.sales??0):(session?.shopIdx??0);
  if(!data.shops[shopIdx]){ensure();}
  const tab=window._salesTab||'phones';
  const tabs=['phones','accessories','recharge'].map(t=>`<button class="sub-tab${tab===t?' active':''}" onclick="window._salesTab='${t}';renderSales()">${{phones:'📱 Phones',accessories:'🔌 Acc/Rep',recharge:'📶 Recharge'}[t]}</button>`).join('');
  const ownerShopSel=isOwner()?`<div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto">${SHOPS.map((s,i)=>`<button class="shop-tab${activeShops.sales===i?' active':''}" onclick="activeShops.sales=${i};renderSales()">${s.name}</button>`).join('')}</div>`:'';
  let body='';

  if(tab==='phones'){
    const entries=(data.shops[shopIdx].sales||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
    body=`
    <div id="saleBar" class="sale-bar"><div><div style="font-size:11px;opacity:0.8">Total Sale</div><div style="font-size:26px;font-weight:800">₹<span id="saleTot">0</span></div></div><div style="text-align:right;font-size:12px;opacity:0.8">Cash+UPI+Bank+Swipe+Baki−Udhari−Exchange</div></div>
    <div class="card"><div class="card-title">➕ Day-End Phone Sales</div>
      <div class="two-col">
        <div class="field"><label>Date</label><input type="date" id="s_date" value="${todayISO()}"></div>
        <div class="field"><label>Qty Sold</label><input type="number" id="s_qty" placeholder="0" min="0"></div>
      </div>
      <div class="two-col">
        <div class="field"><label>💵 Cash (₹)</label><input type="number" id="s_cash" placeholder="0" oninput="calcST()"></div>
        <div class="field"><label>📲 UPI (₹)</label><input type="number" id="s_upi" placeholder="0" oninput="calcST()"></div>
      </div>
      <div class="two-col">
        <div class="field"><label>🏦 Bank (₹)</label><input type="number" id="s_bank" placeholder="0" oninput="calcST()"></div>
        <div class="field"><label>💳 Swipe (₹)</label><input type="number" id="s_swipe" placeholder="0" oninput="calcST()"></div>
      </div>
      <div class="field"><label>🔁 Exchange (₹ — deducted from total)</label><input type="number" id="s_exch" placeholder="0" oninput="calcST()"></div>
      <div style="background:#fef9f0;border-radius:12px;padding:12px;margin:8px 0">
        <div style="font-size:11px;font-weight:800;color:#856404;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Udhari / Baki Jama (optional)</div>
        <div class="two-col">
          <div class="field"><label>Udhari (₹ — customer owes)</label><input type="number" id="s_udhari" placeholder="0" oninput="calcST()"></div>
          <div class="field"><label>Baki Jama (₹ — received back)</label><input type="number" id="s_bakijama" placeholder="0" oninput="calcST()"></div>
        </div>
        <div class="two-col">
          <div class="field"><label>Customer Account</label><select id="s_udhAcct">${acctOpts(shopIdx,'— Select Account —')}</select></div>
          <div class="field"><label>Baki Received In</label><select id="s_bakiTo"><option value="">— N/A —</option>${balOpts(shopIdx)}</select></div>
        </div>
      </div>
      <div class="field"><label>Note (optional)</label><input type="text" id="s_note" placeholder="Any note"></div>
      <button class="save-btn" onclick="addSale(${shopIdx})">Save</button>
    </div>

function renderSaleRow(e,i,shopIdx,type){
  const editId=`edit_${type}_${i}`;
  const isEdit=window._editing===editId;
  if(isEdit&&isManager()){
    const qtyOrNote=type==='sales'
      ?'<div class="field"><label>Qty</label><input type="number" id="ed_qty" value="'+(e.qty||0)+'"></div>'
      :'<div class="field"><label>Note</label><input type="text" id="ed_note" value="'+(e.note||'')+'"></div>';
    const noteField=type==='sales'?'<div class="field"><label>Note</label><input type="text" id="ed_note" value="'+(e.note||'')+'"></div>':'';
    return '<div class="edit-row">'
      +'<div style="font-size:12px;font-weight:700;color:#856404;margin-bottom:8px">✏️ Editing '+fmtDate(e.date)+'</div>'
      +'<div class="two-col"><div class="field"><label>Date</label><input type="date" id="ed_date" value="'+e.date+'"></div>'+qtyOrNote+'</div>'
      +'<div class="two-col"><div class="field"><label>💵 Cash</label><input type="number" id="ed_cash" value="'+(e.cash||0)+'"></div><div class="field"><label>📲 UPI</label><input type="number" id="ed_upi" value="'+(e.upi||0)+'"></div></div>'
      +'<div class="two-col"><div class="field"><label>🏦 Bank</label><input type="number" id="ed_bank" value="'+(e.bank||0)+'"></div><div class="field"><label>💳 Swipe</label><input type="number" id="ed_swipe" value="'+(e.swipe||0)+'"></div></div>'
      +noteField
      +'<div style="display:flex;gap:8px;margin-top:8px">'
      +'<button onclick="saveEdit('+shopIdx+',\''+type+'\','+i+')" style="flex:1;padding:10px;background:#1a7a4a;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">Save</button>'
      +'<button onclick="window._editing=null;renderSales()" style="flex:1;padding:10px;background:#f0ede8;color:#555;border:none;border-radius:10px;font-weight:700;cursor:pointer">Cancel</button>'
      +'<button onclick="delEntry('+shopIdx+',\''+type+'\','+i+')" style="padding:10px 14px;background:#c0392b;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">Del</button>'
      +'</div></div>';
  }
  const payParts=[e.cash?`💵₹${fmt(e.cash)}`:'',e.upi?`📲₹${fmt(e.upi)}`:'',e.bank?`🏦₹${fmt(e.bank)}`:'',e.swipe?`💳₹${fmt(e.swipe)}`:'',e.exchange?`🔁-₹${fmt(e.exchange)}`:'',e.udhari?`Udhari-₹${fmt(e.udhari)}`:'',e.bakijama?`Baki+₹${fmt(e.bakijama)}`:''].filter(Boolean).join(' ');
  const clickAttr=isManager()?'onclick="window._editing=\''+editId+'\';renderSales()" style="cursor:pointer"':'';
  const qtySpan=(type==='sales'&&e.qty)?'<span style="font-size:11px;color:#888">× '+e.qty+'</span>':'';
  const noteSpan=e.note?'<span style="font-size:11px;color:#aaa;margin-left:4px">'+e.note+'</span>':'';
  return '<div class="entry-row" '+clickAttr+'><div><div class="entry-main g">₹'+fmt(e.total||e.amount||0)+' '+qtySpan+noteSpan+'</div><div class="entry-sub">'+payParts+'</div></div><span class="entry-date">'+fmtDate(e.date)+'</span></div>';
}

function calcST(){
  const v=(+document.getElementById('s_cash')?.value||0)+(+document.getElementById('s_upi')?.value||0)+(+document.getElementById('s_bank')?.value||0)+(+document.getElementById('s_swipe')?.value||0)+(+document.getElementById('s_bakijama')?.value||0)-(+document.getElementById('s_udhari')?.value||0)-(+document.getElementById('s_exch')?.value||0);
  const el=document.getElementById('saleTot');if(el)el.textContent=fmt(Math.max(0,v));
}
function calcAT(){const v=(+document.getElementById('ac_cash')?.value||0)+(+document.getElementById('ac_upi')?.value||0)+(+document.getElementById('ac_bank')?.value||0)+(+document.getElementById('ac_swipe')?.value||0);const el=document.getElementById('acTot');if(el)el.textContent='₹'+fmt(v);}
function calcRT(){const v=(+document.getElementById('rp_cash')?.value||0)+(+document.getElementById('rp_upi')?.value||0)+(+document.getElementById('rp_bank')?.value||0)+(+document.getElementById('rp_swipe')?.value||0);const el=document.getElementById('rpTot');if(el)el.textContent='₹'+fmt(v);}
function calcRCT(){const v=(+document.getElementById('rc_cash')?.value||0)+(+document.getElementById('rc_upi')?.value||0)+(+document.getElementById('rc_bank')?.value||0)+(+document.getElementById('rc_swipe')?.value||0);const el=document.getElementById('rcTot');if(el)el.textContent='₹'+fmt(v);}

function makeDayEntry(prefix,type,shopIdx){
  const cash=+document.getElementById(`${prefix}_cash`)?.value||0;
  const upi=+document.getElementById(`${prefix}_upi`)?.value||0;
  const bank=+document.getElementById(`${prefix}_bank`)?.value||0;
  const swipe=+document.getElementById(`${prefix}_swipe`)?.value||0;
  const total=cash+upi+bank+swipe;
  if(!total){toast('Enter at least one amount');return null;}
  const date=document.getElementById(`${prefix}_date`)?.value||todayISO();
  const note=document.getElementById(`${prefix}_note`)?.value?.trim()||'';
  return {id:uid(),date,cash,upi,bank,swipe,total,note};
}
window.addSale=function(si){
  const cash=+document.getElementById('s_cash')?.value||0;
  const upi=+document.getElementById('s_upi')?.value||0;
  const bank=+document.getElementById('s_bank')?.value||0;
  const swipe=+document.getElementById('s_swipe')?.value||0;
  const exch=+document.getElementById('s_exch')?.value||0;
  const udhari=+document.getElementById('s_udhari')?.value||0;
  const bakijama=+document.getElementById('s_bakijama')?.value||0;
  const total=cash+upi+bank+swipe+bakijama-udhari-exch;
  if(!cash&&!upi&&!bank&&!swipe&&!udhari&&!bakijama){toast('Enter at least one amount');return;}
  const date=document.getElementById('s_date')?.value||todayISO();
  const udhAcct=document.getElementById('s_udhAcct')?.value||'';
  const bakiTo=document.getElementById('s_bakiTo')?.value||'';
  const e={id:uid(),date,qty:+document.getElementById('s_qty')?.value||0,cash,upi,bank,swipe,exchange:exch,udhari,bakijama,udhAcct,total,note:document.getElementById('s_note')?.value?.trim()||''};
  data.shops[si].sales.push(e);
  if(cash>0)credit(si,'cash',cash);
  if(upi>0){const u=data.shops[si].balanceAccounts.upi||[];u.length?credit(si,'upi_0',upi):credit(si,'cash',upi);}
  if(bank>0){const b=data.shops[si].balanceAccounts.bank||[];b.length?credit(si,'bank_0',bank):credit(si,'cash',bank);}
  if(udhari>0&&udhAcct)addLedger(udhAcct,date,'dr',udhari,'Udhari - phone sale','sale',si);
  if(bakijama>0&&udhAcct)addLedger(udhAcct,date,'cr',bakijama,'Baki Jama received','sale',si);
  if(bakijama>0&&bakiTo)credit(si,bakiTo,bakijama);
  save();toast('Sale saved!');
  ['s_cash','s_upi','s_bank','s_swipe','s_qty','s_exch','s_udhari','s_bakijama','s_note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  if(document.getElementById('s_udhAcct'))document.getElementById('s_udhAcct').value='';
  calcST();renderSales();
};
window.addAccEntry=function(si){const e=makeDayEntry('ac','accessories',si);if(!e)return;data.shops[si].accessories.push(e);save();toast('Saved!');renderSales();};
window.addRepEntry=function(si){const e=makeDayEntry('rp','repairing',si);if(!e)return;data.shops[si].repairing.push(e);save();toast('Saved!');renderSales();};
window.addRcEntry=function(si){const e=makeDayEntry('rc','recharge',si);if(!e)return;data.shops[si].recharge.push(e);save();toast('Saved!');renderSales();};
window.addUdhari=function(si){
  const udhAmt=+document.getElementById('udh_amt')?.value||0;
  const bakiAmt=+document.getElementById('baki_amt')?.value||0;
  if(!udhAmt&&!bakiAmt){toast('Enter an amount');return;}
  const acctId=document.getElementById('udh_acct')?.value||'';
  const bakiTo=document.getElementById('baki_to')?.value||'';
  const date=document.getElementById('udh_date')?.value||todayISO();
  const note=document.getElementById('udh_note')?.value?.trim()||'';
  const e={id:uid(),date,udhari:udhAmt,bakijama:bakiAmt,udhAcct:acctId,udhNote:note,total:bakiAmt-udhAmt};
  data.shops[si].sales.push(e);
  if(udhAmt&&acctId)addLedger(acctId,date,'dr',udhAmt,note||'Udhari','sale',si);
  if(bakiAmt&&acctId)addLedger(acctId,date,'cr',bakiAmt,note||'Baki Jama received','sale',si);
  if(bakiAmt&&bakiTo)credit(si,bakiTo,bakiAmt);
  save();toast('Saved!');renderSales();
};
window.saveEdit=function(si,type,i){
  const arr=data.shops[si][type];if(!arr||!arr[i])return;
  const cash=+document.getElementById('ed_cash')?.value||0;
  const upi=+document.getElementById('ed_upi')?.value||0;
  const bank=+document.getElementById('ed_bank')?.value||0;
  const swipe=+document.getElementById('ed_swipe')?.value||0;
  arr[i]={...arr[i],date:document.getElementById('ed_date')?.value||arr[i].date,cash,upi,bank,swipe,total:cash+upi+bank+swipe,qty:+document.getElementById('ed_qty')?.value||arr[i].qty||0,note:document.getElementById('ed_note')?.value?.trim()||arr[i].note||''};
  save();window._editing=null;toast('Updated!');renderSales();
};
window.delEntry=function(si,type,i){if(!confirm('Delete this entry?'))return;data.shops[si][type].splice(i,1);save();window._editing=null;toast('Deleted!');renderSales();};

      <div class="field"><label>From</label><select id="tr_from">${shopOpts}</select></div>

    </div>

    </div>

function trBalChange(){
  const isBank=document.getElementById('tr_bal')?.value==='bank';
  document.getElementById('tr_bank_wrap').style.display=isBank?'block':'none';
  if(isBank){const fi=+document.getElementById('tr_from')?.value||0;const banks=data.shops[fi].balanceAccounts.bank||[];document.getElementById('tr_bank_idx').innerHTML=banks.map((b,i)=>`<option value="${i}">${b.name}</option>`).join('')||'<option>No bank accounts</option>';}
}
window.addTransfer=function(){
  const from=+document.getElementById('tr_from')?.value||0;
  const to=+document.getElementById('tr_to')?.value||0;
  const amt=+document.getElementById('tr_amt')?.value||0;
  const balType=document.getElementById('tr_bal')?.value||'cash';
  if(from===to){toast('From and To must differ');return;}
  if(!amt){toast('Enter amount');return;}
  const note=document.getElementById('tr_note')?.value?.trim()||'';
  const date=todayISO();
  data.transfers.push({id:uid(),date,from,to,amount:amt,balType,note});
  if(balType==='cash'){debit(from,'cash',amt);credit(to,'cash',amt);}
  else{const bi=+document.getElementById('tr_bank_idx')?.value||0;debit(from,`bank_${bi}`,amt);const toBanks=data.shops[to].balanceAccounts.bank||[];toBanks.length?credit(to,'bank_0',amt):credit(to,'cash',amt);}
  // ledger: to-branch account in from-shop shows DR (they received from us)
  const fromName=SHOPS[from].name,toName=SHOPS[to].name;
  let toAcct=data.accounts.find(a=>a.name===`Branch:${toName}`&&a.shopIdx===from);
  if(!toAcct){toAcct={id:uid(),name:`Branch:${toName}`,type:'Custom',phone:'',shopIdx:from,notes:'Inter-branch'};data.accounts.push(toAcct);}
  let fromAcct=data.accounts.find(a=>a.name===`Branch:${fromName}`&&a.shopIdx===to);
  if(!fromAcct){fromAcct={id:uid(),name:`Branch:${fromName}`,type:'Custom',phone:'',shopIdx:to,notes:'Inter-branch'};data.accounts.push(fromAcct);}
  addLedger(toAcct.id,date,'dr',amt,`Sent to ${toName}${note?' - '+note:''}`.trim(),'transfer',from);
  addLedger(fromAcct.id,date,'cr',amt,`Received from ${fromName}${note?' - '+note:''}`.trim(),'transfer',to);
  save();toast('Transfer saved!');renderTransfer();
};

  const mRch=rch.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+(e.total||0),0);

  <div class="metric-grid">
    <div class="metric"><div class="metric-label">📱 Phone Sales</div><div class="metric-value g">₹${fmt(mSaleAmt)}</div></div>
    <div class="metric"><div class="metric-label">💸 Expenses</div><div class="metric-value r">₹${fmt(mExp)}</div></div>
    <div class="metric"><div class="metric-label">🔌 Accessories</div><div class="metric-value">₹${fmt(mAcc)}</div></div>
    <div class="metric"><div class="metric-label">🔧 Repairing</div><div class="metric-value">₹${fmt(mRep)}</div></div>
    <div class="metric"><div class="metric-label">📶 Recharge</div><div class="metric-value">₹${fmt(mRch)}</div></div>
    <div class="metric"><div class="metric-label">⚠️ Outstanding</div><div class="metric-value r">₹${fmt(outstanding)}</div></div>
  </div>
  <div class="sec-hdr">Balances</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">💵 Cash</div><div class="metric-value">₹${fmt(cashBal)}</div></div>
    <div class="metric"><div class="metric-label">📲 UPI Total</div><div class="metric-value">₹${fmt(upiTot)}</div></div>
    <div class="metric" style="grid-column:1/-1"><div class="metric-label">🏦 Bank Total</div><div class="metric-value">₹${fmt(bankTot)}</div></div>
  </div>
  ${isOwner()?`<div class="card"><div class="card-title">⚖️ Set Adjustment</div>
    <div class="field"><input type="number" id="adj_v" value="${adj}" placeholder="0 or negative for short"></div>
    <button class="save-btn" onclick="saveAdj(${shopIdx})">Save</button></div>`:''}`;
}
window.saveAdj=function(si){data.shops[si].adjustment=+document.getElementById('adj_v')?.value||0;save();toast('Saved!');renderDashboard();};

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
</script>


</body></html>
