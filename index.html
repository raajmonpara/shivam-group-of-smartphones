<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────────────────
const SB_URL = 'https://zdvjqczstintklvnyyjh.supabase.co';
const SB_KEY = 'sb_publishable_YaDUN3wo7_wvJjSId0TFHg_n7iPYZin';
const USE_SYNC = true;
let _pollInterval = null;

// ── SHOPS CONFIG ──────────────────────────────────────────────────────────────
const SHOPS = [
  {id:'poojara',   name:'POOJARA',          pass:'poojara123',   manager:'NIKUNJ',  hasSales:true,  hasAccRep:false, hasRecharge:true},
  {id:'ramdev',    name:'RAMDEV',            pass:'ramdev123',    manager:'PUNIT',   hasSales:true,  hasAccRep:false, hasRecharge:true},
  {id:'kosad',     name:'SHIVAM (KOSAD)',    pass:'shivam1123',   manager:'KISHAN',  hasSales:true,  hasAccRep:true, hasRecharge:true},
  {id:'khodiyar',  name:'SHIVAM (KHODIYAR)',pass:'shivam2123',   manager:'RAJVEER', hasSales:true,  hasAccRep:true, hasRecharge:true},
  {id:'pacc',      name:'P ACC',             pass:'pacc123',      manager:'P-MGR',   hasSales:false, hasAccRep:true, hasRecharge:false},
  {id:'rdacc',     name:'RD ACC',            pass:'rdacc123',     manager:'RD-MGR',  hasSales:false, hasAccRep:true, hasRecharge:false},
];
const OWNER_PASS = 'owner@123';
const STAFF_PASS = 'staff123';
const ACCT_TYPES = ['Dealer','Franchise','Staff','Owner','Customer','Custom'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let session = null, activePage = 'dashboard';
let activeShops = {expense:'poojara',balance:'poojara',staff:'poojara',accounts:'poojara',dashboard:'poojara',recharge:'poojara',sales:'poojara',accrep:'pacc'};
let fbDb = null, _lastSaved = null;

// ── DATA TEMPLATE ─────────────────────────────────────────────────────────────
const defShop = () => ({
  sales:[], accessories:[], repairing:[], recharge:[], expenses:[], expTags:[],
  balanceAccounts:{cash:{balance:0,entries:[]},upi:[],bank:[]},
  adjustment:0
});
let data = {
  shops: Object.fromEntries(SHOPS.map(s=>[s.id, defShop()])),
  staff: Object.fromEntries(SHOPS.map(s=>[s.id, []])),
  transfers:[], accounts:[], ledger:[], changes:[]
};

// ── SUPABASE SYNC ─────────────────────────────────────────────────────────────
async function sbFetch(method, body){
  const res = await fetch(`${SB_URL}/rest/v1/appdata?id=eq.main`, {
    method, headers: {
      'Content-Type':'application/json',
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Prefer': method==='PATCH'?'return=minimal':'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  return method==='PATCH' ? null : res.json();
}
async function initFirebase(){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  if(!USE_SYNC){
    dot.className='sync-dot error';
    txt.textContent='Offline mode (Supabase not configured)';
    loadLocal(); return;
  }
  try{
    const rows = await sbFetch('GET');
    if(rows && rows[0]?.payload){
      mergeData(rows[0].payload);
      ensure();
    } else { loadLocal(); }
    dot.className='sync-dot connected';
    txt.textContent='Connected — live sync active';
    document.getElementById('appSyncDot').textContent='🟢';
    // Poll every 8 seconds for updates from other devices
    _pollInterval = setInterval(async ()=>{
      try{
        const rows = await sbFetch('GET');
        if(rows && rows[0]?.payload){
          const remote = rows[0].payload;
          if(JSON.stringify(remote)!==_lastSaved){
            mergeData(remote); ensure();
            if(session){
              // Only auto-refresh dashboard and changes — never wipe active forms
              if(activePage==='dashboard')renderDashboard();
              else if(activePage==='changes')renderChanges();
              // For other pages, just update the history/list part silently
              else if(activePage==='sales'){const si=activeShops.sales||session.shopIdx;if(si)renderSalesHistory(si);}
              else if(activePage==='accrep'){const si=activeShops.accrep||session.shopIdx;const sub=window._accTab||'acc';const arr=sub==='acc'?'accessories':'repairing';const pfx=sub==='acc'?'ac':'rp';if(si)renderARHistory(si,arr,pfx);}
              else if(activePage==='expense'){const si=activeShops.expense||session.shopIdx;if(si)renderExpHistory(si);}
              else if(activePage==='recharge'){renderRecharge();}
            }
          }
        }
      }catch(e){}
    }, 8000);
  }catch(e){
    dot.className='sync-dot error';
    txt.textContent='Sync error — offline mode';
    loadLocal();
  }
}
async function save(){
  showSaving();
  const d = JSON.parse(JSON.stringify(data));
  _lastSaved = JSON.stringify(d);
  if(USE_SYNC){
    try{
      await sbFetch('PATCH', {payload: d, updated_at: new Date().toISOString()});
    }catch(e){ saveLocal(d); }
  } else { saveLocal(d); }
  hideSaving();
}
function saveLocal(d){ try{localStorage.setItem('shopapp_v9',JSON.stringify(d||data));}catch(e){} }
function loadLocal(){
  try{
    const raw=localStorage.getItem('shopapp_v9');
    if(raw){mergeData(JSON.parse(raw));}
  }catch(e){}
  ensure();
}
function showSaving(){const el=document.getElementById('savingInd');if(el){el.style.opacity='1';}}
function hideSaving(){setTimeout(()=>{const el=document.getElementById('savingInd');if(el)el.style.opacity='0';},600);}

// ── HELPERS ───────────────────────────────────────────────────────────────────
window.setExpNote=function(t){const el=document.getElementById('exp_note');if(el)el.value=t;};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function nowISO(){return new Date().toISOString();}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length<3?d:`${p[2]}/${p[1]}/${p[0].slice(2)}`;}
function fmtDT(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200);}
function isOwner(){return session?.role==='owner';}
function isManager(){return session?.role==='owner'||session?.role==='manager';}
function curShop(key){return key?activeShops[key]:session?.shopIdx??SHOPS[0].id;}
function shopObj(id){return SHOPS.find(s=>s.id===id)||SHOPS[0];}

function mergeData(src){
  if(!src)return;
  // shops
  if(src.shops){
    SHOPS.forEach(s=>{
      if(src.shops[s.id]){
        if(!data.shops[s.id])data.shops[s.id]=defShop();
        Object.assign(data.shops[s.id],src.shops[s.id]);
        if(!data.shops[s.id].balanceAccounts)data.shops[s.id].balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
      }
    });
  }
  if(src.staff){Object.keys(src.staff).forEach(k=>data.staff[k]=src.staff[k]);}
  if(src.transfers)data.transfers=src.transfers;
  if(src.accounts)data.accounts=src.accounts;
  if(src.ledger)data.ledger=src.ledger;
  if(src.changes)data.changes=src.changes;
}
function ensure(){
  SHOPS.forEach(s=>{
    if(!data.shops[s.id])data.shops[s.id]=defShop();
    const sh=data.shops[s.id];
    ['sales','accessories','repairing','recharge','expenses','expTags'].forEach(k=>{if(!sh[k])sh[k]=[];});
    if(!sh.balanceAccounts)sh.balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
    if(!sh.balanceAccounts.cash)sh.balanceAccounts.cash={balance:0,entries:[]};
    if(!sh.balanceAccounts.upi)sh.balanceAccounts.upi=[];
    if(!sh.balanceAccounts.bank)sh.balanceAccounts.bank=[];
    if(!data.staff[s.id])data.staff[s.id]=[];
  });
  if(!data.accounts)data.accounts=[];
  if(!data.ledger)data.ledger=[];
  if(!data.transfers)data.transfers=[];
  if(!data.changes)data.changes=[];
}

// ── CHANGE LOG ────────────────────────────────────────────────────────────────
function logChange(action, section, detail, shopId){
  data.changes.unshift({
    id:uid(), ts:nowISO(), user:session?.name||session?.role||'?',
    shopId:shopId||session?.shopIdx||'', action, section, detail
  });
  if(data.changes.length>200)data.changes=data.changes.slice(0,200);
}

// ── BALANCE HELPERS ───────────────────────────────────────────────────────────
function balOpts(shopId){
  const sh=data.shops[shopId];
  return `<option value="cash">💵 Cash</option>`+
    (sh.balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">📲 ${u.name}</option>`).join('')+
    (sh.balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">🏦 ${b.name}</option>`).join('');
}
function upiOpts(shopId){return (data.shops[shopId].balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">${u.name}</option>`).join('');}
function bankOpts(shopId){return (data.shops[shopId].balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">${b.name}</option>`).join('');}
function debit(shopId,key,amt){adjBal(shopId,key,-Math.abs(+amt));}
function credit(shopId,key,amt){adjBal(shopId,key,+Math.abs(+amt));}
function adjBal(shopId,key,amt){
  const s=data.shops[shopId].balanceAccounts;
  if(key==='cash')s.cash.balance=+(s.cash.balance||0)+ +amt;
  else if(key?.startsWith('upi_')){const i=+key.slice(4);if(s.upi[i])s.upi[i].balance=+(s.upi[i].balance||0)+ +amt;}
  else if(key?.startsWith('bank_')){const i=+key.slice(5);if(s.bank[i])s.bank[i].balance=+(s.bank[i].balance||0)+ +amt;}
}
function balLabel(shopId,key){
  const s=data.shops[shopId].balanceAccounts;
  if(!key||key==='cash')return 'Cash';
  if(key.startsWith('upi_'))return s.upi[+key.slice(4)]?.name||'UPI';
  if(key.startsWith('bank_'))return s.bank[+key.slice(5)]?.name||'Bank';
  return key;
}
function acctOpts(shopId,ph='— Select Account —'){
  return `<option value="">${ph}</option>`+
    data.accounts.filter(a=>a.shopIdx===shopId).map(a=>`<option value="${a.id}">[${a.type}] ${a.name}</option>`).join('');
}
function acctName(id){return data.accounts.find(a=>a.id===id)?.name||'';}
// ── BALANCE EFFECTS TRACKING ──────────────────────────────────────────────────
function collectBalEffect(shopId, key, amount){
  // returns an effect object for later reversal
  adjBal(shopId, key, +amount);
  return {key, amount: +amount};
}
function reverseEffects(shopId, effects){
  (effects||[]).forEach(e=>adjBal(shopId, e.key, -e.amount));
}
function applyPayments(shopId, cash, upi, upiAcct, bank, bankAcct, swipe, swipeAcct){
  const effects=[];
  if(cash>0)effects.push(collectBalEffect(shopId,'cash',cash));
  if(upi>0&&upiAcct)effects.push(collectBalEffect(shopId,upiAcct,upi));
  else if(upi>0)effects.push(collectBalEffect(shopId,'cash',upi));
  if(bank>0&&bankAcct)effects.push(collectBalEffect(shopId,bankAcct,bank));
  else if(bank>0)effects.push(collectBalEffect(shopId,'cash',bank));
  if(swipe>0&&swipeAcct)effects.push(collectBalEffect(shopId,swipeAcct,swipe));
  else if(swipe>0)effects.push(collectBalEffect(shopId,'cash',swipe));
  return effects;
}
function addLedger(accountId,date,type,amount,note,source,shopId){
  if(!accountId||!amount)return;
  data.ledger.push({id:uid(),accountId,date:date||todayISO(),type,amount:+amount,note:note||'',source:source||'manual',shopId});
}

let _role='owner';
function buildLoginRoles(){
  const tabs=['owner','manager','staff'];
  document.getElementById('roleTabs').innerHTML=tabs.map(r=>`<button class="role-tab${_role===r?' active':''}" onclick="setRole('${r}')">${{owner:'👑 Owner',manager:'🧑‍💼 Manager',staff:'🧑‍🏭 Staff'}[r]}</button>`).join('');
  document.getElementById('loginShop').innerHTML=SHOPS.map((s,i)=>`<option value="${s.id}">${s.name}</option>`).join('');
}
function setRole(r){
  _role=r;
  buildLoginRoles();
  document.getElementById('shopFieldWrap').style.display=r==='owner'?'none':'block';
}
function doLogin(){
  const pass=document.getElementById('loginPass').value.trim();
  const shopId=document.getElementById('loginShop').value;
  let ok=false, sess={};
  if(_role==='owner'&&pass===OWNER_PASS){ok=true;sess={role:'owner',shopIdx:null,name:'Owner'};}
  else if(_role==='manager'){
    const s=SHOPS.find(x=>x.id===shopId);
    if(s&&pass===s.pass){ok=true;sess={role:'manager',shopIdx:shopId,name:s.manager};}
  }
  else if(_role==='staff'&&pass===STAFF_PASS){
    const s=SHOPS.find(x=>x.id===shopId);
    ok=true;sess={role:'staff',shopIdx:shopId,name:'Staff'};
  }
  if(ok){
    session=sess;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginPass').value='';
    const si=sess.shopIdx;
    if(si)Object.keys(activeShops).forEach(k=>activeShops[k]=si);
    else Object.keys(activeShops).forEach(k=>activeShops[k]=SHOPS[0].id);
    document.getElementById('barTitle').textContent='🏪 '+(si?shopObj(si).name:'All Branches');
    document.getElementById('barSub').textContent=sess.role==='owner'?'Owner':sess.role==='manager'?'Manager — '+sess.name:'Staff';
    buildNav();switchPage('dashboard');
  }else{document.getElementById('loginErr').textContent='Incorrect password.';}
}
function doLogout(){
  session=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginPass').value='';
}

  // total: cash+upi+bank+swipe+udhari-exchange. Exchange is just value deduction, NOT balance change.
  const total=cash+upi+bank+swipe+udhari-exch;

        <label style="font-size:11px;font-weight:800;color:#2980b9;margin-bottom:8px;display:block">📲 UPI Payment</label>
        <div class="two-col">
          <div><select id="rc_upi_acct" style="width:100%;padding:9px 12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:13px;background:#fff"><option value="">-- Select UPI --</option>${upiOpts(shopId)}</select></div>
          <div><input type="number" id="rc_upi" placeholder="Amount" oninput="calcRCT()" style="width:100%;padding:9px 12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:13px"></div>
        </div>
      </div>
      <div class="field" style="background:#f0fff4;border-radius:12px;padding:12px;margin-bottom:8px">
        <label style="font-size:11px;font-weight:800;color:#1a7a4a;margin-bottom:8px;display:block">🏦 Bank Transfer</label>
        <div class="two-col">
          <div><select id="rc_bank_acct" style="width:100%;padding:9px 12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:13px;background:#fff"><option value="">-- Select Bank --</option>${bankOpts(shopId)}</select></div>

    </div>
    <div id="rcHistory"></div>`;
  }
  renderRCHistory(shopId);
}
window.calcRCT=function(){
  const v=(+document.getElementById('rc_cash')?.value||0)+(+document.getElementById('rc_upi')?.value||0)+(+document.getElementById('rc_bank')?.value||0);
  const el=document.getElementById('rcTot');if(el)el.textContent='Rs.'+fmt(v);
};
window.addRechargeEntry=function(shopId){
  const cash=+document.getElementById('rc_cash')?.value||0;
  const upi=+document.getElementById('rc_upi')?.value||0;
  const bank=+document.getElementById('rc_bank')?.value||0;
  const total=cash+upi+bank;
  if(!total){toast('Enter at least one amount');return;}
  const upiAcct=document.getElementById('rc_upi_acct')?.value||'';
  const bankAcct=document.getElementById('rc_bank_acct')?.value||'';
  const effects=applyPayments(shopId,cash,upi,upiAcct,bank,bankAcct,0,'');
  const e={id:uid(),date:document.getElementById('rc_date')?.value||todayISO(),cash,upi,upiAcct,bank,bankAcct,total,note:document.getElementById('rc_note')?.value?.trim()||'',_balEffects:effects};
  if(!data.shops[shopId].recharge)data.shops[shopId].recharge=[];
  data.shops[shopId].recharge.push(e);
  save();toast('Saved!');renderRCHistory(shopId);
};
function renderRCHistory(shopId){
  const entries=(data.shops[shopId].recharge||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const rows=entries.map((e,i)=>{
    const parts=[e.cash?'Cash:'+fmt(e.cash):'',e.upi?'UPI:'+fmt(e.upi):'',e.bank?'Bank:'+fmt(e.bank):''].filter(Boolean).join(' | ');
    const click=isManager()?'onclick="delRCEntry(\''+shopId+'\','+i+')" style="color:#c0392b;background:none;border:none;cursor:pointer;font-size:17px"':'';
    return '<div class="entry-row"><div><div class="entry-main g">Rs.'+fmt(e.total||0)+(e.note?' <span style="font-size:11px;color:#aaa">'+e.note+'</span>':'')+'</div><div class="entry-sub">'+parts+'</div></div><div style="display:flex;align-items:center;gap:6px"><span class="entry-date">'+fmtDate(e.date)+'</span>'+(isManager()?'<button '+click+'>x</button>':'')+'</div></div>';
  }).join('');
  const hist=document.getElementById('rcHistory');
  if(hist)hist.innerHTML='<div class="card"><div class="card-title">📶 Recharge History</div>'+(rows||'<div class="empty">No entries</div>')+'</div>';
}
window.delRCEntry=function(shopId,i){
  if(!confirm('Delete?'))return;
  const e=data.shops[shopId].recharge[i];
  reverseEffects(shopId,e?._balEffects);
  data.shops[shopId].recharge.splice(i,1);
  save();toast('Deleted!');renderRCHistory(shopId);
};

    <div class="two-col"><div class="field"><label>From Branch</label><select id="tr_from">${shopOpts}</select></div><div class="field"><label>To Branch</label><select id="tr_to">${shopOpts}</select></div></div>

window.addTransfer=function(){
  const from=document.getElementById('tr_from')?.value||SHOPS[0].id;
  const to=document.getElementById('tr_to')?.value||SHOPS[1].id;
  const amt=+document.getElementById('tr_amt')?.value||0;
  const date=document.getElementById('tr_date')?.value||todayISO();
  const note=document.getElementById('tr_note')?.value?.trim()||'';
  if(from===to){toast('From and To must differ');return;}
  if(!amt){toast('Enter amount');return;}
  const fn=shopObj(from).name,tn=shopObj(to).name;
  // From branch: "To branch owes us" = DR on their account
  let toAcct=data.accounts.find(a=>a.name==='Branch:'+tn&&a.shopIdx===from);
  if(!toAcct){toAcct={id:uid(),name:'Branch:'+tn,type:'Custom',phone:'',shopIdx:from,notes:'Inter-branch'};data.accounts.push(toAcct);}
  // To branch: "We owe From branch" = DR on their account (outstanding)
  let fromAcct=data.accounts.find(a=>a.name==='Branch:'+fn&&a.shopIdx===to);
  if(!fromAcct){fromAcct={id:uid(),name:'Branch:'+fn,type:'Custom',phone:'',shopIdx:to,notes:'Inter-branch'};data.accounts.push(fromAcct);}
  const trId=uid();
  data.transfers.push({id:trId,date,from,to,amount:amt,note,settled:false,toAcctId:toAcct.id,fromAcctId:fromAcct.id});
  // Only the RECEIVING branch shows outstanding (they owe the sending branch)
  // Sending branch does NOT show outstanding — they just sent money/goods
  addLedger(fromAcct.id,date,'dr',amt,'Transfer received from '+fn+(note?' - '+note:''),'transfer',to);
  // No ledger entry in sending branch — they track it via the Transfers list
  save();toast('Transfer saved! Settle when payment is made.');renderTransfer();
};
window.settleTransfer=function(ti){
  const t=data.transfers[ti];if(!t||t.settled)return;
  // Ask which balance accounts to use
  const fromBalOpts=balOpts(t.from);const toBalOpts=balOpts(t.to);
  const fn=shopObj(t.from).name,tn=shopObj(t.to).name;
  document.getElementById('transferContent').insertAdjacentHTML('afterbegin',`
  <div class="card" style="border:2px solid #1a7a4a;background:#f0fff4" id="settleCard">
    <div class="card-title">✅ Settle Transfer — Rs.${fmt(t.amount)}</div>
    <div style="font-size:12px;color:#555;margin-bottom:10px">${fn} sent Rs.${fmt(t.amount)} to ${tn}. Select how payment was made:</div>
    <div class="field"><label>Deduct from (${fn} — money going out)</label><select id="settle_from_bal">${fromBalOpts}</select></div>
    <div class="field"><label>Credit to (${tn} — money coming in)</label><select id="settle_to_bal">${toBalOpts}</select></div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmSettle(${ti})" class="save-btn" style="margin-top:0">Confirm Settlement</button>
      <button onclick="document.getElementById('settleCard').remove()" style="padding:13px;background:#f0ede8;color:#555;border:none;border-radius:12px;cursor:pointer;font-weight:700;flex:1;margin-top:0">Cancel</button>
    </div>
  </div>`);
};
window.confirmSettle=function(ti){
  const t=data.transfers[ti];if(!t)return;
  const fromBal=document.getElementById('settle_from_bal')?.value||'cash';
  const toBal=document.getElementById('settle_to_bal')?.value||'cash';
  const date=todayISO();
  // Deduct from "from" branch, credit to "to" branch
  debit(t.from,fromBal,t.amount);
  credit(t.to,toBal,t.amount);
  // Mark settled and add CR to both accounts
  t.settled=true;t.settledDate=date;
  // CR in receiving branch to clear the outstanding
  if(t.fromAcctId)addLedger(t.fromAcctId,date,'cr',t.amount,'Transfer settled - paid to '+shopObj(t.from).name,'transfer_settle',t.to);
  save();toast('Settled! Balances updated.');renderTransfer();
};

function renderDashboard(){
  shopTabs('dashTabs','dashboard');

  const shop=data.shops[shopId];const shopDef=shopObj(shopId);
  const today=todayISO(),ym=today.slice(0,7);
  const sales=shop.sales||[];const expenses=shop.expenses||[];const acc=shop.accessories||[];const rep=shop.repairing||[];const rch=shop.recharge||[];
  const tSales=sales.filter(e=>e.date===today&&(e.cash||e.upi||e.bank||e.swipe||e.exchange||e.udhari));
  const tSaleAmt=tSales.reduce((s,e)=>s+(e.total||0),0);
  const tQty=tSales.reduce((s,e)=>s+(e.qty||0),0);
  const tExp=expenses.filter(e=>e.date===today).reduce((s,e)=>s+e.amount,0);
  const tAcc=acc.filter(e=>e.date===today).reduce((s,e)=>s+(e.total||0),0);
  const tRep=rep.filter(e=>e.date===today).reduce((s,e)=>s+(e.total||0),0);
  const tRch=rch.filter(e=>e.date===today).reduce((s,e)=>s+(e.total||0),0);
  const mSaleAmt=sales.filter(e=>e.date.startsWith(ym)&&(e.cash||e.upi||e.bank||e.swipe||e.exchange||e.udhari)).reduce((s,e)=>s+(e.total||0),0);
  const mExp=expenses.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+e.amount,0);
  const mAcc=acc.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+(e.total||0),0);
  const mRep=rep.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+(e.total||0),0);
  const mRch=rch.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+(e.total||0),0);
  const b=shop.balanceAccounts||{};
  const cashBal=b.cash?.balance||0;
  const upiTot=(b.upi||[]).reduce((s,u)=>s+(u.balance||0),0);
  const bankTot=(b.bank||[]).reduce((s,u)=>s+(u.balance||0),0);
  const outstanding=data.accounts.filter(a=>a.shopIdx===shopId).reduce((s,a)=>{const txns=data.ledger.filter(t=>t.accountId===a.id);const d=txns.filter(t=>t.type==='dr').reduce((x,t)=>x+t.amount,0);const c=txns.filter(t=>t.type==='cr').reduce((x,t)=>x+t.amount,0);return s+Math.max(0,d-c);},0);
  const adj=shop.adjustment||0;
  document.getElementById('dashContent').innerHTML=`
  <div style="font-size:11px;color:#888;margin-bottom:8px">📅 Today: ${fmtDate(today)} | ${shopDef.name}</div>
  <div class="sec-hdr">Today</div>
  <div class="metric-grid">
    ${shopDef.hasSales?`<div class="metric"><div class="metric-label">📱 Phone Sales</div><div class="metric-value g">Rs.${fmt(tSaleAmt)}</div><div style="font-size:11px;color:#888">${tQty} phones</div></div>`:''}
    <div class="metric"><div class="metric-label">💸 Expenses</div><div class="metric-value r">Rs.${fmt(tExp)}</div></div>
    <div class="metric"><div class="metric-label">🔌 Accessories</div><div class="metric-value">Rs.${fmt(tAcc)}</div></div>
    <div class="metric"><div class="metric-label">🔧 Repairing</div><div class="metric-value">Rs.${fmt(tRep)}</div></div>
    <div class="metric"><div class="metric-label">📶 Recharge</div><div class="metric-value">Rs.${fmt(tRch)}</div></div>
    <div class="metric" style="background:#f3eeff;border:1px solid #d4b8ff"><div class="metric-label" style="color:#6c3483">⚖️ Adjustment</div><div class="metric-value" style="color:#6c3483;font-size:15px">Rs.${fmt(Math.abs(adj))} ${adj<0?'↓ Short':adj>0?'↑ Surplus':'✓'}</div></div>
  </div>
  <div class="sec-hdr">This Month</div>
  <div class="metric-grid">
    ${shopDef.hasSales?`<div class="metric"><div class="metric-label">📱 Phone Sales</div><div class="metric-value g">Rs.${fmt(mSaleAmt)}</div></div>`:''}
    <div class="metric"><div class="metric-label">💸 Expenses</div><div class="metric-value r">Rs.${fmt(mExp)}</div></div>
    <div class="metric"><div class="metric-label">🔌 Accessories</div><div class="metric-value">Rs.${fmt(mAcc)}</div></div>
    <div class="metric"><div class="metric-label">🔧 Repairing</div><div class="metric-value">Rs.${fmt(mRep)}</div></div>
    <div class="metric"><div class="metric-label">📶 Recharge</div><div class="metric-value">Rs.${fmt(mRch)}</div></div>
    <div class="metric"><div class="metric-label">⚠️ Outstanding</div><div class="metric-value r">Rs.${fmt(outstanding)}</div></div>
  </div>
  <div class="sec-hdr">Balances</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">💵 Cash</div><div class="metric-value">₹${fmt(cashBal)}</div></div>
    <div class="metric"><div class="metric-label">📲 UPI Total</div><div class="metric-value">₹${fmt(upiTot)}</div></div>
    <div class="metric" style="grid-column:1/-1"><div class="metric-label">🏦 Bank Total</div><div class="metric-value">₹${fmt(bankTot)}</div></div>
  </div>
  ${isOwner()?`<div class="card"><div class="card-title">⚖️ Set Adjustment</div><div class="field"><input type="number" id="adj_v" value="${adj}" placeholder="0"></div><button class="save-btn" onclick="saveAdj('${shopId}')">Save</button></div>
  <div class="card" style="border:2px solid #c0392b"><div class="card-title" style="color:#c0392b">🗑️ Clear All Data</div><div style="font-size:12px;color:#888;margin-bottom:10px">Wipes everything. Cannot be undone.</div><button class="save-btn red" onclick="clearAll()">Clear All Data</button></div>`:''}`;
}
window.saveAdj=function(si){
  const newAdj=+document.getElementById('adj_v')?.value||0;
  const oldAdj=data.shops[si].adjustment||0;
  const diff=newAdj-oldAdj; // positive = surplus (add to cash), negative = short (deduct from cash)
  data.shops[si].adjustment=newAdj;
  if(diff!==0)adjBal(si,'cash',diff); // directly affects cash balance
  save();toast('Adjustment saved! Cash balance updated.');renderDashboard();
};
window.clearAll=function(){if(!isOwner())return;if(!confirm('Delete ALL data from all shops?'))return;if(!confirm('FINAL WARNING — cannot be undone. Continue?'))return;data={shops:Object.fromEntries(SHOPS.map(s=>[s.id,defShop()])),staff:Object.fromEntries(SHOPS.map(s=>[s.id,[]])),transfers:[],accounts:[],ledger:[],changes:[]};['shopapp_v9','shopapp_v8','shopapp_v7'].forEach(k=>localStorage.removeItem(k));save();toast('Cleared!');renderDashboard();};

// ── CHANGES LOG ───────────────────────────────────────────────────────────────
function renderChanges(){
  const changes=(data.changes||[]).slice(0,100);
  const rows=changes.map(c=>`<div class="change-row">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;font-weight:700;color:#c0392b">${c.action}</span>
      <span style="font-size:11px;color:#888">${fmtDT(c.ts)}</span>
    </div>
    <div style="font-size:13px;font-weight:600">${c.section} — ${shopObj(c.shopId||'')?.name||''}</div>
    <div style="font-size:11px;color:#888;margin-top:2px">${c.detail||''} | By: ${c.user||'?'}</div>
  </div>`).join('');
  document.getElementById('changesContent').innerHTML=`
  <div class="sec-hdr">🔔 Changes Log — Owner View</div>
  <div style="font-size:12px;color:#888;margin-bottom:12px">All edits and deletes made by managers. Last 100 shown.</div>
  ${rows||'<div class="card"><div class="empty">No changes logged yet</div></div>'}`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildLoginRoles();
initFirebase();
</script>
