<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;border:0.5px solid #e0ddd5}
.login-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.login-biz{font-size:12px;color:#888;margin-bottom:20px}
.login-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.role-btn{padding:10px 6px;border:0.5px solid #ddd;border-radius:10px;background:#fff;font-size:12px;cursor:pointer;text-align:center;color:#555}
.role-btn.selected{border-color:#4a4a9a;background:#f0f0fb;color:#4a4a9a;font-weight:700}
.role-btn .icon{font-size:20px;display:block;margin-bottom:4px}
.inp{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:12px;background:#fafaf8;color:#1a1a1a}
.inp:focus{outline:none;border-color:#4a4a9a}
.login-btn{width:100%;padding:12px;background:#4a4a9a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.err{color:#c0392b;font-size:12px;margin-bottom:10px;display:none}
.app-wrap{max-width:480px;margin:0 auto;padding:0 0 82px}
.topbar{background:#fff;border-bottom:0.5px solid #e0ddd5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;color:#888;margin-top:1px}
.logout-btn{font-size:12px;color:#888;background:none;border:0.5px solid #ddd;border-radius:8px;padding:5px 10px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0ddd5;display:flex;max-width:480px;margin:0 auto;z-index:10;overflow-x:auto}
.nav-btn{flex:1;min-width:46px;padding:7px 2px 5px;background:none;border:none;cursor:pointer;font-size:9px;color:#888;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .ni{font-size:17px}
.nav-btn.active{color:#4a4a9a}
.content{padding:12px}
.page{display:none}.page.active{display:block}
.shop-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.shop-tab{flex:1;min-width:70px;padding:6px 4px;font-size:11px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;text-align:center}
.shop-tab.active{background:#f0f0fb;color:#4a4a9a;font-weight:700;border-color:#4a4a9a}
.card{background:#fff;border:0.5px solid #e0ddd5;border-radius:14px;padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:#555;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#f5f4f0;border-radius:10px;padding:10px 12px}
.metric-label{font-size:11px;color:#888;margin-bottom:3px}
.metric-value{font-size:16px;font-weight:700;color:#1a1a1a}
.g{color:#1a7a4a}.r{color:#c0392b}.b{color:#2563eb}.p{color:#4a4a9a}.o{color:#b45309}.v{color:#7c3aed}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;font-size:14px;padding:9px 11px;border:0.5px solid #ddd;border-radius:9px;background:#fafaf8;color:#1a1a1a}
.field input:focus,.field select:focus{outline:none;border-color:#4a4a9a}
.field input[readonly]{background:#f0f0f0;color:#999}
.save-btn{width:100%;padding:11px;font-size:14px;font-weight:700;border:none;border-radius:10px;background:#4a4a9a;color:#fff;cursor:pointer;margin-top:4px}
.save-btn:active{transform:scale(.98)}
.entry-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-top:0.5px solid #f0ede6;gap:8px}
.entry-main{font-size:13px;color:#1a1a1a;font-weight:600}
.entry-sub{font-size:11px;color:#999;margin-top:2px}
.entry-date{font-size:11px;color:#bbb;white-space:nowrap}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}
.del-btn:hover{color:#c0392b}
.empty{text-align:center;padding:20px;color:#bbb;font-size:13px}
.staff-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:0.5px solid #f0ede6;gap:8px}
.staff-name{font-size:14px;font-weight:700}
.staff-meta{font-size:11px;color:#999;margin-top:2px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;margin-right:4px;font-weight:600}
.badge.warn{background:#fff8e1;color:#b45309}
.badge.danger{background:#fef2f2;color:#c0392b}
.badge.success{background:#f0fdf4;color:#1a7a4a}
.badge.info{background:#eff6ff;color:#2563eb}
.badge.purple{background:#fdf4ff;color:#7c3aed}
.shop-summary-block{background:#fff;border:0.5px solid #e0ddd5;border-radius:14px;padding:14px;margin-bottom:10px}
.ssname{font-size:14px;font-weight:700;margin-bottom:10px;color:#4a4a9a}
.srow{display:flex;justify-content:space-between;font-size:13px;color:#666;padding:3px 0}
.srow span:last-child{font-weight:700;color:#1a1a1a}
.divider{border:none;border-top:0.5px solid #eee;margin:8px 0}
.section-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin:8px 0 4px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.month-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.month-bar select{flex:1;font-size:13px;padding:7px 10px;border:0.5px solid #ddd;border-radius:9px;background:#fff}
.from-tag{background:#fef9ec;color:#b45309;border-radius:6px;padding:1px 7px;font-size:11px}
.to-tag{background:#f0fdf4;color:#1a7a4a;border-radius:6px;padding:1px 7px;font-size:11px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sub-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.sub-tab{flex:1;min-width:60px;padding:6px 4px;font-size:11px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;text-align:center}
.sub-tab.active{border-color:#4a4a9a;background:#f0f0fb;color:#4a4a9a;font-weight:700}
.person-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;padding:12px;margin-bottom:10px}
.person-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.net-box{background:#f5f4f0;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.net-box .lbl{font-size:12px;color:#666}
.net-box .val{font-size:16px;font-weight:700}
.tag-row{display:flex;flex-wrap:wrap;margin-bottom:8px;gap:4px}
.tag-pill{display:inline-flex;align-items:center;gap:4px;background:#f5f4f0;border:0.5px solid #ddd;border-radius:20px;padding:4px 10px;font-size:12px}
.tag-pill .tx{color:#aaa;cursor:pointer;font-size:15px;line-height:1}
.owe-we{background:#fef2f2;color:#c0392b;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:600}
.owe-they{background:#f0fdf4;color:#1a7a4a;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:600}
.dealer-card{background:#fff;border:0.5px solid #e0ddd5;border-radius:12px;padding:12px;margin-bottom:10px}
.dealer-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.dealer-name{font-size:15px;font-weight:700;color:#1a1a1a}
.dealer-due{font-size:18px;font-weight:700}
.ledger-cr{color:#1a7a4a}
.ledger-dr{color:#c0392b}
.txn-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:0.5px solid #f5f4f0;gap:6px}
.txn-type-dr{display:inline-block;background:#fef2f2;color:#c0392b;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700}
.txn-type-cr{display:inline-block;background:#f0fdf4;color:#1a7a4a;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
<div class="login-wrap"><div class="login-box">
  <div class="login-logo">🏪 Shop Manager</div>
  <div class="login-biz">Shivam Group of Smartphones</div>
  <div class="login-roles">
    <button class="role-btn" onclick="selectRole(&#39;owner&#39;)" id="role_owner"><span class="icon">👑</span>Owner</button>
    <button class="role-btn" onclick="selectRole(&#39;manager&#39;)" id="role_manager"><span class="icon">🧑‍💼</span>Manager</button>
    <button class="role-btn" onclick="selectRole(&#39;staff&#39;)" id="role_staff"><span class="icon">🧑‍🏭</span>Staff</button>
  </div>
  <div id="loginFields"></div>
  <div class="err" id="loginErr">Incorrect password. Try again.</div>
  <button class="login-btn" onclick="doLogin()">Login →</button>
</div></div>
</div>

<div id="appScreen" class="screen">
<div class="app-wrap">
  <div class="topbar">
    <div><div class="topbar-title" id="topbarTitle">Shop Manager</div><div class="topbar-sub" id="topbarSub"></div></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div class="content">
    <div class="page active" id="page_entries"><div class="shop-tabs" id="entryShopTabs"></div><div id="entryContent"></div></div>
    <div class="page" id="page_expense"><div class="shop-tabs" id="expShopTabs"></div><div id="expContent"></div></div>
    <div class="page" id="page_balance"><div class="shop-tabs" id="balShopTabs"></div><div id="balContent"></div></div>
    <div class="page" id="page_accessories"><div class="shop-tabs" id="accShopTabs"></div><div id="accContent"></div></div>
    <div class="page" id="page_staff"><div class="shop-tabs" id="staffShopTabs"></div><div id="staffContent"></div></div>
    <div class="page" id="page_borrowings"><div class="shop-tabs" id="borrowShopTabs"></div><div id="borrowContent"></div></div>
    <div class="page" id="page_ledger"><div class="shop-tabs" id="ledgerShopTabs"></div><div id="ledgerContent"></div></div>
    <div class="page" id="page_transfer"><div id="transferContent"></div></div>
    <div class="page" id="page_dashboard"><div class="shop-tabs" id="dashShopTabs"></div><div id="dashContent"></div></div>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const SHOPS=[
  {name:'POOJARA',  manager:'NIKUNJ', pass:'poojara123'},
  {name:'RAMDEV',   manager:'PUNIT',  pass:'ramdev123'},
  {name:'SHIVAM (KOSAD)',   manager:'KISHAN', pass:'shivam1123'},
  {name:'SHIVAM (KHODIYAR)',manager:'RAJVEER',pass:'shivam2123'}
];
const OWNER_PASS='owner@123', STAFF_PASS='staff123';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let session=null, activePage='entries';
let activeShops={entries:0,expense:0,balance:0,accessories:0,staff:0,borrowings:0,ledger:0,dashboard:0};
let activeStaffSub='list';
let activeEntrySub='sales';
let activeBalanceSub='cash';
let activeLedgerShop=0;
let activeLedgerDealer='';

let data={
  shops:[{},{},{},{}],
  staff:[[],[],[],[]],
  transfers:[],
  expTags:[[],[],[],[]],
  brandTags:[[],[],[],[]],
  borrowings:[],
  dealerAccounts:[[],[],[],[]],
  ledgerTxns:[[],[],[],[]]
};

const SK='shopapp_v7';
function save(){localStorage.setItem(SK,JSON.stringify(data));}
function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d){data=JSON.parse(d);}
    else{const old=localStorage.getItem('shopapp_v6');if(old){const od=JSON.parse(old);Object.assign(data,od);}}
    if(!data.borrowings)data.borrowings=[];
    if(!data.brandTags)data.brandTags=[[],[],[],[]];
    if(!data.dealerAccounts)data.dealerAccounts=[[],[],[],[]];
    if(!data.ledgerTxns)data.ledgerTxns=[[],[],[],[]];
    for(let i=0;i<4;i++){
      if(!data.shops[i].recharge)data.shops[i].recharge=[];
      if(!data.shops[i].udhari)data.shops[i].udhari=[];
      if(!data.shops[i].bakijama)data.shops[i].bakijama=[];
      if(!data.shops[i].brandSales)data.shops[i].brandSales=[];
      if(!data.shops[i].balanceAccounts)data.shops[i].balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
      if(!data.dealerAccounts[i])data.dealerAccounts[i]=[];
      if(!data.ledgerTxns[i])data.ledgerTxns[i]=[];
    }
  }catch(e){console.error(e);}
}
function fmt(n){return n?Number(n).toLocaleString('en-IN'):'0';}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(iso){if(!iso)return'';try{const[y,m,dd]=iso.split('-');return `${dd} ${MONTHS[parseInt(m)-1]} ${y.slice(2)}`;}catch(e){return iso;}}
function curYM(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function ymLabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return `${MONTHS[parseInt(m)-1]} ${y}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function monthOptions(sel){let s='';const now=new Date();for(let i=0;i<13;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;s+=`<option value="${ym}"${ym===sel?' selected':''}>${ymLabel(ym)}</option>`;}return s;}
function accessibleShops(){return session.role==='owner'?SHOPS.map((_,i)=>i):[session.shopIdx];}
function isOwner(){return session&&session.role==='owner';}
function canManageLedger(){return session&&(session.role==='owner'||session.role==='manager');}
function dateField(id,val){
  const v=val||todayISO();
  if(isOwner())return `<div class="field"><label>Date *</label><input type="date" id="${id}" value="${v}" max="${todayISO()}"></div>`;
  return `<div class="field"><label>Date</label><input type="date" id="${id}" value="${v}" readonly></div>`;
}
function getDate(id){return document.getElementById(id)?.value||todayISO();}
function tagPillsHTML(tags,deleteFn){return tags.map((t,i)=>`<span class="tag-pill">🏷️ ${t} <span class="tx" onclick="${deleteFn}(${i})">×</span></span>`).join('')||'<span style="font-size:12px;color:#bbb">No tags yet</span>';}
// ── LOGIN ──
let selectedRole=null;
function selectRole(r){
  selectedRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('role_'+r).classList.add('selected');
  const f=document.getElementById('loginFields');
  if(r==='owner')f.innerHTML=`<input class="inp" type="password" id="li_pass" placeholder="Owner password">`;
  else f.innerHTML=`<select class="inp" id="li_shop"><option value="">Select branch</option>${SHOPS.map((s,i)=>`<option value="${i}">${s.name}${r==='manager'?' — '+s.manager:''}</option>`).join('')}</select><input class="inp" type="password" id="li_pass" placeholder="Password">`;
  document.getElementById('loginErr').style.display='none';
  setTimeout(()=>document.getElementById('li_pass')?.focus(),100);
}
function doLogin(){
  if(!selectedRole){toast('Select a role');return;}
  const pass=document.getElementById('li_pass')?.value||'';
  const shopEl=document.getElementById('li_shop');
  const shopIdx=shopEl?parseInt(shopEl.value):null;
  let ok=false;
  if(selectedRole==='owner'){ok=(pass===OWNER_PASS);}
  else{if(!shopEl||shopEl.value===''){toast('Select branch');return;}ok=(selectedRole==='manager'?pass===SHOPS[shopIdx].pass:pass===STAFF_PASS);}
  if(!ok){document.getElementById('loginErr').style.display='block';return;}
  session={role:selectedRole,shopIdx:selectedRole==='owner'?null:shopIdx};
  if(session.shopIdx!==null)Object.keys(activeShops).forEach(k=>activeShops[k]=session.shopIdx);
  startApp();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){session=null;selectedRole=null;document.getElementById('loginFields').innerHTML='';document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('loginErr').style.display='none';showScreen('loginScreen');}
function startApp(){
  showScreen('appScreen');
  document.getElementById('topbarTitle').textContent='🏪 Shop Manager';
  document.getElementById('topbarSub').textContent=isOwner()?'All Branches — Owner':session.role==='manager'?`${SHOPS[session.shopIdx].name} — ${SHOPS[session.shopIdx].manager}`:`${SHOPS[session.shopIdx].name} — Staff`;
  buildNav();switchPage(isOwner()?'dashboard':'entries');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function buildNav(){
  const pages=[
    {id:'entries',icon:'📱',label:'Phones'},
    {id:'expense',icon:'💸',label:'Expense'},
    {id:'balance',icon:'💳',label:'Balance'},
    {id:'accessories',icon:'🎧',label:'Acc/Rep'},
    {id:'staff',icon:'👥',label:'Staff'},
    {id:'transfer',icon:'🔄',label:'Transfer'},
  ];
  if(isOwner()||session.role==='manager'){pages.push({id:'dashboard',icon:'📊',label:'Dashboard'});pages.push({id:'ledger',icon:'📒',label:'Ledger'});}
  if(isOwner())pages.push({id:'borrowings',icon:'🧾',label:'Dealers'});
  document.getElementById('bottomNav').innerHTML=pages.map(p=>`<button class="nav-btn" id="nav_${p.id}" onclick="switchPage('${p.id}')"><span class="ni">${p.icon}</span>${p.label}</button>`).join('');
}
function switchPage(p){
  activePage=p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page_'+p)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav_'+p)?.classList.add('active');
  renderPage(p);
}
function renderShopTabs(cid,key){
  const shops=accessibleShops();
  document.getElementById(cid).innerHTML=shops.length>1?shops.map(i=>`<button class="shop-tab${activeShops[key]===i?' active':''}" onclick="switchShop('${key}',${i})">${SHOPS[i].name}</button>`).join(''):'';
}
window.switchShop=function(key,i){activeShops[key]=i;renderPage(key==='staff'?'staff':key);};
function renderPage(p){
  const map={entries:renderEntries,expense:renderExpense,balance:renderBalance,accessories:renderAccessories,staff:renderStaffPage,transfer:renderTransfer,dashboard:renderDashboard,borrowings:renderBorrowings,ledger:renderLedger};
  if(map[p])map[p]();
}
// ── ENTRIES ──
function renderEntries(){
  renderShopTabs('entryShopTabs','entries');
  const si=activeShops.entries;
  const subLabels={sales:'📋 Sales',brands:'🏷️ Brands',recharge:'🔄 Recharge',udhari:'📒 Udhari',bakijama:'💰 Baki Jama'};
  const subTabs=`<div class="sub-tabs">${Object.entries(subLabels).map(([k,v])=>`<button class="sub-tab${activeEntrySub===k?' active':''}" onclick="swEntrySub('${k}')">${v}</button>`).join('')}</div>`;
  let inner='';
  if(activeEntrySub==='sales')inner=renderSales(si);
  else if(activeEntrySub==='brands')inner=renderBrands(si);
  else if(activeEntrySub==='recharge')inner=renderRecharge(si);
  else if(activeEntrySub==='udhari')inner=renderUdhari(si);
  else inner=renderBakiJama(si);
  document.getElementById('entryContent').innerHTML=subTabs+inner;
}
window.swEntrySub=function(s){activeEntrySub=s;renderEntries();};

// SALES — Advance & Bank Deposit removed; Exchange & Udhari added
function renderSales(si){
  const entries=data.shops[si].entries||[];
  const hist=entries.length===0?`<div class="empty">No entries yet</div>`:entries.slice(0,30).map((e,i)=>`<div class="entry-row">
    <div>
      <div class="entry-main">${e.pieces?fmt(e.pieces)+' pcs · ':''}<span class="g">₹${fmt(e.amount)}</span></div>
      <div class="entry-sub">${[e.cash?'Cash ₹'+fmt(e.cash):'',e.gpay?'GPay ₹'+fmt(e.gpay):'',e.card?'Card ₹'+fmt(e.card):'',e.exchange?'Exchange ₹'+fmt(e.exchange):'',e.udhari?'Udhari ₹'+fmt(e.udhari):''].filter(Boolean).join(' · ')}</div>
      ${e.adjustment?`<div class="entry-sub v">⚖️ Adjustment: ₹${fmt(e.adjustment)}</div>`:''}
      ${e.note?`<div class="entry-sub" style="color:#bbb">${e.note}</div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <span class="entry-date">${fmtDate(e.date)}</span>
      ${isOwner()?`<button class="del-btn" onclick="delEntry(${si},${i})">×</button>`:''}
    </div>
  </div>`).join('');

window.addEntry=function(si){

  if(!data.shops[si].entries)data.shops[si].entries=[];

function renderUdhari(si){

  const weOwe=udhari.filter(u=>u.direction==='we_owe').reduce((s,u)=>s+Number(u.amount||0)-Number(u.repaid||0),0);
  const personCards=Object.values(personMap).map(p=>{
    const totalOwed=p.records.filter(r=>r.direction==='they_owe').reduce((s,r)=>s+Number(r.amount||0)-Number(r.repaid||0),0);

    <button class="save-btn" onclick="addUdhari(${si})">💾 Save Udhari</button></div>

window.calcExpRem=function(){const total=Number(document.getElementById('exp_amount')?.value||0);const c=Number(document.getElementById('exp_cash')?.value||0);const g=Number(document.getElementById('exp_gpay_sp')?.value||0);const rem=total-(c+g);const el=document.getElementById('exp_rem');if(el){el.textContent=`Remaining: ₹${fmt(rem)}`;el.style.color=rem===0?'#1a7a4a':rem<0?'#c0392b':'#888';}};
window.addExpTag=function(si){const v=document.getElementById('new_tag')?.value?.trim();if(!v)return;if(!data.expTags[si])data.expTags[si]=[];if(data.expTags[si].includes(v)){toast('Exists');return;}data.expTags[si].push(v);save();toast(`"${v}" added!`);renderExpense();};
window.addExpense=function(si){
  const date=getDate('exp_date');
  const tag=document.getElementById('exp_tag')?.value;if(!tag){toast('Select tag');return;}
  const amount=Number(document.getElementById('exp_amount')?.value);if(!amount){toast('Enter amount');return;}
  const mode=document.getElementById('exp_mode')?.value||'Cash';
  let modeCash=0,modeGpay=0;
  if(mode==='Both'){modeCash=Number(document.getElementById('exp_cash')?.value||0);modeGpay=Number(document.getElementById('exp_gpay_sp')?.value||0);}
  else if(mode==='Cash')modeCash=amount;else modeGpay=amount;
  const dealerAccount=document.getElementById('exp_dealer')?.value||'';
  const paidFrom=document.getElementById('exp_paid_from')?.value||'';
  const note=document.getElementById('exp_note')?.value?.trim()||'';
  if(!data.shops[si].expenses)data.shops[si].expenses=[];
  data.shops[si].expenses.unshift({date,tag,amount,mode,modeCash,modeGpay,dealerAccount,paidFrom,note});
  if(dealerAccount){
    if(!data.ledgerTxns[si])data.ledgerTxns[si]=[];
    data.ledgerTxns[si].unshift({date,dealer:dealerAccount,type:'cr',amount,note:`Expense: ${tag}${note?' - '+note:''}`,source:'expense'});
    if(!data.borrowings)data.borrowings=[];
    data.borrowings.unshift({date,dealer:dealerAccount,amount:-amount,note:`Payment via expense: ${tag}`});
  }
  if(paidFrom&&paidFrom.includes(':')){
    const [accType,accName]=paidFrom.split(':');
    autoDebitBalance(si,accType.toLowerCase(),accName,amount,date,`Expense: ${tag}${note?' - '+note:''}`);
  }
  save();toast('Saved! ✓');renderExpense();
};
window.delExpense=function(si,i){if(!isOwner())return;if(confirm('Delete?')){data.shops[si].expenses.splice(i,1);save();renderExpense();}};
function autoDebitBalance(si,accType,accName,amount,date,note){
  if(!data.shops[si].balanceAccounts)return;
  const ba=data.shops[si].balanceAccounts;
  if(accType==='upi'){const acc=ba.upi.find(a=>a.name===accName);if(acc){acc.balance=(Number(acc.balance)||0)-amount;if(!acc.entries)acc.entries=[];acc.entries.unshift({date,amount:-amount,note});}}
  else if(accType==='bank'){const acc=ba.bank.find(a=>a.name===accName);if(acc){acc.balance=(Number(acc.balance)||0)-amount;if(!acc.entries)acc.entries=[];acc.entries.unshift({date,amount:-amount,note});}}
}

  } else if(tab==='leave'){
    const opts=staffList.map((s,i)=>`<option value="${i}">${s.name}</option>`).join('');
    const allLeaves=staffList.flatMap((s,i)=>(s.leaves||[]).map(l=>({...l,name:s.name,si:i}))).sort((a,b)=>b.date.localeCompare(a.date));
    const leaveRows=allLeaves.map(l=>`<div class="entry-row"><div><div class="entry-main">${l.name}</div><div class="entry-sub">${fmtDate(l.date)} | ${l.type||'Leave'} | ${l.note||''}</div></div></div>`).join('');
    body=`<div class="card"><div class="card-title">➕ Mark Leave</div>
      <div class="two-col"><div class="field"><label>Staff</label><select id="leave_who">${opts}</select></div><div class="field"><label>Date</label><input type="date" id="leave_date" value="${todayISO()}"></div></div>
      <div class="two-col"><div class="field"><label>Type</label><select id="leave_type"><option>Leave</option><option>Half Day</option><option>Absent</option></select></div><div class="field"><label>Note</label><input type="text" id="leave_note" placeholder="Reason"></div></div>
      <button class="save-btn" onclick="addLeave(${si})">Save</button></div>
    <div class="card"><div class="card-title">🏖 Leave History</div>${leaveRows||'<div class="empty">No leaves</div>'}</div>`;
  } else if(tab==='advance'){
    const opts=staffList.map((s,i)=>`<option value="${i}">${s.name}</option>`).join('');
    const allAdv=staffList.flatMap((s,i)=>(s.advances||[]).map(a=>({...a,name:s.name}))).sort((a,b)=>b.date.localeCompare(a.date));
    const advRows=allAdv.map(a=>`<div class="entry-row"><div><div class="entry-main">${a.name}</div><div class="entry-sub">${fmtDate(a.date)} | ₹${fmt(a.amount||0)} | ${a.note||''}</div></div></div>`).join('');
    body=`<div class="card"><div class="card-title">💸 Give Advance</div>
      <div class="two-col"><div class="field"><label>Staff</label><select id="adv_who">${opts}</select></div><div class="field"><label>Amount (₹)</label><input type="number" id="adv_amt" placeholder="0"></div></div>
      <div class="field"><label>Note</label><input type="text" id="adv_note" placeholder="Reason"></div>
      <button class="save-btn" onclick="addAdvance(${si})">Save</button></div>
    <div class="card"><div class="card-title">💸 Advances</div>${advRows||'<div class="empty">No advances</div>'}</div>`;
  } else if(tab==='salary'){
    const opts=staffList.map((s,i)=>`<option value="${i}">${s.name}</option>`).join('');
    const allSal=staffList.flatMap((s,i)=>(s.salaries||[]).map(a=>({...a,name:s.name}))).sort((a,b)=>b.date.localeCompare(a.date));
    const salRows=allSal.map(s=>`<div class="entry-row"><div><div class="entry-main">${s.name}</div><div class="entry-sub">${fmtDate(s.date)} | ₹${fmt(s.amount||0)} | ${s.note||''}</div></div></div>`).join('');
    body=`<div class="card"><div class="card-title">💰 Pay Salary</div>
      <div class="two-col"><div class="field"><label>Staff</label><select id="sal_who">${opts}</select></div><div class="field"><label>Amount (₹)</label><input type="number" id="sal_amt" placeholder="0"></div></div>
      <div class="field"><label>Note / Month</label><input type="text" id="sal_note" placeholder="e.g. May 2026"></div>
      <button class="save-btn" onclick="addSalary(${si})">Save</button></div>
    <div class="card"><div class="card-title">💰 Salary History</div>${salRows||'<div class="empty">No salaries</div>'}</div>`;
  }
  document.getElementById('staffContent').innerHTML=`<div class="section-header">👤 Staff — ${SHOPS[si].name}</div><div style="display:flex;gap:6px;margin:0 0 12px">${tabs}</div>${body}`;
}
window.addStaff=function(si){const name=document.getElementById('st_name')?.value?.trim();if(!name){toast('Enter name');return;}if(!data.staff[si])data.staff[si]=[];data.staff[si].push({name,role:document.getElementById('st_role')?.value?.trim()||'Staff',joined:document.getElementById('st_joined')?.value||todayISO(),fixedSalary:Number(document.getElementById('st_sal')?.value||0),leaves:[],advances:[],salaries:[]});save();toast('Added!');renderStaffPage();};
window.delStaff=function(si,i){if(!isOwner())return;if(confirm('Remove staff?')){data.staff[si].splice(i,1);save();renderStaffPage();}};
window.addLeave=function(si){const i=Number(document.getElementById('leave_who')?.value||0);if(!data.staff[si][i].leaves)data.staff[si][i].leaves=[];data.staff[si][i].leaves.push({date:document.getElementById('leave_date')?.value||todayISO(),type:document.getElementById('leave_type')?.value||'Leave',note:document.getElementById('leave_note')?.value?.trim()||''});save();toast('Saved!');renderStaffPage();};
window.addAdvance=function(si){const i=Number(document.getElementById('adv_who')?.value||0);if(!data.staff[si][i].advances)data.staff[si][i].advances=[];data.staff[si][i].advances.push({date:todayISO(),amount:Number(document.getElementById('adv_amt')?.value||0),note:document.getElementById('adv_note')?.value?.trim()||''});save();toast('Saved!');renderStaffPage();};
window.addSalary=function(si){const i=Number(document.getElementById('sal_who')?.value||0);if(!data.staff[si][i].salaries)data.staff[si][i].salaries=[];data.staff[si][i].salaries.push({date:todayISO(),amount:Number(document.getElementById('sal_amt')?.value||0),note:document.getElementById('sal_note')?.value?.trim()||''});save();toast('Saved!');renderStaffPage();};

// ── DEALERS (BORROWINGS) ──────────────────────────────────────────────────────
function renderBorrowings(){
  renderShopTabs('borrowShopTabs','borrowings');
  const si=activeShops.borrowings??0;
  const dealers=data.dealerAccounts[si]||[];
  const borrowings=data.borrowings||[];
  const selDealer=window._selDealer||'';
  const dealerOpts=dealers.map(d=>`<option value="${d.name}" ${selDealer===d.name?'selected':''}>${d.name}</option>`).join('');
  const grouped={};
  borrowings.forEach(b=>{if(!grouped[b.dealer])grouped[b.dealer]=[];grouped[b.dealer].push(b);});
  const dealerCards=dealers.map(d=>{
    const entries=(grouped[d.name]||[]).sort((a,b)=>b.date.localeCompare(a.date));
    const total=entries.reduce((s,e)=>s+Number(e.amount||0),0);
    const rows=entries.slice(0,5).map(e=>`<div class="entry-row" style="padding:4px 0"><div><div class="entry-main ${Number(e.amount)>0?'r':'g'}" style="font-size:13px">${Number(e.amount)>0?'+':'-'}₹${fmt(Math.abs(e.amount))}</div>${e.note?`<div class="entry-sub">${e.note}</div>`:''}</div><span class="entry-date">${fmtDate(e.date)}</span></div>`).join('');
    return `<div class="dealer-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700">🏪 ${d.name}</div>
        <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${total>0?'#c0392b':'#1a7a4a'}">${total>0?'+':''}₹${fmt(total)}</div><div style="font-size:10px;color:#888">${total>0?'Dues':'Clear/Advance'}</div></div>
      </div>
      <div style="max-height:100px;overflow-y:auto;margin-bottom:8px">${rows||'<div class="empty" style="font-size:12px">No entries</div>'}</div>
    </div>`;
  }).join('');
  document.getElementById('borrowContent').innerHTML=`
  <div class="section-header">🏪 Dealers — ${SHOPS[si].name}</div>
  <div class="card"><div class="card-title">➕ Add Entry</div>
    <div class="field"><label>Dealer</label>
      <div style="display:flex;gap:6px">
        <select id="borrow_dealer" onchange="window._selDealer=this.value" style="flex:1;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8">
          <option value="">— Select Dealer —</option>${dealerOpts}
        </select>
        <input type="text" id="borrow_new_dealer" placeholder="Or type new" style="flex:1;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8">
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Amount (₹)</label><input type="number" id="borrow_amt" placeholder="Positive=borrow, Negative=paid"></div>
      <div class="field"><label>Type</label><select id="borrow_type" style="padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8;width:100%"><option value="1">📦 Purchase / Borrow</option><option value="-1">💳 Payment Made</option></select></div>
    </div>
    <div class="field"><label>Note</label><input type="text" id="borrow_note" placeholder="Details"></div>
    <button class="save-btn" onclick="addBorrowing(${si})">Save Entry</button>
  </div>
  ${dealerCards||'<div class="card"><div class="empty">No dealers yet. Add dealers from the Ledger section.</div></div>'}`;
}
window.addBorrowing=function(si){
  const selVal=document.getElementById('borrow_dealer')?.value?.trim();
  const newVal=document.getElementById('borrow_new_dealer')?.value?.trim();
  const dealer=newVal||selVal;
  if(!dealer){toast('Select or enter dealer');return;}
  const amt=Number(document.getElementById('borrow_amt')?.value||0);
  const mult=Number(document.getElementById('borrow_type')?.value||1);
  if(!amt){toast('Enter amount');return;}
  const finalAmt=amt*mult;
  if(!data.borrowings)data.borrowings=[];
  data.borrowings.push({date:todayISO(),dealer,amount:finalAmt,note:document.getElementById('borrow_note')?.value?.trim()||'',shop:si});
  // if new dealer, add to dealerAccounts
  if(newVal){
    if(!data.dealerAccounts[si])data.dealerAccounts[si]=[];
    if(!data.dealerAccounts[si].find(d=>d.name===newVal)){
      data.dealerAccounts[si].push({name:newVal,phone:''});
      // also add to ledger txn as DR
      if(!data.ledgerTxns[si])data.ledgerTxns[si]=[];
    }
  }
  // auto-add ledger DR entry if purchase
  if(mult===1){
    if(!data.ledgerTxns[si])data.ledgerTxns[si]=[];
    data.ledgerTxns[si].push({date:todayISO(),dealer,type:'dr',amount:amt,note:document.getElementById('borrow_note')?.value?.trim()||'',source:'dealers'});
  }
  save();toast('Saved!');renderBorrowings();
};

// ── LEDGER ────────────────────────────────────────────────────────────────────
function renderLedger(){
  renderShopTabs('ledgerShopTabs','ledger');
  const si=activeShops.ledger??0;
  const dealers=data.dealerAccounts[si]||[];
  const txns=data.ledgerTxns[si]||[];
  const selD=window._ledgerDealer||null;
  if(selD!==null){
    const dealer=dealers[selD];
    if(!dealer){window._ledgerDealer=null;renderLedger();return;}
    const dTxns=txns.filter(t=>t.dealer===dealer.name).sort((a,b)=>b.date.localeCompare(a.date));
    const totalDR=dTxns.filter(t=>t.type==='dr').reduce((s,t)=>s+Number(t.amount||0),0);
    const totalCR=dTxns.filter(t=>t.type==='cr').reduce((s,t)=>s+Number(t.amount||0),0);
    const outstanding=totalDR-totalCR;
    const rows=dTxns.map(t=>`<div class="txn-row">
      <div><div class="entry-main ${t.type==='dr'?'r':'g'}">${t.type==='dr'?'DR':'CR'} ₹${fmt(t.amount||0)}</div><div class="entry-sub">${t.note||''} ${t.source?`<span style="font-size:10px;background:#f0eef8;padding:1px 5px;border-radius:4px">${t.source}</span>`:''}</div></div>
      <span class="entry-date">${fmtDate(t.date)}</span></div>`).join('');
    document.getElementById('ledgerContent').innerHTML=`
    <div class="section-header"><button onclick="window._ledgerDealer=null;renderLedger()" style="background:none;border:none;color:#1a7a4a;font-size:14px;cursor:pointer;margin-right:6px">← Back</button>📒 ${dealer.name}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Total Purchased (DR)</div><div class="metric-value r">₹${fmt(totalDR)}</div></div>
      <div class="metric"><div class="metric-label">Total Paid (CR)</div><div class="metric-value g">₹${fmt(totalCR)}</div></div>
      <div class="metric" style="grid-column:1/-1"><div class="metric-label">Outstanding Balance</div><div class="metric-value ${outstanding>0?'r':'g'}">₹${fmt(Math.abs(outstanding))} ${outstanding>0?'(You Owe)':'(Clear/Advance)'}</div></div>
    </div>
    <div class="card"><div class="card-title">➕ Add Transaction</div>
      <div class="two-col">
        <div class="field"><label>Type</label><select id="ltxn_type" style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8"><option value="dr">📦 DR — Purchase</option><option value="cr">💳 CR — Payment</option></select></div>
        <div class="field"><label>Amount (₹)</label><input type="number" id="ltxn_amt" placeholder="0"></div>
      </div>
      <div class="field"><label>Note</label><input type="text" id="ltxn_note" placeholder="Details"></div>
      <button class="save-btn" onclick="addLedgerTxn(${si},${selD})">Save</button>
    </div>
    <div class="card"><div class="card-title">📋 Transactions</div>${rows||'<div class="empty">No transactions yet</div>'}</div>`;
    return;
  }
  // dealer list view
  const dealerCards=dealers.map((d,i)=>{
    const dTxns=txns.filter(t=>t.dealer===d.name);
    const totalDR=dTxns.filter(t=>t.type==='dr').reduce((s,t)=>s+Number(t.amount||0),0);
    const totalCR=dTxns.filter(t=>t.type==='cr').reduce((s,t)=>s+Number(t.amount||0),0);
    const outstanding=totalDR-totalCR;
    return `<div class="dealer-card" onclick="window._ledgerDealer=${i};renderLedger()" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:700">🏪 ${d.name}</div>${d.phone?`<div style="font-size:11px;color:#888">${d.phone}</div>`:''}</div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:${outstanding>0?'#c0392b':'#1a7a4a'}">₹${fmt(Math.abs(outstanding))}</div>
          <div style="font-size:10px;color:#888">${outstanding>0?'Outstanding':'Clear'}</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:#666">
        <span>DR: ₹${fmt(totalDR)}</span><span>CR: ₹${fmt(totalCR)}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ledgerContent').innerHTML=`
  <div class="section-header">📒 Ledger — ${SHOPS[si].name}</div>
  ${isOwner()?`<div class="card"><div class="card-title">➕ Add Dealer</div>
    <div class="two-col"><div class="field"><label>Name</label><input type="text" id="ldlr_name" placeholder="Dealer name"></div><div class="field"><label>Phone (optional)</label><input type="text" id="ldlr_phone" placeholder="Mobile"></div></div>
    <button class="save-btn" onclick="addDealer(${si})">➕ Add Dealer</button></div>`:''}
  ${dealerCards||'<div class="card"><div class="empty">No dealers yet</div></div>'}`;
}
window.addDealer=function(si){
  const name=document.getElementById('ldlr_name')?.value?.trim();
  if(!name){toast('Enter name');return;}
  if(!data.dealerAccounts[si])data.dealerAccounts[si]=[];
  if(data.dealerAccounts[si].find(d=>d.name===name)){toast('Already exists');return;}
  data.dealerAccounts[si].push({name,phone:document.getElementById('ldlr_phone')?.value?.trim()||''});
  save();toast('Dealer added!');renderLedger();
};
window.addLedgerTxn=function(si,di){
  const dealer=data.dealerAccounts[si][di];
  if(!dealer)return;
  const type=document.getElementById('ltxn_type')?.value||'dr';
  const amt=Number(document.getElementById('ltxn_amt')?.value||0);
  if(!amt){toast('Enter amount');return;}
  if(!data.ledgerTxns[si])data.ledgerTxns[si]=[];
  data.ledgerTxns[si].push({date:todayISO(),dealer:dealer.name,type,amount:amt,note:document.getElementById('ltxn_note')?.value?.trim()||'',source:'manual'});
  // sync to borrowings if DR
  if(type==='dr'){if(!data.borrowings)data.borrowings=[];data.borrowings.push({date:todayISO(),dealer:dealer.name,amount:amt,note:document.getElementById('ltxn_note')?.value?.trim()||'',shop:si});}
  save();toast('Saved!');window._ledgerDealer=di;renderLedger();
};

// ── TRANSFER ──────────────────────────────────────────────────────────────────
function renderTransfer(){
  const transfers=(data.transfers||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const shopOpts=SHOPS.map((s,i)=>`<option value="${i}">${s}</option>`).join('');
  const rows=transfers.slice(0,20).map(t=>`<div class="entry-row">
    <div><div class="entry-main">₹${fmt(t.amount||0)}</div><div class="entry-sub">${SHOPS[t.from]||'?'} → ${SHOPS[t.to]||'?'} | ${t.goods||''} ${t.note?'| '+t.note:''}</div></div>
    <span class="entry-date">${fmtDate(t.date)}</span></div>`).join('');
  document.getElementById('transferContent').innerHTML=`
  <div class="section-header">🔄 Inter-Branch Transfer</div>
  <div class="card"><div class="card-title">➕ New Transfer</div>
    <div class="two-col">
      <div class="field"><label>From</label><select id="tr_from" style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8">${shopOpts}</select></div>
      <div class="field"><label>To</label><select id="tr_to" style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:13px;background:#fafaf8">${shopOpts}</select></div>
    </div>
    <div class="field"><label>Amount (₹)</label><input type="number" id="tr_amt" placeholder="0"></div>
    <div class="field"><label>Goods / Description (optional)</label><input type="text" id="tr_goods" placeholder="What was transferred"></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="tr_note" placeholder="Any note"></div>
    <button class="save-btn" onclick="addTransfer()">Save Transfer</button>
  </div>
  <div class="card"><div class="card-title">📋 Recent Transfers</div>${rows||'<div class="empty">No transfers yet</div>'}</div>`;
}
window.addTransfer=function(){
  const from=Number(document.getElementById('tr_from')?.value||0);
  const to=Number(document.getElementById('tr_to')?.value||0);
  const amt=Number(document.getElementById('tr_amt')?.value||0);
  if(from===to){toast('From and To must differ');return;}
  if(!amt){toast('Enter amount');return;}
  if(!data.transfers)data.transfers=[];
  data.transfers.push({date:todayISO(),from,to,amount:amt,goods:document.getElementById('tr_goods')?.value?.trim()||'',note:document.getElementById('tr_note')?.value?.trim()||''});
  save();toast('Transfer saved!');renderTransfer();
};

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  renderShopTabs('dashShopTabs','dashboard');
  const si=activeShops.dashboard??0,shop=data.shops[si];
  const today=todayISO();
  const entries=shop.entries||[];
  const expenses=shop.expenses||[];
  // today sales
  const todaySales=entries.filter(e=>e.date===today);
  const cashSales=todaySales.filter(e=>e.type==='cash').reduce((s,e)=>s+Number(e.amount||0),0);
  const upiSales=todaySales.filter(e=>e.type==='upi').reduce((s,e)=>s+Number(e.amount||0),0);
  const totalSales=cashSales+upiSales;
  const phoneSales=todaySales.filter(e=>e.category==='phone');
  const totalPhones=phoneSales.reduce((s,e)=>s+Number(e.qty||1),0);
  // today expenses
  const todayExp=expenses.filter(e=>e.date===today).reduce((s,e)=>s+Number(e.amount||0),0);
  // adjustment
  const adj=shop.adjustment||0;
  // monthly
  const ym=today.slice(0,7);
  const monthSales=entries.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+Number(e.amount||0),0);
  const monthExp=expenses.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+Number(e.amount||0),0);
  // cash balance
  const cashBal=shop.balanceAccounts?.cash?.balance||0;
  // outstanding dealer dues
  const dealers=data.dealerAccounts[si]||[];
  const txns=data.ledgerTxns[si]||[];
  const totalOutstanding=dealers.reduce((s,d)=>{
    const dTxns=txns.filter(t=>t.dealer===d.name);
    const dr=dTxns.filter(t=>t.type==='dr').reduce((a,t)=>a+Number(t.amount||0),0);
    const cr=dTxns.filter(t=>t.type==='cr').reduce((a,t)=>a+Number(t.amount||0),0);
    return s+(dr-cr);
  },0);
  document.getElementById('dashContent').innerHTML=`
  <div class="section-header">📊 Dashboard — ${SHOPS[si].name}</div>
  <div style="font-size:12px;color:#888;padding:0 0 8px">Today: ${fmtDate(today)}</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Cash Sales Today</div><div class="metric-value g">₹${fmt(cashSales)}</div></div>
    <div class="metric"><div class="metric-label">UPI Sales Today</div><div class="metric-value g">₹${fmt(upiSales)}</div></div>
    <div class="metric"><div class="metric-label">Total Sales Today</div><div class="metric-value g">₹${fmt(totalSales)}</div></div>
    <div class="metric"><div class="metric-label">Phones Sold Today</div><div class="metric-value">${totalPhones}</div></div>
    <div class="metric"><div class="metric-label">Expenses Today</div><div class="metric-value r">₹${fmt(todayExp)}</div></div>
    <div class="metric" style="background:#f3eeff;border:1px solid #d4b8ff"><div class="metric-label" style="color:#6c3483">⚖️ Adjustment</div><div class="metric-value" style="color:#6c3483">₹${fmt(Math.abs(adj))} ${adj<0?'(Short)':adj>0?'(Excess)':'(Balanced)'}</div></div>
  </div>
  <div class="section-header" style="margin-top:8px">📅 This Month</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Monthly Sales</div><div class="metric-value g">₹${fmt(monthSales)}</div></div>
    <div class="metric"><div class="metric-label">Monthly Expenses</div><div class="metric-value r">₹${fmt(monthExp)}</div></div>
    <div class="metric"><div class="metric-label">Cash on Hand</div><div class="metric-value">${fmt(cashBal)}</div></div>
    <div class="metric"><div class="metric-label">Dealer Outstanding</div><div class="metric-value r">₹${fmt(totalOutstanding)}</div></div>
  </div>
  ${isOwner()?`<div class="card" style="margin-top:12px"><div class="card-title">⚖️ Set Adjustment</div>
    <div class="field"><label>Amount (₹, use negative for short)</label><input type="number" id="adj_val" placeholder="0" value="${adj}"></div>
    <button class="save-btn" onclick="saveAdj(${si})">Save</button></div>`:''}`;
}
window.saveAdj=function(si){data.shops[si].adjustment=Number(document.getElementById('adj_val')?.value||0);save();toast('Saved!');renderDashboard();};

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
</script>
