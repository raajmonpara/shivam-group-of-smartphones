<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ede8;min-height:100vh;color:#1a1a1a}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#1a7a4a 0%,#0d4a2e 100%)}

.login-card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.role-tabs{display:flex;gap:8px;margin-bottom:20px}
.role-tab{flex:1;padding:10px 4px;font-size:12px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:#f5f5f0;color:#555;transition:all 0.2s}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.field select,.field input[type=text],.field input[type=number],.field input[type=date],.field input[type=tel]{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:12px;font-size:14px;background:#fafaf8;outline:none;transition:border-color 0.2s}

.top-bar{background:#1a7a4a;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}

.logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e8e8e4;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;border:none;background:none;color:#999;font-size:9px;font-weight:600;transition:color 0.2s;gap:3px}
.nav-item .icon{font-size:20px;line-height:1}
.nav-item.active{color:#1a7a4a}
.page{display:none;padding:12px}
.page.active{display:block}
.shop-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.shop-tab{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:20px;cursor:pointer;background:#e8e8e4;color:#666;white-space:nowrap;flex-shrink:0}
.shop-tab.active{background:#1a7a4a;color:#fff}
.section-header{font-size:13px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 6px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:800;color:#333;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.save-btn{width:100%;padding:13px;background:#1a7a4a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.save-btn.red{background:#c0392b}
.save-btn.blue{background:#2980b9}
.entry-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0ede8}
.entry-row:last-child{border-bottom:none}
.entry-main{font-size:14px;font-weight:700;color:#1a1a1a}
.entry-sub{font-size:11px;color:#888;margin-top:2px}
.entry-date{font-size:11px;color:#aaa;white-space:nowrap;margin-left:8px;flex-shrink:0}
.empty{text-align:center;color:#bbb;font-size:13px;padding:24px 0}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.metric-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.metric-value{font-size:18px;font-weight:800;color:#1a1a1a}
.metric-value.g{color:#1a7a4a}
.metric-value.r{color:#c0392b}
.r{color:#c0392b}
.g{color:#1a7a4a}
.dealer-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.txn-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f0}
.txn-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}
.badge-dr{background:#fde8e8;color:#c0392b}
.badge-cr{background:#e8f5ee;color:#1a7a4a}
.badge-type{background:#e8f0fe;color:#2980b9;font-size:10px;padding:2px 7px;border-radius:8px}
.sale-total-bar{background:linear-gradient(135deg,#1a7a4a,#0d4a2e);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sale-total-label{font-size:11px;opacity:0.8}
.sale-total-amount{font-size:24px;font-weight:800}
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:#f0ede8;color:#666}
.sub-tab.active{background:#1a7a4a;color:#fff}
.acct-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.type-dealer{background:#fff3cd;color:#856404}
.type-staff{background:#d1ecf1;color:#0c5460}
.type-owner{background:#d4edda;color:#155724}
.type-franchise{background:#e2d9f3;color:#4a235a}
.type-customer{background:#fde8e8;color:#c0392b}
.type-custom{background:#f0ede8;color:#555}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
</style>

<body>

<div id="loginScreen">
  <div class="login-logo">🏪</div>
  <div class="login-title">Shivam Group</div>
  <div class="login-sub">of Smartphones</div>
  <div class="login-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole(&#39;owner&#39;)">👑 Owner</button>
      <button class="role-tab" onclick="setRole(&#39;manager&#39;)">🧑‍💼 Manager</button>
      <button class="role-tab" onclick="setRole(&#39;staff&#39;)">🧑‍🏭 Staff</button>
    </div>
    <div id="shopFieldWrap" class="field" style="display:none">
      <label>Branch</label>
      <select id="loginShop">
        <option value="0">POOJARA</option>
        <option value="1">RAMDEV</option>
        <option value="2">SHIVAM (KOSAD)</option>
        <option value="3">SHIVAM (KHODIYAR)</option>
      </select>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="text" id="loginPass" placeholder="Enter password" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="error-msg" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div><div class="top-bar-title" id="barTitle">Shop Manager</div><div class="top-bar-sub" id="barSub"></div></div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  <div style="position:relative">
    <div class="page active" id="page_sales"><div class="shop-tabs" id="salesShopTabs"></div><div id="salesContent"></div></div>
    <div class="page" id="page_expense"><div class="shop-tabs" id="expShopTabs"></div><div id="expContent"></div></div>
    <div class="page" id="page_balance"><div class="shop-tabs" id="balShopTabs"></div><div id="balContent"></div></div>
    <div class="page" id="page_accrep"><div class="shop-tabs" id="accShopTabs"></div><div id="accContent"></div></div>
    <div class="page" id="page_staff"><div class="shop-tabs" id="staffShopTabs"></div><div id="staffContent"></div></div>
    <div class="page" id="page_transfer"><div id="transferContent"></div></div>
    <div class="page" id="page_accounts"><div class="shop-tabs" id="acctShopTabs"></div><div id="acctContent"></div></div>
    <div class="page" id="page_dashboard"><div class="shop-tabs" id="dashShopTabs"></div><div id="dashContent"></div></div>
  </div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const SHOPS=[
  {name:'POOJARA',  manager:'NIKUNJ',  pass:'poojara123'},
  {name:'RAMDEV',   manager:'PUNIT',   pass:'ramdev123'},
  {name:'SHIVAM (KOSAD)',   manager:'KISHAN',  pass:'shivam1123'},
  {name:'SHIVAM (KHODIYAR)',manager:'RAJVEER', pass:'shivam2123'}
];
const OWNER_PASS='owner@123', STAFF_PASS='staff123';
const ACCT_TYPES=['Dealer','Franchise','Staff','Owner','Customer','Custom'];
const SK='shopapp_v8';

let session=null, activePage='sales';
let activeShops={sales:0,expense:0,balance:0,accrep:0,staff:0,accounts:0,dashboard:0};

// ── DATA MODEL ────────────────────────────────────────────────────────────────
const defaultShop=()=>({
  entries:[],        // sales entries
  expenses:[],
  accessories:[],
  repairing:[],
  recharge:[],
  expTags:[],
  brandTags:[],
  balanceAccounts:{
    cash:{balance:0,entries:[]},
    upi:[],
    bank:[]
  },
  adjustment:0
});
let data={
  shops:[defaultShop(),defaultShop(),defaultShop(),defaultShop()],
  staff:[[],[],[],[]],
  transfers:[],
  accounts:[],      // global account list [{id,name,type,phone,shopIdx,notes}]
  ledger:[]         // [{id,accountId,date,type:'dr'|'cr',amount,note,source,shopIdx}]
};

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function save(){localStorage.setItem(SK,JSON.stringify(data));}
function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){const d=JSON.parse(raw);deepMerge(data,d);}
    else{
      // migrate v7
      const old=localStorage.getItem('shopapp_v7')||localStorage.getItem('shopapp_v6');
      if(old){
        const od=JSON.parse(old);
        if(od.shops)od.shops.forEach((s,i)=>{if(data.shops[i])Object.assign(data.shops[i],s);});
        if(od.staff)data.staff=od.staff;
        if(od.transfers)data.transfers=od.transfers;
        // migrate dealers to accounts
        if(od.dealerAccounts){od.dealerAccounts.forEach((list,si)=>{(list||[]).forEach(d=>{data.accounts.push({id:uid(),name:d.name,type:'Dealer',phone:d.phone||'',shopIdx:si,notes:''});});});}
        if(od.ledgerTxns){od.ledgerTxns.forEach((list,si)=>{(list||[]).forEach(t=>{const acct=data.accounts.find(a=>a.name===t.dealer&&a.shopIdx===si);if(acct)data.ledger.push({id:uid(),accountId:acct.id,date:t.date,type:t.type,amount:t.amount,note:t.note||'',source:t.source||'migrated',shopIdx:si});});});}
      }
    }
  }catch(e){console.warn('Load error',e);}
  // ensure structure
  while(data.shops.length<4)data.shops.push(defaultShop());
  while(data.staff.length<4)data.staff.push([]);
  data.shops.forEach(s=>{
    if(!s.balanceAccounts)s.balanceAccounts={cash:{balance:0,entries:[]},upi:[],bank:[]};
    if(!s.balanceAccounts.cash)s.balanceAccounts.cash={balance:0,entries:[]};
    if(!s.balanceAccounts.upi)s.balanceAccounts.upi=[];
    if(!s.balanceAccounts.bank)s.balanceAccounts.bank=[];
    if(!s.accessories)s.accessories=[];
    if(!s.repairing)s.repairing=[];
    if(!s.recharge)s.recharge=[];
    if(!s.expTags)s.expTags=[];
    if(!s.brandTags)s.brandTags=[];
    if(!s.entries)s.entries=[];
    if(!s.expenses)s.expenses=[];
  });
  if(!data.accounts)data.accounts=[];
  if(!data.ledger)data.ledger=[];
  if(!data.transfers)data.transfers=[];
}
function deepMerge(target,source){
  Object.keys(source).forEach(k=>{
    if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])&&target[k]&&typeof target[k]==='object'&&!Array.isArray(target[k])){deepMerge(target[k],source[k]);}
    else{target[k]=source[k];}
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';const p=d.split('-');if(p.length<3)return d;return `${p[2]}/${p[1]}/${p[2].length===4?p[0].slice(2):p[0]}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000);}
function isOwner(){return session&&session.role==='owner';}
function isManager(){return session&&(session.role==='owner'||session.role==='manager');}

// ── AUTH ──────────────────────────────────────────────────────────────────────
let _loginRole='owner';
function setRole(r){
  _loginRole=r;
  document.querySelectorAll('.role-tab').forEach((b,i)=>b.classList.toggle('active',['owner','manager','staff'][i]===r));
  document.getElementById('shopFieldWrap').style.display=r==='owner'?'none':'block';
}
function doLogin(){
  const pass=document.getElementById('loginPass').value.trim();
  const shopIdx=parseInt(document.getElementById('loginShop').value||'0');
  let ok=false,sess={};
  if(_loginRole==='owner'&&pass===OWNER_PASS){ok=true;sess={role:'owner',shopIdx:null};}
  else if(_loginRole==='manager'){const s=SHOPS[shopIdx];if(pass===s.pass){ok=true;sess={role:'manager',shopIdx};}}
  else if(_loginRole==='staff'&&pass===STAFF_PASS){ok=true;sess={role:'staff',shopIdx};}
  if(ok){
    session=sess;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginPass').value='';
    if(sess.shopIdx!==null)Object.keys(activeShops).forEach(k=>activeShops[k]=sess.shopIdx);
    buildNav();switchPage('sales');
    document.getElementById('barTitle').textContent='🏪 '+( sess.shopIdx!==null?SHOPS[sess.shopIdx].name:'All Branches');
    document.getElementById('barSub').textContent=sess.role==='owner'?'Owner':sess.role==='manager'?'Manager — '+SHOPS[sess.shopIdx].manager:'Staff';
  }else{document.getElementById('loginErr').textContent='Incorrect password. Try again.';}
}
function doLogout(){session=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('loginPass').value='';}

// ── NAV ───────────────────────────────────────────────────────────────────────
const NAV_ITEMS=[
  {id:'sales',icon:'📱',label:'Sales'},
  {id:'expense',icon:'💸',label:'Expense'},
  {id:'balance',icon:'💰',label:'Balance'},
  {id:'accrep',icon:'🔌',label:'Acc/Rep'},
  {id:'staff',icon:'👤',label:'Staff'},
  {id:'transfer',icon:'🔄',label:'Transfer'},
  {id:'accounts',icon:'📒',label:'Accounts'},
  {id:'dashboard',icon:'📊',label:'Dashboard'},
];
function buildNav(){
  document.getElementById('bottomNav').innerHTML=NAV_ITEMS.map(n=>`<button class="nav-item${activePage===n.id?' active':''}" onclick="switchPage('${n.id}')"><span class="icon">${n.icon}</span>${n.label}</button>`).join('');
}
function switchPage(p){
  activePage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page_'+p)?.classList.add('active');
  buildNav();
  renderPage(p);
}
function renderPage(p){
  const map={sales:renderSales,expense:renderExpense,balance:renderBalance,accrep:renderAccRep,staff:renderStaff,transfer:renderTransfer,accounts:renderAccounts,dashboard:renderDashboard};
  if(map[p])map[p]();
}

// ── SHOP TABS ─────────────────────────────────────────────────────────────────
function renderShopTabs(containerId,key){
  const c=document.getElementById(containerId);if(!c)return;
  if(!isOwner()){c.innerHTML='';return;}
  c.innerHTML=SHOPS.map((s,i)=>`<button class="shop-tab${activeShops[key]===i?' active':''}" onclick="activeShops['${key}']=${i};renderPage('${key}')">${s.name}</button>`).join('');
}

// ── ACCOUNT HELPERS ───────────────────────────────────────────────────────────
function getAccounts(shopIdx,type){
  return data.accounts.filter(a=>a.shopIdx===shopIdx&&(!type||a.type===type));
}
function accountOpts(shopIdx,placeholder='— Select Account —'){
  const accts=data.accounts.filter(a=>a.shopIdx===shopIdx);
  return `<option value="">${placeholder}</option>`+accts.map(a=>`<option value="${a.id}">[${a.type}] ${a.name}</option>`).join('');
}
function addLedgerEntry(accountId,date,type,amount,note,source,shopIdx){
  if(!accountId||!amount)return;
  data.ledger.push({id:uid(),accountId,date:date||todayISO(),type,amount:Number(amount),note:note||'',source:source||'manual',shopIdx});
}

// ── BALANCE HELPERS ───────────────────────────────────────────────────────────
function getBalOpts(shopIdx){
  const shop=data.shops[shopIdx];
  const cash=`<option value="cash">💵 Cash</option>`;
  const upi=(shop.balanceAccounts.upi||[]).map((u,i)=>`<option value="upi_${i}">📲 ${u.name}</option>`).join('');
  const bank=(shop.balanceAccounts.bank||[]).map((b,i)=>`<option value="bank_${i}">🏦 ${b.name}</option>`).join('');
  return cash+upi+bank;
}
function debitBalance(shopIdx,balKey,amount){
  const shop=data.shops[shopIdx];
  if(balKey==='cash'){shop.balanceAccounts.cash.balance=Number(shop.balanceAccounts.cash.balance||0)-Number(amount);}
  else if(balKey.startsWith('upi_')){const i=parseInt(balKey.slice(4));if(shop.balanceAccounts.upi[i])shop.balanceAccounts.upi[i].balance=Number(shop.balanceAccounts.upi[i].balance||0)-Number(amount);}
  else if(balKey.startsWith('bank_')){const i=parseInt(balKey.slice(5));if(shop.balanceAccounts.bank[i])shop.balanceAccounts.bank[i].balance=Number(shop.balanceAccounts.bank[i].balance||0)-Number(amount);}
}
function creditBalance(shopIdx,balKey,amount){
  const shop=data.shops[shopIdx];
  if(balKey==='cash'){shop.balanceAccounts.cash.balance=Number(shop.balanceAccounts.cash.balance||0)+Number(amount);}
  else if(balKey.startsWith('upi_')){const i=parseInt(balKey.slice(4));if(shop.balanceAccounts.upi[i])shop.balanceAccounts.upi[i].balance=Number(shop.balanceAccounts.upi[i].balance||0)+Number(amount);}
  else if(balKey.startsWith('bank_')){const i=parseInt(balKey.slice(5));if(shop.balanceAccounts.bank[i])shop.balanceAccounts.bank[i].balance=Number(shop.balanceAccounts.bank[i].balance||0)+Number(amount);}
}
function balLabel(shopIdx,balKey){
  const shop=data.shops[shopIdx];
  if(balKey==='cash')return 'Cash';
  if(balKey.startsWith('upi_')){const i=parseInt(balKey.slice(4));return shop.balanceAccounts.upi[i]?.name||'UPI';}
  if(balKey.startsWith('bank_')){const i=parseInt(balKey.slice(5));return shop.balanceAccounts.bank[i]?.name||'Bank';}
  return balKey;
}

// ── SALES ─────────────────────────────────────────────────────────────────────
function renderSales(){
  renderShopTabs('salesShopTabs','sales');
  const si=activeShops.sales;
  const tab=window._salesTab||'entry';
  const tabs=['entry','udhari','recharge','brands'].map(t=>`<button class="sub-tab${tab===t?' active':''}" onclick="window._salesTab='${t}';renderSales()">${{entry:'📱 Sale',udhari:'🔄 Udhari/Baki',recharge:'📶 Recharge',brands:'🏷 Brands'}[t]}</button>`).join('');
  let body='';
  if(tab==='entry'){
    const entries=(data.shops[si].entries||[]).slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
    const rows=entries.map((e,i)=>`<div class="entry-row">
      <div><div class="entry-main">${e.brand||''} ${e.model||''} <span style="font-size:11px;color:#888">${e.category||''}</span></div>
      <div class="entry-sub">
        ${e.cash?`💵₹${fmt(e.cash)} `:''}${e.upi?`📲₹${fmt(e.upi)} `:''}
        ${e.exchange?`🔁₹${fmt(e.exchange)} `:''}
        ${Number(e.udhari||0)>0?`<span class="r">Udhari ₹${fmt(e.udhari)}</span> `:''}
        ${Number(e.bakijama||0)>0?`<span class="g">BakiJama ₹${fmt(e.bakijama)}</span>`:''}
        ${e.udhariAccount?`• ${acctName(e.udhariAccount)}`:''}</div></div>
      <div style="text-align:right"><div class="entry-main g">₹${fmt(e.amount)}</div><div class="entry-date">${fmtDate(e.date)}</div></div></div>`).join('');
    // sale form
    body=`

function acctName(id){const a=data.accounts.find(x=>x.id===id);return a?a.name:'';}
function calcSaleTotal(){
  const cash=Number(document.getElementById('s_cash')?.value||0);
  const upi=Number(document.getElementById('s_upi')?.value||0);
  const exch=Number(document.getElementById('s_exch')?.value||0);
  const udhari=Number(document.getElementById('s_udhari')?.value||0);
  const baki=Number(document.getElementById('s_bakijama')?.value||0);
  const total=cash+upi-exch+baki-udhari;
  const el=document.getElementById('saleTotalVal');
  if(el)el.textContent=fmt(Math.max(0,total));
}
function togglePhoneFields(){
  const cat=document.getElementById('s_cat')?.value;
  const pf=document.getElementById('phoneFields');
  if(pf)pf.style.display=cat==='phone'?'block':'none';
}
window.addSaleEntry=function(si){
  const cash=Number(document.getElementById('s_cash')?.value||0);
  const upi=Number(document.getElementById('s_upi')?.value||0);
  const exch=Number(document.getElementById('s_exch')?.value||0);
  const udhari=Number(document.getElementById('s_udhari')?.value||0);
  const baki=Number(document.getElementById('s_bakijama')?.value||0);
  const amount=cash+upi-exch+baki-udhari;
  const udhAcct=document.getElementById('s_udhAcct')?.value||'';
  const bakiFrom=document.getElementById('s_bakiFrom')?.value||'';
  const date=document.getElementById('s_date')?.value||todayISO();
  if(!cash&&!upi&&!udhari&&!baki){toast('Enter at least one amount');return;}
  const entry={id:uid(),date,category:document.getElementById('s_cat')?.value||'phone',brand:document.getElementById('s_brand')?.value?.trim()||'',model:document.getElementById('s_model')?.value?.trim()||'',item:document.getElementById('s_item')?.value?.trim()||'',cash,upi,exchange:exch,udhari,bakijama:baki,amount,udhariAccount:udhAcct};
  if(!data.shops[si].entries)data.shops[si].entries=[];
  data.shops[si].entries.push(entry);
  // Cash effects
  if(cash>0)creditBalance(si,'cash',cash);
  if(upi>0){const def=data.shops[si].balanceAccounts.upi[0];if(def)creditBalance(si,'upi_0',upi);else creditBalance(si,'cash',upi);}
  // Udhari → DR on account (customer owes us)
  if(udhari>0&&udhAcct)addLedgerEntry(udhAcct,date,'dr',udhari,`Udhari - ${entry.brand||entry.item||'Sale'}`,'sale',si);
  // Baki Jama → CR on account (received back), credit balance
  if(baki>0){
    if(udhAcct)addLedgerEntry(udhAcct,date,'cr',baki,`Baki Jama received`,'sale',si);
    if(bakiFrom)creditBalance(si,bakiFrom,baki);
  }
  save();toast('Sale saved!');
  document.getElementById('s_cash').value='';document.getElementById('s_upi').value='';
  document.getElementById('s_exch').value='';document.getElementById('s_udhari').value='';
  document.getElementById('s_bakijama').value='';document.getElementById('s_item').value='';
  calcSaleTotal();renderSales();
};
window.addRecharge=function(si){
  const name=document.getElementById('rch_name')?.value?.trim();if(!name){toast('Enter name');return;}
  if(!data.shops[si].recharge)data.shops[si].recharge=[];
  data.shops[si].recharge.push({date:todayISO(),name,amount:Number(document.getElementById('rch_amt')?.value||0),plan:document.getElementById('rch_plan')?.value?.trim()||'',type:document.getElementById('rch_type')?.value||'Jio'});
  save();toast('Saved!');renderSales();
};
window.addBrandTag=function(si){const v=document.getElementById('brandTagInput')?.value?.trim();if(!v)return;if(!data.shops[si].brandTags)data.shops[si].brandTags=[];data.shops[si].brandTags.push(v);save();renderSales();};

window.addExpense=function(si){
  const amt=Number(document.getElementById('exp_amt')?.value||0);
  if(!amt){toast('Enter amount');return;}
  const note=document.getElementById('exp_note')?.value?.trim()||'';
  const paidFrom=document.getElementById('exp_from')?.value||'cash';
  const accountId=document.getElementById('exp_acct')?.value||'';
  const date=document.getElementById('exp_date')?.value||todayISO();
  if(!data.shops[si].expenses)data.shops[si].expenses=[];
  data.shops[si].expenses.push({id:uid(),date,amount:amt,note,paidFrom,accountId});
  // debit balance
  debitBalance(si,paidFrom,amt);
  // ledger CR entry (we paid them)
  if(accountId)addLedgerEntry(accountId,date,'cr',amt,note||'Payment','expense',si);
  save();toast('Expense saved!');
  document.getElementById('exp_amt').value='';document.getElementById('exp_note').value='';
  renderExpense();
};

    <span class="entry-date">${fmtDate(t.date)}</span></div>`).join('');
  document.getElementById('transferContent').innerHTML=`
  <div class="section-header">🔄 Inter-Branch Transfer</div>
  <div class="card"><div class="card-title">➕ New Transfer</div>
    <div class="two-col">
      <div class="field"><label>From Branch</label><select id="tr_from">${shopOpts}</select></div>
      <div class="field"><label>To Branch</label><select id="tr_to">${shopOpts}</select></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Amount (₹)</label><input type="number" id="tr_amt" placeholder="0"></div>
      <div class="field"><label>Balance Type</label><select id="tr_bal"><option value="cash">💵 Cash</option><option value="bank">🏦 Bank</option></select></div>
    </div>
    <div id="tr_bank_sel_wrap" class="field" style="display:none"><label>Which Bank Account</label><select id="tr_bank_idx"></select></div>
    <div class="field"><label>Goods / Description (optional)</label><input type="text" id="tr_goods" placeholder="What was transferred"></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="tr_note" placeholder="Any note"></div>
    <button class="save-btn" onclick="addTransfer()">Save Transfer</button>
  </div>
  <div class="card"><div class="card-title">📋 Recent Transfers</div>${rows||'<div class="empty">No transfers yet</div>'}</div>`;
  document.getElementById('tr_bal').onchange=function(){
    const isBak=this.value==='bank';
    document.getElementById('tr_bank_sel_wrap').style.display=isBak?'block':'none';
    if(isBak){const fromIdx=parseInt(document.getElementById('tr_from').value||0);const banks=data.shops[fromIdx].balanceAccounts.bank||[];document.getElementById('tr_bank_idx').innerHTML=banks.map((b,i)=>`<option value="${i}">${b.name}</option>`).join('')||'<option>No bank accounts</option>';}
  };
}
window.addTransfer=function(){
  const from=parseInt(document.getElementById('tr_from')?.value||0);
  const to=parseInt(document.getElementById('tr_to')?.value||0);
  const amt=Number(document.getElementById('tr_amt')?.value||0);
  const balType=document.getElementById('tr_bal')?.value||'cash';
  if(from===to){toast('From and To must differ');return;}
  if(!amt){toast('Enter amount');return;}
  const date=todayISO();
  const goods=document.getElementById('tr_goods')?.value?.trim()||'';
  const note=document.getElementById('tr_note')?.value?.trim()||'';
  if(!data.transfers)data.transfers=[];
  data.transfers.push({id:uid(),date,from,to,amount:amt,balType,goods,note});
  // affect balances
  if(balType==='cash'){
    debitBalance(from,'cash',amt);
    creditBalance(to,'cash',amt);
  } else {
    const bankIdx=parseInt(document.getElementById('tr_bank_idx')?.value||0);
    debitBalance(from,`bank_${bankIdx}`,amt);
    // credit to first bank of "to" branch or cash
    const toBanks=data.shops[to].balanceAccounts.bank||[];
    if(toBanks.length>0)creditBalance(to,'bank_0',amt);else creditBalance(to,'cash',amt);
  }
  // ledger entries — create inter-branch accounts if needed
  const fromName=SHOPS[from].name,toName=SHOPS[to].name;
  // "To" branch owes "From" branch
  let fromAcct=data.accounts.find(a=>a.name===`Branch: ${fromName}`&&a.shopIdx===to);
  if(!fromAcct){fromAcct={id:uid(),name:`Branch: ${fromName}`,type:'Custom',phone:'',shopIdx:to,notes:'Inter-branch'};data.accounts.push(fromAcct);}
  let toAcct=data.accounts.find(a=>a.name===`Branch: ${toName}`&&a.shopIdx===from);
  if(!toAcct){toAcct={id:uid(),name:`Branch: ${toName}`,type:'Custom',phone:'',shopIdx:from,notes:'Inter-branch'};data.accounts.push(toAcct);}
  // From shop: TO branch owes them (DR on toAcct in from-shop)
  addLedgerEntry(toAcct.id,date,'dr',amt,`Transfer to ${toName} - ${goods||note||''}`.trim(),'transfer',from);
  // To shop: they owe FROM branch (DR on fromAcct in to-shop — they received money)
  addLedgerEntry(fromAcct.id,date,'cr',amt,`Received from ${fromName} - ${goods||note||''}`.trim(),'transfer',to);
  save();toast('Transfer saved!');renderTransfer();
};

    <div class="metric"><div class="metric-label">Total Sales</div><div class="metric-value g">₹${fmt(monthSale)}</div></div>
    <div class="metric"><div class="metric-label">Total Expenses</div><div class="metric-value r">₹${fmt(monthExp)}</div></div>
    <div class="metric"><div class="metric-label">🔌 Acc. Value Sold</div><div class="metric-value">₹${fmt(monthAccVal)}</div></div>
    <div class="metric"><div class="metric-label">🔧 Repair Total</div><div class="metric-value">₹${fmt(monthRepVal)}</div></div>
  </div>
  <div class="section-header">Balances</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">💵 Cash</div><div class="metric-value">₹${fmt(cashBal)}</div></div>
    <div class="metric"><div class="metric-label">📲 UPI Total</div><div class="metric-value">₹${fmt(upiTotal)}</div></div>
    <div class="metric"><div class="metric-label">🏦 Bank Total</div><div class="metric-value">₹${fmt(bankTotal)}</div></div>
    <div class="metric"><div class="metric-label">⚠️ Outstanding</div><div class="metric-value r">₹${fmt(totalOutstanding)}</div></div>
  </div>
  ${isOwner()?`<div class="card"><div class="card-title">⚖️ Set Adjustment</div>
    <div class="field"><input type="number" id="adj_val" value="${adj}" placeholder="0 or negative for short"></div>
    <button class="save-btn" onclick="saveAdj(${si})">Save</button></div>`:''}`;
}
window.saveAdj=function(si){data.shops[si].adjustment=Number(document.getElementById('adj_val')?.value||0);save();toast('Saved!');renderDashboard();};

// ── BOOT ──────────────────────────────────────────────────────────────────────
load();
</script>


</body></html>
